<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Beta - Precision Tools</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
    /* ... (предыдущие стили остаются) ... */

    #sidebar { 
        width: var(--menu-w); 
        background: #252525; 
        border-right: 1px solid #333; 
        display: flex; 
        flex-direction: column; 
        padding: 10px 5px; /* Чуть меньше падинги по бокам */
        gap: 12px; 
        z-index: 10;
        
        /* ВКЛЮЧАЕМ ПРОКРУТКУ */
        overflow-y: auto; 
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch; /* Плавность на iOS */
    }

    /* Скрываем полосу прокрутки для чистого вида, но оставляем функционал */
    #sidebar::-webkit-scrollbar {
        width: 4px;
    }
    #sidebar::-webkit-scrollbar-thumb {
        background: #444;
        border-radius: 10px;
    }

    .menu-btn {
        width: 100%; 
        min-height: 70px; /* Фиксированная минимальная высота для кнопок в списке */
        aspect-ratio: 1/1; 
        background: #333; 
        border: 1px solid #444;
        border-radius: 10px; 
        color: white; 
        display: flex; 
        flex-direction: column;
        align-items: center; 
        justify-content: center; 
        font-size: 9px; 
        font-weight: bold;
        flex-shrink: 0; /* Чтобы кнопки не сжимались при добавлении новых */
    }
    /* ... (остальные стили) ... */
</style>

<div id="app">
    <aside id="sidebar">
        <!-- Кнопка Карта -->
        <div class="menu-btn" onclick="document.getElementById('map-upload').click()">
            <i>🗺</i><span>КАРТА</span>
        </div>
        
        <!-- Кнопка Масштаб -->
        <div class="menu-btn" id="scale-btn" onclick="toggleScaleMode()">
            <i>📏</i><span>МАСШТАБ</span>
        </div>
        
        <!-- Будущие кнопки (для теста прокрутки можешь размножить их) -->
        <div class="menu-btn" style="opacity: 0.3;">
            <i>🚛</i><span>ТЯГАЧ</span>
        </div>
        <div class="menu-btn" style="opacity: 0.3;">
            <i>📟</i><span>МОДУЛЬ</span>
        </div>
        <div class="menu-btn" style="opacity: 0.3;">
            <i>🦢</i><span>ГУСЕК</span>
        </div>
        <div class="menu-btn" style="opacity: 0.3;">
            <i>➖</i><span>БАЛКА</span>
        </div>
        
        <!-- Скрытый инпут -->
        <input type="file" id="map-upload" accept="image/*" style="display:none" onchange="handleMapUpload(event)">
    </aside>

    <main id="canvas-container">
        <!-- (Остальной контент без изменений) -->
        <div id="hint">ЗАЖМИТЕ НА 1 СЕК</div>
        <div id="magnifier">
            <canvas id="mag-canvas" width="80" height="80"></canvas>
            <div class="crosshair"></div>
        </div>
        <canvas id="c"></canvas>
    </main>
</div>
</head>
<body>

<div id="app">
    <aside id="sidebar">
        <div class="menu-btn" onclick="document.getElementById('map-upload').click()">
            <i>🗺</i><span>КАРТА</span>
        </div>
        <div class="menu-btn" id="scale-btn" onclick="toggleScaleMode()">
            <i>📏</i><span>МАСШТАБ</span>
        </div>
        <input type="file" id="map-upload" accept="image/*" style="display:none" onchange="handleMapUpload(event)">
    </aside>

    <main id="canvas-container">
        <div id="hint">ЗАЖМИТЕ НА 1 СЕК</div>
        <div id="magnifier">
            <canvas id="mag-canvas" width="80" height="80"></canvas>
            <div class="crosshair"></div>
        </div>
        <canvas id="c"></canvas>
    </main>
</div>

<script>
    const canvas = new fabric.Canvas('c', {
        width: window.innerWidth - 80,
        height: window.innerHeight,
        backgroundColor: '#222',
        selection: false,
        allowTouchScrolling: true
    });

    const magCtx = document.getElementById('mag-canvas').getContext('2d');
    const magnifier = document.getElementById('magnifier');
    const hint = document.getElementById('hint');

    let isScaleMode = false, calPoints = [], calTimer = null;
    let lastZoom = 1;

    function handleMapUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                canvas.getObjects().filter(o => o.type === 'map').forEach(m => canvas.remove(m));
                img.set({ left: canvas.width/2, top: canvas.height/2, originX: 'center', originY: 'center', selectable: false, evented: false, type: 'map' });
                img.scale(Math.min(canvas.width / img.width, canvas.height / img.height) * 0.9);
                canvas.add(img).sendToBack().renderAll();
            });
        };
        reader.readAsDataURL(file);
    }

    function toggleScaleMode() {
        isScaleMode = !isScaleMode;
        document.getElementById('scale-btn').classList.toggle('active', isScaleMode);
        hint.style.display = isScaleMode ? 'block' : 'none';
        if (!isScaleMode) { 
            canvas.getObjects().filter(o => o.isCalDot).forEach(d => canvas.remove(d));
            canvas.renderAll();
        }
        calPoints = [];
    }

    // --- НАВИГАЦИЯ (ЗУМ И ПЕРЕМЕЩЕНИЕ) ---
    canvas.on('mouse:wheel', function(opt) {
        let delta = opt.e.deltaY;
        let zoom = canvas.getZoom();
        zoom *= 0.999 ** delta;
        if (zoom > 20) zoom = 20; if (zoom < 0.01) zoom = 0.01;
        canvas.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, zoom);
        opt.e.preventDefault(); opt.e.stopPropagation();
    });

    let isDragging = false, lastPosX, lastPosY;

    canvas.on('mouse:down', function(opt) {
        const e = opt.e;
        // Если два пальца - перемещение
        if (e.touches && e.touches.length > 1) {
            isDragging = true;
            lastPosX = e.touches[0].clientX;
            lastPosY = e.touches[0].clientY;
            return;
        }

        if (isScaleMode) {
            const ptr = canvas.getPointer(e);
            calTimer = setTimeout(() => {
                const dot = new fabric.Circle({
                    left: ptr.x, top: ptr.y, radius: 3/canvas.getZoom(), fill: 'red',
                    stroke: 'white', strokeWidth: 1/canvas.getZoom(), originX: 'center', originY: 'center',
                    isCalDot: true, selectable: false, evented: false
                });
                canvas.add(dot);
                calPoints.push(ptr);
                if (calPoints.length === 2) finishCalibration();
            }, 1000);
        }
    });

    canvas.on('mouse:move', function(opt) {
        const e = opt.e;
        if (isDragging && e.touches && e.touches.length > 1) {
            const vpt = canvas.viewportTransform;
            vpt[4] += e.touches[0].clientX - lastPosX;
            vpt[5] += e.touches[0].clientY - lastPosY;
            canvas.requestRenderAll();
            lastPosX = e.touches[0].clientX;
            lastPosY = e.touches[0].clientY;
        }

        if (isScaleMode && !isDragging) {
            const ptr = canvas.getPointer(e);
            const touch = e.touches ? e.touches[0] : e;
            magnifier.style.display = 'block';
            magnifier.style.left = (touch.clientX - 40) + 'px';
            magnifier.style.top = (touch.clientY - 100) + 'px';
            
            magCtx.clearRect(0, 0, 80, 80);
            magCtx.save();
            magCtx.translate(40, 40);
            magCtx.scale(4, 4); // Лупа сильнее увеличивает
            magCtx.translate(-ptr.x, -ptr.y);
            canvas.renderCanvas(magCtx, canvas.getObjects());
            magCtx.restore();
        }
    });

    canvas.on('mouse:up', () => {
        clearTimeout(calTimer);
        magnifier.style.display = 'none';
        isDragging = false;
    });

    function finishCalibration() {
        const distPx = Math.hypot(calPoints[1].x - calPoints[0].x, calPoints[1].y - calPoints[0].y);
        const meters = prompt("Метров между точками:", "100");
        if (meters) alert(`Масштаб: 1м = ${(distPx / parseFloat(meters)).toFixed(2)}px`);
        toggleScaleMode();
    }

    window.addEventListener('resize', () => canvas.setDimensions({ width: window.innerWidth - 80, height: window.innerHeight }));
</script>
</body>
</html>
