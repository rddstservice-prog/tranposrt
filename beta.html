<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Beta - Step by Step</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        /* БЛОК 1: ОФОРМЛЕНИЕ */
        :root { --bg: #1a1a1a; --menu-w: 90px; --accent: #2196F3; }
        
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); overflow: hidden; color: white; font-family: sans-serif; }

        #app { display: flex; width: 100vw; height: 100vh; }

        /* Боковое меню */
        #sidebar { 
            width: var(--menu-w); 
            background: #252525; 
            border-right: 1px solid #333; 
            display: flex; 
            flex-direction: column; 
            padding: 10px; 
            gap: 15px;
            z-index: 10;
        }

        /* Стиль кнопки */
        .menu-btn {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #333;
            border: 1px solid #444;
            border-radius: 12px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .menu-btn:active { background: var(--accent); transform: scale(0.95); }
        .menu-btn i { font-style: normal; font-size: 24px; margin-bottom: 5px; }

        /* Зона холста */
        #canvas-container { flex-grow: 1; position: relative; }
        canvas { touch-action: none; }
    </style>
</head>
<body>

<div id="app">
    <!-- БЛОК 2: ИНТЕРФЕЙС (Пока только одна кнопка) -->
    <aside id="sidebar">
        <div class="menu-btn" onclick="addTruck()">
            <i>🚛</i>
            <span>ТЯГАЧ</span>
        </div>
    </aside>

    <main id="canvas-container">
        <canvas id="c"></canvas>
    </main>
</div>

<script>
    /* БЛОК 3: ЛОГИКА */
    const tg = window.Telegram?.WebApp;
    if (tg) tg.expand();

    // Инициализация холста
    const canvas = new fabric.Canvas('c', {
        width: window.innerWidth - 90, // Минус ширина меню
        height: window.innerHeight,
        backgroundColor: '#222',
        selection: false
    });

    // Функция добавления тягача
    function addTruck() {
        const truck = new fabric.Rect({
            left: 50,
            top: 50,
            width: 80,
            height: 35,
            fill: '#2196F3',
            stroke: 'white',
            strokeWidth: 2,
            rx: 5, // Скругление углов
            ry: 5,
            hasControls: true, // Разрешаем менять размер и крутить для теста
            hasBorders: true
        });

        canvas.add(truck);
        canvas.setActiveObject(truck);
    }

    // Автоматический ресайз при смене ориентации экрана
    window.addEventListener('resize', () => {
        canvas.setDimensions({
            width: window.innerWidth - 90,
            height: window.innerHeight
        });
    });
</script>

</body>
</html>
