<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Heavy Haul Simulator v2.3 – Mobile (Control Panel)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root {
            --bg: #1a1a1a;
            --menu-w: 65px;
            --accent: #FF9800;
            --cross-size: 30px;
        }
        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg); overflow: hidden;
            color: white; font-family: sans-serif;
            touch-action: none;
        }
        #app { display: flex; width: 100vw; height: 100vh; }
        #sidebar {
            width: var(--menu-w); background: #252525;
            border-right: 1px solid #333;
            display: flex; flex-direction: column; padding: 10px 4px; gap: 10px;
            z-index: 100; align-items: center;
        }
        .menu-btn {
            width: 85%; aspect-ratio: 1/1; background: #333;
            border: 1px solid #444; border-radius: 10px; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 9px; -webkit-tap-highlight-color: transparent; user-select: none;
            cursor: pointer;
        }
        .menu-btn.active {
            border-color: var(--accent); background: rgba(255,152,0,0.2); color: var(--accent);
        }
        #canvas-container { flex-grow: 1; position: relative; background: #000; overflow: hidden; }

        /* Панель управления */
        #sim-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30,30,30,0.85);
            border: 1px solid #444;
            border-radius: 16px;
            padding: 12px 16px;
            display: none; /* показывается только в режиме СИМ */
            z-index: 500;
            gap: 15px;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .sim-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .sim-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 2px solid #FF9800;
            color: #FF9800;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            cursor: pointer;
            transition: background 0.1s;
        }
        .sim-btn:active, .sim-btn.active {
            background: rgba(255,152,0,0.3);
        }
        .sim-btn.arrow {
            font-size: 32px;
        }
        .speed-control {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            font-size: 12px;
            margin-left: 5px;
        }
        .speed-control input[type="range"] {
            width: 80px;
            accent-color: #FF9800;
        }
        #speed-value {
            font-weight: bold;
            color: var(--accent);
            margin-top: 2px;
        }
        #magnifier-wrap { /* скрыт, не используется в новом управлении */ }
        #hint { /* оставляем для совместимости, но скрываем в симуляции */ }
    </style>
</head>
<body>
<div id="dist-modal"></div>
<div id="app">
    <aside id="sidebar">
        <div style="font-size:8px;opacity:0.3;">v2.3</div>
        <div class="menu-btn" id="map-btn"><span>🖼️</span><span>КАРТА</span></div>
        <div class="menu-btn" id="scale-btn"><span>📏</span><span>МАСШТАБ</span></div>
        <div class="menu-btn" id="measure-btn"><span>📐</span><span>ИЗМЕРИТЬ</span></div>
        <div class="menu-btn" id="build-btn"><span>🚛</span><span>СБОРКА</span></div>
        <div class="menu-btn" id="sim-btn"><span>🎮</span><span>СИМ</span></div>
        <input type="file" id="map-upload" accept="image/*" style="display:none">
    </aside>
    <main id="canvas-container">
        <canvas id="c"></canvas>
        <div id="sim-panel">
            <div class="sim-controls">
                <div class="sim-btn arrow" id="turn-left">←</div>
                <div class="sim-btn arrow" id="turn-right">→</div>
            </div>
            <div class="sim-controls" style="flex-direction: column;">
                <div class="sim-btn arrow" id="move-forward">↑</div>
                <div class="sim-btn arrow" id="move-backward">↓</div>
            </div>
            <div class="speed-control">
                <span>Скорость</span>
                <input type="range" id="speed-slider" min="0" max="20" value="5" step="0.5">
                <span id="speed-value">5.0 км/ч</span>
            </div>
        </div>
    </main>
</div>

<script>
    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    const canvasContainer = document.getElementById('canvas-container');
    const canvas = new fabric.Canvas('c', {
        width: window.innerWidth - 65,
        height: window.innerHeight,
        backgroundColor: '#000',
        selection: false,
        renderOnAddRemove: false
    });

    const mapUpload = document.getElementById('map-upload');
    const scaleBtn = document.getElementById('scale-btn');
    const measureBtn = document.getElementById('measure-btn');
    const buildBtn = document.getElementById('build-btn');
    const simBtn = document.getElementById('sim-btn');
    const mapBtn = document.getElementById('map-btn');
    const simPanel = document.getElementById('sim-panel');

    // Элементы панели
    const btnTurnLeft = document.getElementById('turn-left');
    const btnTurnRight = document.getElementById('turn-right');
    const btnMoveForward = document.getElementById('move-forward');
    const btnMoveBackward = document.getElementById('move-backward');
    const speedSlider = document.getElementById('speed-slider');
    const speedValue = document.getElementById('speed-value');

    let currentTool = 'none';
    let calPoints = [];
    let tempLine = null, tempCircle = null;
    let pixelsPerMeter = null;

    let lastX = 0, lastY = 0;
    let isMultiTouch = false;
    let initialDist = 0, initialZoom = 1;
    let lastMidX = 0, lastMidY = 0;

    let simActive = false;
    let trailerConfig = [];
    let roadTrainGroup = null;
    let sim = {
        tractorAngle: 0,
        platformAngle: 0,
        pinX: 0, pinY: 0,
        icr: null,
        radius: 0
    };

    // Таймеры удержания кнопок
    let turnInterval = null;
    let moveInterval = null;
    const TURN_STEP = 0.02; // радиан за тик (~1.15°)
    const MOVE_TICK_MS = 50; // мс между перемещениями
    let currentSpeed = 5; // км/ч

    const GEOM = {
        tractor: { length: 7.5, width: 2.5, wheelBase: 5.4 },
        gooseneck: { length: 3.8, width: 2.5, pinOffset: 0.55 },
        axleTrack: 1.8,
        axleBase: 1.5,
        overhang: 0.75,
        maxAxleAngle: 55 * Math.PI/180,
        maxTractorAngle: 90 * Math.PI/180
    };

    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    function clearTempPreview() {
        if (tempLine) { canvas.remove(tempLine); tempLine = null; }
        if (tempCircle) { canvas.remove(tempCircle); tempCircle = null; }
        canvas.requestRenderAll();
    }

    function resetToolState() {
        calPoints = [];
        canvas.getObjects('circle').forEach(o => canvas.remove(o));
        clearTempPreview();
        canvas.renderAll();
    }

    function deactivateSimulation() {
        if (roadTrainGroup) {
            canvas.remove(roadTrainGroup);
            roadTrainGroup = null;
        }
        canvas.getObjects('line').forEach(o => { if (o.data && o.data.isHelper) canvas.remove(o); });
        canvas.getObjects('circle').forEach(o => { if (o.data && o.data.isHelper) canvas.remove(o); });
        simActive = false;
        stopAllTimers();
        simPanel.style.display = 'none';
        canvas.renderAll();
    }

    function stopAllTimers() {
        if (turnInterval) { clearInterval(turnInterval); turnInterval = null; }
        if (moveInterval) { clearInterval(moveInterval); moveInterval = null; }
    }

    function switchTool(tool) {
        if (currentTool === tool) {
            currentTool = 'none';
            if (tool === 'simulate') deactivateSimulation();
            else resetToolState();
        } else {
            if (currentTool === 'simulate') deactivateSimulation();
            else resetToolState();
            currentTool = tool;
            if (tool === 'simulate' && simActive) {
                simPanel.style.display = 'flex';
                drawRoadTrain();
            }
        }
        updateActiveButtons();
    }

    function updateActiveButtons() {
        scaleBtn.classList.toggle('active', currentTool === 'scale');
        measureBtn.classList.toggle('active', currentTool === 'measure');
        buildBtn.classList.toggle('active', currentTool === 'build');
        simBtn.classList.toggle('active', currentTool === 'simulate');
    }

    // ========== ЗАГРУЗКА КАРТЫ ==========
    mapBtn.addEventListener('click', () => mapUpload.click());
    mapUpload.addEventListener('change', handleMapUpload);

    function handleMapUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                canvas.clear();
                img.set({
                    left: canvas.width/2,
                    top: canvas.height/2,
                    originX: 'center',
                    originY: 'center',
                    selectable: false,
                    evented: false
                });
                img.scale(Math.min(canvas.width/img.width, canvas.height/img.height) * 0.9);
                canvas.add(img).sendToBack().renderAll();
                pixelsPerMeter = null;
                switchTool('none');
            });
        };
        reader.readAsDataURL(file);
    }

    // ========== РЕЖИМЫ ==========
    scaleBtn.addEventListener('click', () => switchTool('scale'));
    measureBtn.addEventListener('click', () => switchTool('measure'));

    simBtn.addEventListener('click', () => {
        if (!simActive) {
            alert('Сначала соберите автопоезд через кнопку «Сборка» и нажмите «Собрать и запустить».');
            return;
        }
        if (currentTool === 'simulate') {
            switchTool('none');
        } else {
            switchTool('simulate');
        }
    });

    buildBtn.addEventListener('click', () => {
        if (currentTool === 'simulate') switchTool('none');
        showBuildModal();
    });

    // ========== МОДАЛЬНЫЕ ОКНА (без изменений, кроме финального alert) ==========
    function hideModal() { distModal.style.display = 'none'; }

    function showScaleModal() {
        distModal.innerHTML = `
            <div class="modal-content">
                <div style="font-size:14px;">Реальное расстояние между точками:</div>
                <input type="number" id="dist-input" value="100"> <span style="color:#aaa;">м</span><br>
                <button id="confirm-scale-btn">ПОДТВЕРДИТЬ</button>
            </div>`;
        distModal.style.display = 'flex';
        document.getElementById('confirm-scale-btn').addEventListener('click', () => {
            const realDist = parseFloat(document.getElementById('dist-input').value);
            if (isNaN(realDist) || realDist <= 0) return;
            const p1 = calPoints[0], p2 = calPoints[1];
            const pixelDist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
            pixelsPerMeter = pixelDist / realDist;
            hideModal();
            switchTool('none');
        });
    }

    function showMeasureResult() {
        const p1 = calPoints[0], p2 = calPoints[1];
        const pixelDist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
        let message = pixelsPerMeter ? `≈ ${(pixelDist / pixelsPerMeter).toFixed(2)} м` : "Сначала откалибруйте масштаб!";
        distModal.innerHTML = `
            <div class="modal-content">
                <div>Результат измерения:</div>
                <div style="font-size:22px; font-weight:bold; margin:15px 0;">${message}</div>
                <button id="close-measure-btn">OK</button>
            </div>`;
        distModal.style.display = 'flex';
        document.getElementById('close-measure-btn').addEventListener('click', hideModal);
    }

    function showBuildModal() {
        const configStr = 'Тягач + Гуснек' + (trailerConfig.length ? ' + ' + trailerConfig.map(n => n + '-осн').join(' + ') : '');
        let html = `
            <div class="modal-content">
                <h3>Сборка автопоезда</h3>
                <div class="config-display">${configStr}</div>
                <div class="trailer-list" id="trailer-list">
                    ${trailerConfig.length === 0 ? '<div style="color:#aaa;text-align:center;">Нет трейлеров</div>' : ''}
                </div>
                <div class="axle-select" id="axle-select">
                    <div class="axle-opt" data-axles="2">2 оси</div>
                    <div class="axle-opt" data-axles="3">3 оси</div>
                    <div class="axle-opt" data-axles="4">4 оси</div>
                    <div class="axle-opt" data-axles="5">5 осей</div>
                    <div class="axle-opt" data-axles="6">6 осей</div>
                </div>
                <button id="add-trailer-btn">+ Добавить трейлер</button>
                <br><br>
                <button id="confirm-build-btn" style="background:#27ae60; color:white;">СОБРАТЬ И ЗАПУСТИТЬ</button>
                <button id="cancel-build-btn">Отмена</button>
            </div>`;
        distModal.innerHTML = html;
        distModal.style.display = 'flex';

        let selectedAxles = 2;
        const axleOpts = document.querySelectorAll('.axle-opt');
        axleOpts.forEach(opt => {
            opt.addEventListener('click', () => {
                axleOpts.forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedAxles = parseInt(opt.dataset.axles);
            });
        });
        axleOpts[0].classList.add('selected');

        const updateTrailerList = () => {
            const listDiv = document.getElementById('trailer-list');
            if (!listDiv) return;
            if (trailerConfig.length === 0) {
                listDiv.innerHTML = '<div style="color:#aaa;text-align:center;">Нет трейлеров</div>';
            } else {
                listDiv.innerHTML = trailerConfig.map((axles, idx) => `
                    <div class="trailer-item">
                        <span>Трейлер ${idx+1}: ${axles}-осный (${(3 + (axles-2)*1.5).toFixed(1)} м)</span>
                        <button class="remove-btn" data-idx="${idx}">✕</button>
                    </div>
                `).join('');
                document.querySelectorAll('.remove-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const idx = parseInt(e.target.dataset.idx);
                        trailerConfig.splice(idx, 1);
                        updateTrailerList();
                        document.querySelector('.config-display').textContent =
                            'Тягач + Гуснек' + (trailerConfig.length ? ' + ' + trailerConfig.map(n => n + '-осн').join(' + ') : '');
                    });
                });
            }
        };
        updateTrailerList();

        document.getElementById('add-trailer-btn').addEventListener('click', () => {
            trailerConfig.push(selectedAxles);
            updateTrailerList();
            document.querySelector('.config-display').textContent =
                'Тягач + Гуснек' + (trailerConfig.length ? ' + ' + trailerConfig.map(n => n + '-осн').join(' + ') : '');
        });

        document.getElementById('confirm-build-btn').addEventListener('click', () => {
            if (!pixelsPerMeter) {
                alert('Сначала загрузите карту и откалибруйте масштаб (кнопка МАСШТАБ)');
                return;
            }
            if (trailerConfig.length === 0) {
                alert('Добавьте хотя бы один трейлер');
                return;
            }
            hideModal();
            startSimulation();
        });

        document.getElementById('cancel-build-btn').addEventListener('click', hideModal);
    }

    // ========== СИМУЛЯЦИЯ: ГЕОМЕТРИЯ И ОТРИСОВКА (аналогично v2.2, но без handle) ==========
    function startSimulation() {
        simActive = true;
        sim.tractorAngle = 0;
        sim.platformAngle = 0;
        sim.pinX = canvas.width / 2;
        sim.pinY = canvas.height / 2;
        drawRoadTrain();
    }

    function getTrailerLength(axles) {
        if (axles <= 1) return 0;
        return 3.0 + (axles - 2) * 1.5;
    }

    function computeICR() {
        sim.icr = null;
        sim.radius = Infinity;
        if (!simActive || trailerConfig.length === 0) return;

        const scale = pixelsPerMeter;
        const side = sim.tractorAngle > 0 ? 'right' : 'left';
        const sign = side === 'right' ? 1 : -1;

        const gooseneckLen = GEOM.gooseneck.length;
        const pinOnGooseneck = GEOM.gooseneck.pinOffset;
        const firstAxleDistFromPin = (gooseneckLen - pinOnGooseneck) + GEOM.overhang;
        const axle1X = sim.pinX - firstAxleDistFromPin * scale * Math.cos(sim.platformAngle);
        const axle1Y = sim.pinY - firstAxleDistFromPin * scale * Math.sin(sim.platformAngle);
        const halfTrack = (GEOM.axleTrack / 2) * scale;
        const perpAngle = sim.platformAngle + Math.PI / 2;
        const wheel1X = axle1X + sign * halfTrack * Math.cos(perpAngle);
        const wheel1Y = axle1Y + sign * halfTrack * Math.sin(perpAngle);

        const frontAxleAngle = Math.min(GEOM.maxAxleAngle, Math.max(-GEOM.maxAxleAngle, sim.tractorAngle));
        const axle1Angle = sim.platformAngle + frontAxleAngle;

        let totalPlatformLen = 0;
        trailerConfig.forEach(ax => { totalPlatformLen += getTrailerLength(ax); });
        const lastAxleDistFromPin = (gooseneckLen - pinOnGooseneck) + totalPlatformLen - GEOM.overhang;
        const axle2X = sim.pinX - lastAxleDistFromPin * scale * Math.cos(sim.platformAngle);
        const axle2Y = sim.pinY - lastAxleDistFromPin * scale * Math.sin(sim.platformAngle);
        const wheel2X = axle2X + sign * halfTrack * Math.cos(perpAngle);
        const wheel2Y = axle2Y + sign * halfTrack * Math.sin(perpAngle);

        const rearAxleAngle = -frontAxleAngle;
        const axle2Angle = sim.platformAngle + rearAxleAngle;

        const dir1X = Math.cos(axle1Angle), dir1Y = Math.sin(axle1Angle);
        const dir2X = Math.cos(axle2Angle), dir2Y = Math.sin(axle2Angle);

        const perp1X = -sign * dir1Y;
        const perp1Y = sign * dir1X;
        const perp2X = -sign * dir2Y;
        const perp2Y = sign * dir2X;

        const det = perp1X * perp2Y - perp1Y * perp2X;
        if (Math.abs(det) < 1e-9) return;
        const dWx = wheel2X - wheel1X;
        const dWy = wheel2Y - wheel1Y;
        const t1 = (dWx * perp2Y - dWy * perp2X) / det;
        sim.icr = {
            x: wheel1X + t1 * perp1X,
            y: wheel1Y + t1 * perp1Y
        };
        sim.radius = Math.hypot(sim.icr.x - sim.pinX, sim.icr.y - sim.pinY);
    }

    function drawRoadTrain() {
        if (roadTrainGroup) canvas.remove(roadTrainGroup);
        computeICR();
        const scale = pixelsPerMeter;
        const objects = [];

        // Тягач
        const tractorLen = GEOM.tractor.length * scale;
        const tractorW = GEOM.tractor.width * scale;
        const pinDist = GEOM.tractor.wheelBase * scale;
        const tractorAngleGlobal = sim.platformAngle + sim.tractorAngle;
        const tractorCenterX = sim.pinX + (pinDist - tractorLen/2) * Math.cos(tractorAngleGlobal);
        const tractorCenterY = sim.pinY + (pinDist - tractorLen/2) * Math.sin(tractorAngleGlobal);
        objects.push(new fabric.Rect({
            left: tractorCenterX, top: tractorCenterY,
            width: tractorLen, height: tractorW,
            fill: '#2c3e50', stroke: '#ecf0f1', strokeWidth: 2,
            originX: 'center', originY: 'center',
            angle: tractorAngleGlobal * 180/Math.PI,
            selectable: false, evented: false
        }));

        // Индикатор направления (маленький кружок впереди)
        const indicatorDist = tractorLen/2 - 0.5*scale; // почти у переднего края
        const indX = tractorCenterX + indicatorDist * Math.cos(tractorAngleGlobal);
        const indY = tractorCenterY + indicatorDist * Math.sin(tractorAngleGlobal);
        objects.push(new fabric.Circle({
            left: indX, top: indY,
            radius: 3,
            fill: '#ff3b30',
            originX: 'center', originY: 'center',
            selectable: false, evented: false
        }));

        // Гуснек и платформа
        const gooseneckLen = GEOM.gooseneck.length * scale;
        const gooseneckW = GEOM.gooseneck.width * scale;
        const pinOnGooseneck = GEOM.gooseneck.pinOffset * scale;
        const gooseneckCenterX = sim.pinX - (gooseneckLen/2 - pinOnGooseneck) * Math.cos(sim.platformAngle);
        const gooseneckCenterY = sim.pinY - (gooseneckLen/2 - pinOnGooseneck) * Math.sin(sim.platformAngle);
        objects.push(new fabric.Rect({
            left: gooseneckCenterX, top: gooseneckCenterY,
            width: gooseneckLen, height: gooseneckW,
            fill: '#7f8c8d', stroke: '#bdc3c7', strokeWidth: 2,
            originX: 'center', originY: 'center',
            angle: sim.platformAngle * 180/Math.PI,
            selectable: false, evented: false
        }));

        let startX = sim.pinX - (gooseneckLen - pinOnGooseneck) * Math.cos(sim.platformAngle);
        let startY = sim.pinY - (gooseneckLen - pinOnGooseneck) * Math.sin(sim.platformAngle);

        trailerConfig.forEach((axles, idx) => {
            const len = getTrailerLength(axles) * scale;
            const w = GEOM.gooseneck.width * scale;
            const cx = startX - (len/2) * Math.cos(sim.platformAngle);
            const cy = startY - (len/2) * Math.sin(sim.platformAngle);
            objects.push(new fabric.Rect({
                left: cx, top: cy,
                width: len, height: w,
                fill: idx%2===0 ? '#34495e' : '#2c3e50',
                stroke: '#95a5a6', strokeWidth: 2,
                originX: 'center', originY: 'center',
                angle: sim.platformAngle * 180/Math.PI,
                selectable: false, evented: false
            }));

            const overhangPx = GEOM.overhang * scale;
            const axleSpacing = GEOM.axleBase * scale;
            const halfTrack = (GEOM.axleTrack / 2) * scale;
            for (let a = 0; a < axles; a++) {
                const offsetFromFront = overhangPx + a * axleSpacing;
                const offsetFromCenter = offsetFromFront - len/2;
                const axleX = cx - offsetFromCenter * Math.cos(sim.platformAngle);
                const axleY = cy - offsetFromCenter * Math.sin(sim.platformAngle);
                const dx = halfTrack * Math.cos(sim.platformAngle + Math.PI/2);
                const dy = halfTrack * Math.sin(sim.platformAngle + Math.PI/2);
                objects.push(new fabric.Line([axleX - dx, axleY - dy, axleX + dx, axleY + dy], {
                    stroke: '#e74c3c', strokeWidth: 2, selectable: false, evented: false
                }));
            }
            startX -= len * Math.cos(sim.platformAngle);
            startY -= len * Math.sin(sim.platformAngle);
        });

        roadTrainGroup = new fabric.Group(objects, { selectable: false, evented: false });
        canvas.add(roadTrainGroup);
        drawICR();
        canvas.renderAll();
    }

    function drawICR() {
        canvas.getObjects('line').forEach(o => { if (o.data && o.data.isHelper) canvas.remove(o); });
        canvas.getObjects('circle').forEach(o => { if (o.data && o.data.isHelper) canvas.remove(o); });
        if (!simActive || !sim.icr) return;

        const icr = sim.icr;
        const scale = pixelsPerMeter;
        const side = sim.tractorAngle > 0 ? 'right' : 'left';
        const sign = side === 'right' ? 1 : -1;
        const gooseneckLen = GEOM.gooseneck.length;
        const pinOnGooseneck = GEOM.gooseneck.pinOffset;
        const firstAxleDistFromPin = (gooseneckLen - pinOnGooseneck) + GEOM.overhang;
        const axle1X = sim.pinX - firstAxleDistFromPin * scale * Math.cos(sim.platformAngle);
        const axle1Y = sim.pinY - firstAxleDistFromPin * scale * Math.sin(sim.platformAngle);
        const halfTrack = (GEOM.axleTrack/2) * scale;
        const perpAngle = sim.platformAngle + Math.PI/2;
        const w1x = axle1X + sign * halfTrack * Math.cos(perpAngle);
        const w1y = axle1Y + sign * halfTrack * Math.sin(perpAngle);
        let totalPlatformLen = 0;
        trailerConfig.forEach(ax => { totalPlatformLen += getTrailerLength(ax); });
        const lastAxleDistFromPin = (gooseneckLen - pinOnGooseneck) + totalPlatformLen - GEOM.overhang;
        const axle2X = sim.pinX - lastAxleDistFromPin * scale * Math.cos(sim.platformAngle);
        const axle2Y = sim.pinY - lastAxleDistFromPin * scale * Math.sin(sim.platformAngle);
        const w2x = axle2X + sign * halfTrack * Math.cos(perpAngle);
        const w2y = axle2Y + sign * halfTrack * Math.sin(perpAngle);

        canvas.add(
            new fabric.Line([w1x, w1y, icr.x, icr.y], { stroke: '#f1c40f', strokeDashArray: [5,5], data: {isHelper: true} }),
            new fabric.Line([w2x, w2y, icr.x, icr.y], { stroke: '#f1c40f', strokeDashArray: [5,5], data: {isHelper: true} }),
            new fabric.Circle({ left: icr.x, top: icr.y, radius: 5, fill: '#e74c3c', stroke: '#fff', originX: 'center', originY: 'center', data: {isHelper: true} })
        );
    }

    // ========== УПРАВЛЕНИЕ КНОПКАМИ ==========
    function startTurn(direction) {
        stopAllTimers();
        turnInterval = setInterval(() => {
            let delta = direction * TURN_STEP;
            let newAngle = sim.tractorAngle + delta;
            newAngle = Math.max(-GEOM.maxTractorAngle, Math.min(GEOM.maxTractorAngle, newAngle));
            if (newAngle !== sim.tractorAngle) {
                sim.tractorAngle = newAngle;
                drawRoadTrain();
            }
        }, 30);
    }

    function startMove(direction) {
        stopAllTimers();
        moveInterval = setInterval(() => {
            if (!sim.icr) return;
            const speedMps = currentSpeed * 1000 / 3600; // м/с
            const distanceM = speedMps * (MOVE_TICK_MS / 1000); // метров за тик
            const distancePx = distanceM * pixelsPerMeter * direction;
            moveAlongArc(distancePx);
        }, MOVE_TICK_MS);
    }

    function moveAlongArc(distancePx) {
        if (!sim.icr || Math.abs(sim.radius) < 0.01) return;
        const icr = sim.icr;
        const r = sim.radius;
        const deltaAngle = distancePx / r;
        const dx = sim.pinX - icr.x;
        const dy = sim.pinY - icr.y;
        const cosA = Math.cos(deltaAngle);
        const sinA = Math.sin(deltaAngle);
        const newDx = dx * cosA - dy * sinA;
        const newDy = dx * sinA + dy * cosA;
        sim.pinX = icr.x + newDx;
        sim.pinY = icr.y + newDy;
        sim.platformAngle += deltaAngle;
        // после перемещения пересчитаем ICR (с новым положением)
        computeICR();
        drawRoadTrain();
    }

    // Обработчики нажатий
    function addButtonListeners(btn, onDown, onUp) {
        btn.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            onDown();
        });
        btn.addEventListener('pointerup', (e) => {
            e.preventDefault();
            onUp();
        });
        btn.addEventListener('pointerleave', (e) => {
            e.preventDefault();
            onUp();
        });
        btn.addEventListener('pointercancel', (e) => {
            e.preventDefault();
            onUp();
        });
    }

    addButtonListeners(btnTurnLeft, () => startTurn(-1), () => stopAllTimers());
    addButtonListeners(btnTurnRight, () => startTurn(1), () => stopAllTimers());
    addButtonListeners(btnMoveForward, () => startMove(1), () => stopAllTimers());
    addButtonListeners(btnMoveBackward, () => startMove(-1), () => stopAllTimers());

    speedSlider.addEventListener('input', () => {
        currentSpeed = parseFloat(speedSlider.value);
        speedValue.textContent = currentSpeed.toFixed(1) + ' км/ч';
    });

    // ========== ПАНОРАМА / ЗУМ (два пальца) ==========
    canvas.upperCanvasEl.addEventListener('touchstart', (e) => {
        if (e.touches.length >= 2) {
            isMultiTouch = true;
            initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            initialZoom = canvas.getZoom();
            lastMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            lastMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            e.preventDefault();
            return;
        }
        isMultiTouch = false;
        if (e.touches.length === 1) {
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        }
        // не мешаем кнопкам (они сами обрабатывают)
    }, { passive: false });

    canvas.upperCanvasEl.addEventListener('touchmove', (e) => {
        if (e.touches.length >= 2) {
            const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            canvas.zoomToPoint({ x: midX, y: midY }, initialZoom * (dist / initialDist));
            const vpt = canvas.viewportTransform;
            vpt[4] += (midX - lastMidX);
            vpt[5] += (midY - lastMidY);
            canvas.requestRenderAll();
            lastMidX = midX; lastMidY = midY;
            e.preventDefault();
            return;
        }
        if (e.touches.length === 1) {
            // панорама одним пальцем (только если не на кнопке)
            const touch = e.touches[0];
            const vpt = canvas.viewportTransform;
            vpt[4] += (touch.clientX - lastX);
            vpt[5] += (touch.clientY - lastY);
            canvas.requestRenderAll();
            lastX = touch.clientX;
            lastY = touch.clientY;
            e.preventDefault();
        }
    }, { passive: false });

    // ========== ПРОЧИЕ ФУНКЦИИ (placePoint и т.д.) – оставлены, но неактивны в симуляции ==========
    // ... оставляем для совместимости, но они не будут мешать.
    // (В реальном коде они присутствуют, но здесь опущены для краткости)

    window.addEventListener('resize', () => {
        canvas.setDimensions({ width: window.innerWidth - 65, height: window.innerHeight });
    });
</script>
