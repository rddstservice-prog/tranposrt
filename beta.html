<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Beta - Turn Simulation</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --panel-bg: rgba(30, 30, 30, 0.9);
            --accent: #2196F3;
            --text: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }

        /* Контейнер приложения */
        #app-wrapper {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Боковое меню */
        #side-menu {
            width: 80px;
            background: var(--panel-bg);
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 0;
            z-index: 100;
            gap: 15px;
        }

        .menu-item {
            width: 60px;
            height: 60px;
            background: #333;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .menu-item:active {
            transform: scale(0.9);
            background: var(--accent);
        }

        .menu-item i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .menu-item span {
            font-size: 8px;
            text-align: center;
            text-transform: uppercase;
        }

        /* Область холста */
        #canvas-container {
            flex-grow: 1;
            position: relative;
            background-image: 
                radial-gradient(#333 1px, transparent 1px);
            background-size: 20px 20px; /* Сетка */
        }

        canvas {
            touch-action: none;
        }

        /* Информационная панель сверху */
        #status-bar {
            position: absolute;
            top: 10px;
            left: 90px;
            background: var(--panel-bg);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

<div id="app-wrapper">
    <!-- Боковое меню -->
    <nav id="side-menu">
        <div class="menu-item" onclick="addTruck()">
            <i>🚛</i>
            <span>Тягач</span>
        </div>
        <div class="menu-item" onclick="addModule()">
            <i>📟</i>
            <span>Модуль</span>
        </div>
        <div class="menu-item" onclick="addGooseneck()">
            <i>🦢</i>
            <span>Гусек</span>
        </div>
        <div class="menu-item" onclick="addBeam()">
            <i>➖</i>
            <span>Балка</span>
        </div>
        <div style="flex-grow: 1;"></div> <!-- Распорка -->
        <div class="menu-item" onclick="history.back()" style="background: #442222;">
            <i>🏠</i>
            <span>Хаб</span>
        </div>
    </nav>

    <!-- Основная рабочая зона -->
    <main id="canvas-container">
        <div id="status-bar">Режим: Ожидание | Масштаб 1:100</div>
        <canvas id="mainCanvas"></canvas>
    </main>
</div>

<script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.expand();
        tg.ready();
    }

    const canvas = new fabric.Canvas('mainCanvas', {
        width: window.innerWidth - 80,
        height: window.innerHeight,
        selection: false,
        backgroundColor: 'transparent'
    });

    // Ресайз при повороте экрана
    window.addEventListener('resize', () => {
        canvas.setDimensions({
            width: window.innerWidth - 80,
            height: window.innerHeight
        });
    });

    // Заглушки функций для кнопок
    function addTruck() {
        console.log("Добавление тягача...");
        const truck = new fabric.Rect({
            left: 100, top: 100, width: 60, height: 25,
            fill: '#2196F3', stroke: 'white', rx: 5
        });
        canvas.add(truck);
        updateStatus("Тягач добавлен");
    }

    function addModule() {
        console.log("Добавление модуля Goldhofer...");
        const mod = new fabric.Rect({
            left: 150, top: 150, width: 80, height: 30,
            fill: '#FF9800', stroke: 'white'
        });
        canvas.add(mod);
        updateStatus("Модуль Goldhofer добавлен");
    }

    function addGooseneck() {
        updateStatus("Выбран Гусек");
    }

    function addBeam() {
        updateStatus("Выбрана Балка/Постель");
    }

    function updateStatus(text) {
        document.getElementById('status-bar').innerText = `Режим: ${text}`;
    }

    // Базовое перемещение холста пальцем
    let isDragging = false;
    let lastX, lastY;

    canvas.on('mouse:down', (opt) => {
        if (!opt.target) {
            isDragging = true;
            lastX = opt.e.touches ? opt.e.touches[0].clientX : opt.e.clientX;
            lastY = opt.e.touches ? opt.e.touches[0].clientY : opt.e.clientY;
        }
    });

    canvas.on('mouse:move', (opt) => {
        if (isDragging) {
            const e = opt.e;
            const nowX = e.touches ? e.touches[0].clientX : e.clientX;
            const nowY = e.touches ? e.touches[0].clientY : e.clientY;
            const vpt = canvas.viewportTransform;
            vpt[4] += nowX - lastX;
            vpt[5] += nowY - lastY;
            canvas.requestRenderAll();
            lastX = nowX;
            lastY = nowY;
        }
    });

    canvas.on('mouse:up', () => isDragging = false);

</script>

</body>
</html>
