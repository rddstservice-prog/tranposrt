<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Beta v0.1.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root { --bg: #1a1a1a; --menu-w: 80px; --accent: #FF9800; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); overflow: hidden; color: white; font-family: sans-serif; touch-action: none; }
        #app { display: flex; width: 100vw; height: 100vh; }

        #sidebar { 
            width: var(--menu-w); background: #252525; border-right: 1px solid #333; 
            display: flex; flex-direction: column; padding: 10px 5px; gap: 12px; 
            z-index: 10; overflow-y: auto; align-items: center;
        }
        .version-label { padding: 5px 0; font-size: 9px; color: rgba(255,255,255,0.2); pointer-events: none; text-align: center; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 5px; }

        .menu-btn {
            width: 100%; min-height: 70px; aspect-ratio: 1/1; background: #333; 
            border: 1px solid #444; border-radius: 10px; color: white; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 9px; font-weight: bold; flex-shrink: 0;
        }
        .menu-btn.active { border-color: var(--accent); background: rgba(255, 152, 0, 0.2); color: var(--accent); }
        .menu-btn i { font-style: normal; font-size: 20px; margin-bottom: 3px; }

        #canvas-container { flex-grow: 1; position: relative; }
        
        #magnifier {
            position: absolute; width: 120px; height: 120px; border: 2px solid var(--accent);
            border-radius: 50%; pointer-events: none; display: none; z-index: 1000;
            overflow: hidden; background: #000; box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }
        #mag-canvas { width: 100%; height: 100%; }
        .crosshair { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%); }
        .crosshair::before, .crosshair::after { content: ''; position: absolute; background: var(--accent); }
        .crosshair::before { top: 50%; left: 0; width: 100%; height: 1px; }
        .crosshair::after { left: 50%; top: 0; height: 100%; width: 1px; }

        #hint {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: black; padding: 5px 15px; border-radius: 15px; font-size: 11px; font-weight: bold; display: none; z-index: 100;
        }
    </style>
</head>
<body>

<div id="app">
    <aside id="sidebar">
        <div class="version-label">v 0.1.5</div>
        <div class="menu-btn" onclick="document.getElementById('map-upload').click()"><i>🗺</i><span>КАРТА</span></div>
        <div class="menu-btn" id="scale-btn" onclick="toggleScaleMode()"><i>📏</i><span>МАСШТАБ</span></div>
        <input type="file" id="map-upload" accept="image/*" style="display:none" onchange="handleMapUpload(event)">
    </aside>

    <main id="canvas-container">
        <div id="hint">УДЕРЖИВАЙТЕ 1.5 СЕК</div>
        <div id="magnifier">
            <canvas id="mag-canvas" width="120" height="120"></canvas>
            <div class="crosshair"></div>
        </div>
        <canvas id="c"></canvas>
    </main>
</div>

<script>
    const canvas = new fabric.Canvas('c', {
        width: window.innerWidth - 80,
        height: window.innerHeight,
        backgroundColor: '#222',
        selection: false,
        stopContextMenu: true
    });

    const magCtx = document.getElementById('mag-canvas').getContext('2d');
    const magnifier = document.getElementById('magnifier');
    const hint = document.getElementById('hint');

    let isScaleMode = false, calPoints = [], calTimer = null;

    function handleMapUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                canvas.getObjects('image').forEach(m => canvas.remove(m));
                img.set({ left: canvas.width/2, top: canvas.height/2, originX: 'center', originY: 'center', selectable: false, evented: false });
                img.scale(Math.min(canvas.width / img.width, canvas.height / img.height) * 0.9);
                canvas.add(img).sendToBack().renderAll();
            });
        };
        reader.readAsDataURL(file);
    }

    function toggleScaleMode() {
        isScaleMode = !isScaleMode;
        document.getElementById('scale-btn').classList.toggle('active', isScaleMode);
        hint.style.display = isScaleMode ? 'block' : 'none';
        if (!isScaleMode) {
            canvas.getObjects('circle').filter(o => o.isCalDot).forEach(d => canvas.remove(d));
            calPoints = [];
        }
        canvas.renderAll();
    }

    // --- ЛОГИКА УПРАВЛЕНИЯ v0.1.5 ---
    canvas.on('mouse:down', function(opt) {
        const e = opt.e;
        const touch = e.touches ? e.touches[0] : e;
        
        // Перемещение работает всегда
        this.isDragging = true;
        this.lastPosX = touch.clientX;
        this.lastPosY = touch.clientY;

        // Лупа и точки только в режиме масштаба и только одним пальцем
        if (isScaleMode && (!e.touches || e.touches.length === 1)) {
            showMagnifier(touch);
            const ptr = canvas.getPointer(e);
            calTimer = setTimeout(() => {
                const dot = new fabric.Circle({
                    left: ptr.x, top: ptr.y, radius: 5/canvas.getZoom(), fill: 'red',
                    stroke: 'white', strokeWidth: 1/canvas.getZoom(), originX: 'center', originY: 'center',
                    isCalDot: true, selectable: false
                });
                canvas.add(dot);
                calPoints.push(ptr);
                if (calPoints.length === 2) finishCalibration();
            }, 1500);
        }
    });

    canvas.on('mouse:move', function(opt) {
        const e = opt.e;
        const touch = e.touches ? e.touches[0] : e;

        if (this.isDragging) {
            const vpt = this.viewportTransform;
            vpt[4] += touch.clientX - this.lastPosX;
            vpt[5] += touch.clientY - this.lastPosY;
            this.requestRenderAll();
            this.lastPosX = touch.clientX;
            this.lastPosY = touch.clientY;
        }

        // Обновляем лупу, если мы в режиме масштаба и двигаем карту/палец
        if (isScaleMode && this.isDragging && (!e.touches || e.touches.length === 1)) {
            showMagnifier(touch);
        }
    });

    canvas.on('mouse:up', function() {
        this.isDragging = false;
        magnifier.style.display = 'none';
        clearTimeout(calTimer);
    });

    // ГЛОБАЛЬНЫЙ ЗУМ (работает всегда)
    canvas.on('touch:gesture', function(opt) {
        if (opt.e.touches && opt.e.touches.length == 2) {
            let zoom = canvas.getZoom() * opt.self.scale;
            if (zoom > 20) zoom = 20; if (zoom < 0.01) zoom = 0.01;
            canvas.zoomToPoint({ x: opt.self.x, y: opt.self.y }, zoom);
            canvas.renderAll();
        }
    });

    // Для мышки (колесо)
    canvas.on('mouse:wheel', function(opt) {
        let delta = opt.e.deltaY;
        let zoom = canvas.getZoom() * (0.999 ** delta);
        if (zoom > 20) zoom = 20; if (zoom < 0.01) zoom = 0.01;
        canvas.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, zoom);
        opt.e.preventDefault();
        opt.e.stopPropagation();
    });

    function showMagnifier(touch) {
        const ptr = canvas.getPointer(touch);
        magnifier.style.display = 'block';
        magnifier.style.left = (touch.clientX - 60) + 'px';
        magnifier.style.top = (touch.clientY - 180) + 'px'; 

        magCtx.clearRect(0, 0, 120, 120);
        magCtx.save();
        magCtx.translate(60, 60);
        magCtx.scale(4, 4);
        magCtx.translate(-ptr.x, -ptr.y);
        canvas.renderCanvas(magCtx, canvas.getObjects());
        magCtx.restore();
    }

    function finishCalibration() {
        const distPx = Math.hypot(calPoints[1].x - calPoints[0].x, calPoints[1].y - calPoints[0].y);
        const meters = prompt("Метров между точками:", "100");
        toggleScaleMode();
    }

    window.addEventListener('resize', () => canvas.setDimensions({ width: window.innerWidth - 80, height: window.innerHeight }));
</script>
</body>
</html>
