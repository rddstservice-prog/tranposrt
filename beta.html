<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile Beta v0.4.5 - Center Crosshair</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js">
    </script>
    <style>
        :root {
            --bg: #1a1a1a;
            --menu-w: 65px;
            --accent: #FF9800;
            --cross-size: 30px;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: var(--bg);
            overflow: hidden;
            color: white;
            font-family: sans-serif;
            touch-action: none;
        }

        #app {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        #sidebar {
            width: var(--menu-w);
            background: #252525;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 10px 4px;
            gap: 10px;
            z-index: 100;
            align-items: center;
        }

        .menu-btn {
            width: 85%;
            aspect-ratio: 1/1;
            background: #333;
            border: 1px solid #444;
            border-radius: 10px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            -webkit-tap-highlight-color: transparent;
        }

        .menu-btn.active {
            border-color: var(--accent);
            background: rgba(255, 152, 0, 0.2);
            color: var(--accent);
        }

        #canvas-container {
            flex-grow: 1;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        /* Обёртка для перекрестия и подсказки — позиционируется из JS */
        #magnifier-wrap {
            position: absolute;
            pointer-events: none;
            display: none;
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            will-change: left, top;
        }

        /* Подсказка */
        #hint {
            background: var(--accent);
            color: #000;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 900;
            margin-bottom: 8px;
            white-space: nowrap;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }

        /* Компактное перекрестие */
        .crosshair {
            width: var(--cross-size);
            height: var(--cross-size);
            position: relative;
        }

        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: var(--accent);
            opacity: 0.9;
        }

        .crosshair::before {
            /* горизонтальная линия */
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            transform: translateY(-0.5px);
        }

        .crosshair::after {
            /* вертикальная линия */
            left: 50%;
            top: 0;
            height: 100%;
            width: 1px;
            transform: translateX(-0.5px);
        }

        #dist-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #252525;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--accent);
            text-align: center;
        }

        .modal-content input {
            width: 80px;
            text-align: center;
            padding: 8px;
            font-size: 16px;
            background: #111;
            color: var(--accent);
            border: 1px solid #444;
            border-radius: 6px;
            margin: 15px 0;
            outline: none;
        }
    </style>
</head>
<body>

    <div id="dist-modal">
        <div class="modal-content">
            <div style="font-size: 14px; color: white;">Расстояние между точками:</div>
            <input type="number" id="dist-input" value="100"> <span style="color: #aaa;">м</span><br>
            <button onclick="confirmDistance()" style="background: var(--accent); border:none; padding:10px; border-radius:5px; font-weight:bold;">ПОДТВЕРДИТЬ ✔</button>
        </div>
    </div>

    <div id="app">
        <aside id="sidebar">
            <div style="font-size: 8px; opacity: 0.3;">v0.4.6</div>
            <div class="menu-btn" onclick="document.getElementById('map-upload').click()"><i>🖼️</i><span>КАРТА</span></div>
            <div class="menu-btn" id="scale-btn" onclick="toggleScaleMode()"><i>📏</i><span>МАСШТАБ</span></div>
            <input type="file" id="map-upload" accept="image/*" style="display:none" onchange="handleMapUpload(event)">
        </aside>

        <main id="canvas-container">
            <div id="magnifier-wrap">
                <div id="hint">Удерживайте для точки</div>
                <div class="crosshair"></div>
            </div>
            <canvas id="c"></canvas>
        </main>
    </div>

    <script>
        const canvasContainer = document.getElementById('canvas-container');
        const canvas = new fabric.Canvas('c', {
            width: window.innerWidth - 65,
            height: window.innerHeight,
            backgroundColor: '#000',
            selection: false,
            renderOnAddRemove: false
        });

        const magWrap = document.getElementById('magnifier-wrap');
        const hint = document.getElementById('hint');

        let isScaleMode = false,
            calPoints = [],
            calTimer = null;
        let initialDist = 0,
            initialZoom = 1;
        let lastX = 0,
            lastY = 0;
        let lastMidX = 0,
            lastMidY = 0;
        let isMultiTouch = false;

        // Начальные координаты касания, сохраняются для точного позиционирования
        let initialDownX = 0,
            initialDownY = 0;

        const CROSS_SIZE = 30; // размер перекрестия
        const VISUAL_OFFSET = 150; // смещение вверх от пальца
        const HINT_HEIGHT = 30; // примерная высота подсказки с отступом

        function handleMapUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (f) => {
                fabric.Image.fromURL(f.target.result, (img) => {
                    canvas.clear();
                    img.set({
                        left: canvas.width / 2,
                        top: canvas.height / 2,
                        originX: 'center',
                        originY: 'center',
                        selectable: false,
                        evented: false
                    });
                    img.scale(Math.min(canvas.width / img.width, canvas.height / img.height) * 0.9);
                    canvas.add(img).sendToBack().renderAll();
                });
            };
            reader.readAsDataURL(file);
        }

        function toggleScaleMode() {
            isScaleMode = !isScaleMode;
            document.getElementById('scale-btn').classList.toggle('active', isScaleMode);
            if (!isScaleMode) {
                calPoints = [];
                canvas.getObjects('circle').forEach(o => canvas.remove(o));
                magWrap.style.display = 'none';
            } else {
                hint.innerText = "Удерживайте для точки";
            }
            canvas.renderAll();
        }

        function confirmDistance() {
            document.getElementById('dist-modal').style.display = 'none';
            toggleScaleMode();
        }

        function canvasPointFromScreen(screenX, screenY) {
            return canvas.getPointer({ clientX: screenX, clientY: screenY });
        }

        // Позиционирует перекрестие по заданным экранным координатам (центр перекрестия)
        function positionCrosshair(clientX, clientY) {
            if (!isScaleMode) {
                magWrap.style.display = 'none';
                return;
            }

            const containerRect = canvasContainer.getBoundingClientRect();

            // Центр перекрестия должен находиться над пальцем на VISUAL_OFFSET пикселей
            const centerScreenX = clientX;
            const centerScreenY = clientY - VISUAL_OFFSET;

            const wrapX = centerScreenX - containerRect.left - CROSS_SIZE / 2;
            const wrapY = centerScreenY - containerRect.top - HINT_HEIGHT - CROSS_SIZE / 2;

            magWrap.style.left = `${wrapX}px`;
            magWrap.style.top = `${wrapY}px`;
            magWrap.style.display = 'flex';
        }

        canvas.upperCanvasEl.addEventListener('touchstart', (e) => {
            if (e.touches.length >= 2) {
                isMultiTouch = true;
                clearTimeout(calTimer);
                magWrap.style.display = 'none';
                initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e
                    .touches[1].clientY);
                initialZoom = canvas.getZoom();
                lastMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                lastMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            } else {
                isMultiTouch = false;
                const touch = e.touches[0];
                lastX = touch.clientX;
                lastY = touch.clientY;

                if (isScaleMode) {
                    // Фиксируем начальную позицию, по которой будет ставиться точка
                    initialDownX = touch.clientX;
                    initialDownY = touch.clientY;

                    // Сразу показываем перекрестие в месте касания
                    positionCrosshair(initialDownX, initialDownY);

                    clearTimeout(calTimer);
                    calTimer = setTimeout(() => {
                        if (isMultiTouch) return;

                        // Точка ставится строго в центр перекрестия (используем те же координаты)
                        const centerScreenX = initialDownX;
                        const centerScreenY = initialDownY - VISUAL_OFFSET;
                        const ptr = canvasPointFromScreen(centerScreenX, centerScreenY);

                        const dot = new fabric.Circle({
                            left: ptr.x,
                            top: ptr.y,
                            radius: 6 / canvas.getZoom(),
                            fill: '#ff3b30',
                            stroke: 'white',
                            strokeWidth: 2 / canvas.getZoom(),
                            originX: 'center',
                            originY: 'center',
                            selectable: false
                        });

                        canvas.add(dot);
                        canvas.requestRenderAll();
                        calPoints.push({ ...ptr });

                        if (calPoints.length === 1) {
                            hint.innerText = "Вторая точка";
                            // Перекрестие продолжает показываться на старом месте
                        } else if (calPoints.length === 2) {
                            magWrap.style.display = 'none';
                            document.getElementById('dist-modal').style.display = 'flex';
                        }
                    }, 1000);
                }
            }
        }, { passive: false });

        canvas.upperCanvasEl.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            if (e.touches.length >= 2) {
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1]
                    .clientY);
                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                canvas.zoomToPoint({ x: midX, y: midY }, initialZoom * (dist / initialDist));
                const vpt = canvas.viewportTransform;
                vpt[4] += (midX - lastMidX);
                vpt[5] += (midY - lastMidY);
                canvas.requestRenderAll();
                lastMidX = midX;
                lastMidY = midY;
            } else if (e.touches.length === 1) {
                // В режиме масштаба перекрестие остаётся на месте, таймер не сбрасывается,
                // только панорамирование карты
                if (!isScaleMode) {
                    const vpt = canvas.viewportTransform;
                    vpt[4] += (touch.clientX - lastX);
                    vpt[5] += (touch.clientY - lastY);
                    canvas.requestRenderAll();
                } else {
                    // В режиме масштаба панорамируем карту, но перекрестие не трогаем
                    const vpt = canvas.viewportTransform;
                    vpt[4] += (touch.clientX - lastX);
                    vpt[5] += (touch.clientY - lastY);
                    canvas.requestRenderAll();
                }
                lastX = touch.clientX;
                lastY = touch.clientY;
            }
            e.preventDefault();
        }, { passive: false });

        canvas.upperCanvasEl.addEventListener('touchend', () => {
            clearTimeout(calTimer);
            magWrap.style.display = 'none';
            isMultiTouch = false;
        });

        window.addEventListener('resize', () => {
            canvas.setDimensions({ width: window.innerWidth - 65, height: window.innerHeight });
        });
    </script>
</body>
</html>
