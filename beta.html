<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile Beta v0.3.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root { --bg: #1a1a1a; --menu-w: 70px; --accent: #FF9800; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); overflow: hidden; color: white; font-family: sans-serif; touch-action: none; }
        #app { display: flex; width: 100vw; height: 100vh; }
        
        #sidebar { width: var(--menu-w); background: #252525; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 10px 4px; gap: 10px; z-index: 100; align-items: center; }
        .menu-btn { width: 90%; aspect-ratio: 1/1; background: #333; border: 1px solid #444; border-radius: 12px; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; -webkit-tap-highlight-color: transparent; }
        .menu-btn.active { border-color: var(--accent); background: rgba(255, 152, 0, 0.2); color: var(--accent); }

        #canvas-container { flex-grow: 1; position: relative; background: #000; overflow: hidden; }

        /* Группировка лупы и надписи - ПОДНЯТО ВЫШЕ */
        #magnifier-wrap {
            position: absolute;
            pointer-events: none;
            display: none;
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            /* Сдвигаем всю группу вверх относительно пальца */
            transform: translate(-50%, -100%); 
            margin-top: -80px; /* Увеличенный отступ от пальца вверх */
        }

        #magnifier { 
            width: 140px; 
            height: 140px; 
            border: 3px solid var(--accent); 
            border-radius: 50%; 
            overflow: hidden; 
            background: #111; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
            position: relative;
        }

        #hint { 
            background: var(--accent); 
            color: #000; 
            padding: 5px 12px; 
            border-radius: 4px; 
            font-size: 11px; 
            font-weight: 900; 
            margin-top: 8px; /* Небольшой зазор под лупой */
            white-space: nowrap;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #mag-canvas { width: 100%; height: 100%; }

        .crosshair { position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; transform: translate(-50%, -50%); }
        .crosshair::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: #ff3b30; }
        .crosshair::after { content: ''; position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: #ff3b30; }
    </style>
</head>
<body>
<div id="app">
    <aside id="sidebar">
        <div style="font-size: 9px; opacity: 0.3;">v0.3.2</div>
        <div class="menu-btn" onclick="document.getElementById('map-upload').click()"><i>🖼️</i><span>КАРТА</span></div>
        <div class="menu-btn" id="scale-btn" onclick="toggleScaleMode()"><i>📏</i><span>МАСШТАБ</span></div>
        <input type="file" id="map-upload" accept="image/*" style="display:none" onchange="handleMapUpload(event)">
    </aside>
    <main id="canvas-container">
        <div id="magnifier-wrap">
            <div id="magnifier">
                <canvas id="mag-canvas" width="140" height="140"></canvas>
                <div class="crosshair"></div>
            </div>
            <div id="hint">Удерживайте для точки</div>
        </div>
        <canvas id="c"></canvas>
    </main>
</div>

<script>
    const canvas = new fabric.Canvas('c', {
        width: window.innerWidth - 70,
        height: window.innerHeight,
        backgroundColor: '#000',
        selection: false,
        stopContextMenu: true
    });

    const magWrap = document.getElementById('magnifier-wrap');
    const magCanvasEl = document.getElementById('mag-canvas');
    const magCtx = magCanvasEl.getContext('2d', { alpha: false });
    const hint = document.getElementById('hint');

    let isScaleMode = false, calPoints = [], calTimer = null;
    let initialDist = 0, initialZoom = 1;
    let lastX = 0, lastY = 0;

    function handleMapUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                canvas.clear();
                img.set({ left: canvas.width/2, top: canvas.height/2, originX: 'center', originY: 'center', selectable: false, evented: false });
                img.scale(Math.min(canvas.width/img.width, canvas.height/img.height)*0.9);
                canvas.add(img).sendToBack().renderAll();
            });
        };
        reader.readAsDataURL(file);
    }

    function toggleScaleMode() {
        isScaleMode = !isScaleMode;
        document.getElementById('scale-btn').classList.toggle('active', isScaleMode);
        if (!isScaleMode) { 
            calPoints = []; 
            canvas.getObjects('circle').forEach(o => canvas.remove(o)); 
            magWrap.style.display = 'none';
        } else {
            hint.innerText = "Удерживайте для точки";
        }
        canvas.renderAll();
    }

    function updateMagnifierUI(touch) {
        if (!isScaleMode || !touch) return;
        
        const x = touch.clientX - 70; 
        const y = touch.clientY;

        magWrap.style.left = `${x}px`;
        magWrap.style.top = `${y}px`;
        magWrap.style.display = 'flex';

        const ptr = canvas.getPointer(touch);
        const zoom = canvas.getZoom();
        
        magCtx.save();
        magCtx.imageSmoothingEnabled = false;
        magCtx.fillStyle = "#111";
        magCtx.fillRect(0, 0, 140, 140);
        
        magCtx.translate(70, 70);
        magCtx.scale(8 * zoom, 8 * zoom); 
        magCtx.translate(-ptr.x, -ptr.y);
        
        canvas.renderCanvas(magCtx, canvas.getObjects());
        magCtx.restore();
    }

    function startCalTimer(touch) {
        clearTimeout(calTimer);
        const ptr = canvas.getPointer(touch);
        calTimer = setTimeout(() => {
            const dot = new fabric.Circle({
                left: ptr.x, top: ptr.y, radius: 5/canvas.getZoom(),
                fill: '#ff3b30', stroke: 'white', strokeWidth: 1.5/canvas.getZoom(),
                originX: 'center', originY: 'center', selectable: false
            });
            canvas.add(dot).renderAll();
            calPoints.push({...ptr});
            
            magWrap.style.display = 'none';
            
            if (calPoints.length === 1) {
                hint.innerText = "Вторая точка";
            } else if (calPoints.length === 2) {
                alert("Масштаб сохранен");
                toggleScaleMode();
            }
        }, 1000);
    }

    canvas.upperCanvasEl.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            clearTimeout(calTimer);
            initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            initialZoom = canvas.getZoom();
            magWrap.style.display = 'none';
        } else if (e.touches.length === 1) {
            const touch = e.touches[0];
            canvas.isDragging = true;
            lastX = touch.clientX;
            lastY = touch.clientY;
            if (isScaleMode) {
                updateMagnifierUI(touch);
                startCalTimer(touch);
            }
        }
    }, { passive: false });

    canvas.upperCanvasEl.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2) {
            const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            const mid = { x: (e.touches[0].clientX + e.touches[1].clientX)/2 - 70, y: (e.touches[0].clientY + e.touches[1].clientY)/2 };
            canvas.zoomToPoint(mid, initialZoom * (dist / initialDist));
        } else if (e.touches.length === 1 && canvas.isDragging) {
            const touch = e.touches[0];
            
            if (Math.hypot(touch.clientX - lastX, touch.clientY - lastY) > 2) {
                clearTimeout(calTimer);
                if (isScaleMode) startCalTimer(touch); 
            }

            const vpt = canvas.viewportTransform;
            vpt[4] += touch.clientX - lastX;
            vpt[5] += touch.clientY - lastY;
            canvas.requestRenderAll();
            
            lastX = touch.clientX;
            lastY = touch.clientY;
            
            if (isScaleMode) updateMagnifierUI(touch);
        }
        e.preventDefault();
    }, { passive: false });

    canvas.upperCanvasEl.addEventListener('touchend', () => {
        canvas.isDragging = false;
        clearTimeout(calTimer);
        magWrap.style.display = 'none';
    });

    window.addEventListener('resize', () => {
        canvas.setDimensions({ width: window.innerWidth - 70, height: window.innerHeight });
    });
</script>
</body>
</html>
