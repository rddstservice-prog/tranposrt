<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile Beta v0.4.5 - Fix Precision</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root { --bg: #1a1a1a; --menu-w: 65px; --accent: #FF9800; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); overflow: hidden; color: white; font-family: sans-serif; touch-action: none; }
        #app { display: flex; width: 100vw; height: 100vh; }
        
        #sidebar { width: var(--menu-w); background: #252525; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 10px 4px; gap: 10px; z-index: 100; align-items: center; }
        .menu-btn { width: 85%; aspect-ratio: 1/1; background: #333; border: 1px solid #444; border-radius: 10px; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; -webkit-tap-highlight-color: transparent; }
        .menu-btn.active { border-color: var(--accent); background: rgba(255, 152, 0, 0.2); color: var(--accent); }

        #canvas-container { flex-grow: 1; position: relative; background: #000; overflow: hidden; }

        /* Контейнер лупы */
        #magnifier-wrap {
            position: absolute;
            pointer-events: none;
            display: none;
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            will-change: left, top;
        }

        #magnifier { 
            width: 120px; height: 120px; 
            border: 2px solid var(--accent); 
            border-radius: 50%; 
            overflow: hidden; 
            background: #111; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative;
        }

        #hint { 
            background: var(--accent); color: #000; 
            padding: 3px 8px; border-radius: 4px; 
            font-size: 10px; font-weight: 900; 
            margin-bottom: 8px; white-space: nowrap;
        }

        .crosshair { position: absolute; top: 0; left: 0; width: 120px; height: 120px; pointer-events: none; }
        .crosshair::before { content: ''; position: absolute; top: 60px; left: 0; width: 120px; height: 1px; background: var(--accent); opacity: 0.8; }
        .crosshair::after { content: ''; position: absolute; left: 60px; top: 0; width: 1px; height: 120px; background: var(--accent); opacity: 0.8; }
    </style>
</head>
<body>

<div id="app">
    <aside id="sidebar">
        <div class="menu-btn" onclick="document.getElementById('map-upload').click()"><i>🖼️</i><span>КАРТА</span></div>
        <div class="menu-btn" id="scale-btn" onclick="toggleScaleMode()"><i>📏</i><span>МАСШТАБ</span></div>
        <input type="file" id="map-upload" accept="image/*" style="display:none" onchange="handleMapUpload(event)">
    </aside>
    <main id="canvas-container">
        <div id="magnifier-wrap">
            <div id="hint">Удерживайте для точки</div>
            <div id="magnifier">
                <canvas id="mag-canvas" width="120" height="120"></canvas>
                <div class="crosshair"></div>
            </div>
        </div>
        <canvas id="c"></canvas>
    </main>
</div>

<script>
    const canvas = new fabric.Canvas('c', {
        width: window.innerWidth - 65,
        height: window.innerHeight,
        backgroundColor: '#000',
        selection: false
    });

    const magWrap = document.getElementById('magnifier-wrap');
    const magCanvasEl = document.getElementById('mag-canvas');
    const magCtx = magCanvasEl.getContext('2d', { alpha: false });
    
    let isScaleMode = false, calTimer = null;
    let lastX = 0, lastY = 0;
    
    const MAG_SIZE = 120;
    const VISUAL_OFFSET = 150; // Расстояние от пальца до центра лупы

    function handleMapUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                canvas.clear();
                img.set({ left: canvas.width/2, top: canvas.height/2, originX: 'center', originY: 'center', selectable: false });
                img.scale(Math.min(canvas.width/img.width, canvas.height/img.height)*0.9);
                canvas.add(img).sendToBack().renderAll();
            });
        };
        reader.readAsDataURL(file);
    }

    function toggleScaleMode() {
        isScaleMode = !isScaleMode;
        document.getElementById('scale-btn').classList.toggle('active', isScaleMode);
        if (!isScaleMode) magWrap.style.display = 'none';
    }

    // КЛЮЧЕВАЯ ФУНКЦИЯ: Расчет точного указателя под лупой
    function getPointerUnderMagnifier(clientX, clientY) {
        // Мы хотим знать, что находится по координатам: 
        // X пальца и Y пальца минус смещение лупы
        return canvas.getPointer({
            clientX: clientX,
            clientY: clientY - VISUAL_OFFSET
        });
    }

    function updateMagnifierUI(touch) {
        if (!isScaleMode || !touch) return;

        // 1. Позиционируем саму лупу точно над пальцем (центровка по X)
        const wrapX = touch.clientX - MAG_SIZE / 2;
        const wrapY = touch.clientY - VISUAL_OFFSET - (MAG_SIZE / 2) - 25; // -25 для учета высоты хинта

        magWrap.style.left = `${wrapX}px`;
        magWrap.style.top = `${wrapY}px`;
        magWrap.style.display = 'flex';

        // 2. Отрисовываем содержимое
        const ptr = getPointerUnderMagnifier(touch.clientX, touch.clientY);
        const zoom = canvas.getZoom();
        
        magCtx.save();
        magCtx.fillStyle = "#111";
        magCtx.fillRect(0, 0, MAG_SIZE, MAG_SIZE);
        
        // Переносим начало координат в центр маленького холста
        magCtx.translate(MAG_SIZE / 2, MAG_SIZE / 2);
        // Масштабируем (8x зум лупы)
        magCtx.scale(8 * zoom, 8 * zoom); 
        // Сдвигаем картинку так, чтобы точка ptr оказалась в 0,0 (центре лупы)
        magCtx.translate(-ptr.x, -ptr.y);
        
        canvas.getObjects().forEach(obj => {
            if (obj.visible) obj.render(magCtx);
        });
        
        magCtx.restore();
    }

    canvas.upperCanvasEl.addEventListener('touchstart', (e) => {
        if (e.touches.length > 1) return;
        const touch = e.touches[0];
        lastX = touch.clientX; lastY = touch.clientY;
        
        if (isScaleMode) {
            updateMagnifierUI(touch);
            clearTimeout(calTimer);
            calTimer = setTimeout(() => {
                const ptr = getPointerUnderMagnifier(touch.clientX, touch.clientY);
                const dot = new fabric.Circle({
                    left: ptr.x, top: ptr.y, radius: 5/canvas.getZoom(),
                    fill: '#ff3b30', stroke: 'white', strokeWidth: 2/canvas.getZoom(),
                    originX: 'center', originY: 'center', selectable: false
                });
                canvas.add(dot).requestRenderAll();
                updateMagnifierUI(touch);
            }, 800);
        }
    });

    canvas.upperCanvasEl.addEventListener('touchmove', (e) => {
        if (e.touches.length > 1) return;
        const touch = e.touches[0];
        
        if (isScaleMode) {
            updateMagnifierUI(touch);
            if (Math.hypot(touch.clientX - lastX, touch.clientY - lastY) > 10) clearTimeout(calTimer);
        } else {
            const vpt = canvas.viewportTransform;
            vpt[4] += (touch.clientX - lastX);
            vpt[5] += (touch.clientY - lastY);
            canvas.requestRenderAll();
        }
        lastX = touch.clientX; lastY = touch.clientY;
        e.preventDefault();
    }, { passive: false });

    canvas.upperCanvasEl.addEventListener('touchend', () => {
        clearTimeout(calTimer);
        magWrap.style.display = 'none';
    });

</script>
</body>
</html>
