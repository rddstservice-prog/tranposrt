<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile Beta v0.5.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root { --bg: #1a1a1a; --menu-w: 65px; --accent: #FF9800; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); overflow: hidden; color: white; font-family: sans-serif; touch-action: none; }
        #app { display: flex; width: 100vw; height: 100vh; }
        
        #sidebar { width: var(--menu-w); background: #252525; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 10px 4px; gap: 10px; z-index: 100; align-items: center; }
        .menu-btn { width: 85%; aspect-ratio: 1/1; background: #333; border: 1px solid #444; border-radius: 10px; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; -webkit-tap-highlight-color: transparent; }
        .menu-btn.active { border-color: var(--accent); background: rgba(255, 152, 0, 0.2); color: var(--accent); }

        #canvas-container { flex-grow: 1; position: relative; background: #000; overflow: hidden; }

        #magnifier-wrap {
            position: absolute;
            pointer-events: none;
            display: none;
            z-index: 1000;
            flex-direction: column; /* Надпись сверху */
            align-items: center;
            transform: translate(-50%, -100%);
            will-change: transform, left, top;
        }

        #magnifier { 
            width: 120px; height: 120px; 
            border: 2px solid var(--accent); 
            border-radius: 50%; 
            overflow: hidden; 
            background: #111; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative;
            order: 2; /* Линза под надписью */
        }

        #hint { 
            background: var(--accent); color: #000; 
            padding: 3px 8px; border-radius: 4px; 
            font-size: 10px; font-weight: 900; 
            margin-bottom: 12px; /* Отступ вниз к линзе */
            white-space: nowrap;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
            order: 1;
        }

        #mag-canvas { width: 100%; height: 100%; }

        .crosshair { position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; transform: translate(-50%, -50%); }
        .crosshair::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: var(--accent); opacity: 0.8; }
        .crosshair::after { content: ''; position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: var(--accent); opacity: 0.8; }

        /* Диалоговое окно */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000;
            display: none; justify-content: center; align-items: center;
        }
        .modal {
            background: #252525; padding: 20px; border-radius: 15px;
            border: 1px solid var(--accent); text-align: center; width: 200px;
        }
        .modal input {
            width: 80%; background: #333; border: 1px solid #555;
            color: white; padding: 10px; margin: 15px 0; border-radius: 8px;
            text-align: center; font-size: 18px;
        }
        .modal button {
            background: var(--accent); border: none; color: black;
            padding: 10px 20px; border-radius: 8px; font-weight: bold; width: 100%;
        }
    </style>
</head>
<body>
<div id="modal-overlay">
    <div class="modal">
        <div style="font-size: 12px; margin-bottom: 5px;">Расстояние (метры)</div>
        <input type="number" id="dist-input" value="100">
        <button onclick="confirmScale()">ПРИНЯТЬ ✓</button>
    </div>
</div>

<div id="app">
    <aside id="sidebar">
        <div style="font-size: 8px; opacity: 0.3;">v0.5.0</div>
        <div class="menu-btn" onclick="document.getElementById('map-upload').click()"><i>🖼️</i><span>КАРТА</span></div>
        <div class="menu-btn" id="scale-btn" onclick="toggleScaleMode()"><i>📏</i><span>МАСШТАБ</span></div>
        <input type="file" id="map-upload" accept="image/*" style="display:none" onchange="handleMapUpload(event)">
    </aside>
    <main id="canvas-container">
        <div id="magnifier-wrap">
            <div id="magnifier">
                <canvas id="mag-canvas" width="120" height="120"></canvas>
                <div class="crosshair"></div>
            </div>
            <div id="hint">Удерживайте для точки</div>
        </div>
        <canvas id="c"></canvas>
    </main>
</div>

<script>
    const canvas = new fabric.Canvas('c', {
        width: window.innerWidth - 65,
        height: window.innerHeight,
        backgroundColor: '#000',
        selection: false,
        renderOnAddRemove: false
    });

    const magWrap = document.getElementById('magnifier-wrap');
    const magCanvasEl = document.getElementById('mag-canvas');
    const magCtx = magCanvasEl.getContext('2d', { alpha: false });
    const hint = document.getElementById('hint');
    const modal = document.getElementById('modal-overlay');

    let isScaleMode = false, calPoints = [], calTimer = null;
    let initialDist = 0, initialZoom = 1;
    let lastX = 0, lastY = 0;
    let isMultiTouch = false;
    let rafId = null;

    // ВЫСОТА: конструкция теперь выше (220px)
    const VISUAL_OFFSET = 220; 

    function handleMapUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                canvas.clear();
                img.set({ left: canvas.width/2, top: canvas.height/2, originX: 'center', originY: 'center', selectable: false, evented: false });
                img.scale(Math.min(canvas.width/img.width, canvas.height/img.height)*0.9);
                canvas.add(img).sendToBack().renderAll();
            });
        };
        reader.readAsDataURL(file);
    }

    function toggleScaleMode() {
        isScaleMode = !isScaleMode;
        document.getElementById('scale-btn').classList.toggle('active', isScaleMode);
        if (!isScaleMode) { 
            calPoints = []; 
            canvas.getObjects('circle').forEach(o => canvas.remove(o)); 
            magWrap.style.display = 'none';
        } else { hint.innerText = "Удерживайте для точки"; }
        canvas.renderAll();
    }

    function getPointerUnderCrosshair(clientX, clientY) {
        return canvas.getPointer({
            clientX: clientX,
            clientY: clientY - VISUAL_OFFSET
        });
    }

    function updateMagnifierUI(touch) {
        if (!isScaleMode || !touch || isMultiTouch) {
            magWrap.style.display = 'none';
            return;
        }

        // ЦЕНТР ПО ОСИ X: убрано смещение -32px
        magWrap.style.left = `${touch.clientX}px`;
        magWrap.style.top = `${touch.clientY - 20}px`; 
        magWrap.style.display = 'flex';

        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(() => {
            const ptr = getPointerUnderCrosshair(touch.clientX, touch.clientY);
            const zoom = canvas.getZoom();
            
            magCtx.save();
            magCtx.imageSmoothingEnabled = false;
            magCtx.fillStyle = "#111";
            magCtx.fillRect(0, 0, 120, 120);
            magCtx.translate(60, 60);
            magCtx.scale(10 * zoom, 10 * zoom);
            magCtx.translate(-ptr.x, -ptr.y);
            
            canvas.getObjects().forEach(obj => obj.render(magCtx));
            magCtx.restore();
        });
    }

    function confirmScale() {
        modal.style.display = 'none';
        const meters = document.getElementById('dist-input').value;
        alert(`Масштаб установлен: ${meters}м`);
        toggleScaleMode();
    }

    canvas.upperCanvasEl.addEventListener('touchstart', (e) => {
        if (e.touches.length >= 2) {
            isMultiTouch = true;
            clearTimeout(calTimer);
            magWrap.style.display = 'none';
            initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            initialZoom = canvas.getZoom();
        } else {
            isMultiTouch = false;
            const touch = e.touches[0];
            lastX = touch.clientX; lastY = touch.clientY;
            
            if (isScaleMode) {
                updateMagnifierUI(touch);
                clearTimeout(calTimer);
                calTimer = setTimeout(() => {
                    if (isMultiTouch) return;
                    const ptr = getPointerUnderCrosshair(touch.clientX, touch.clientY); 
                    const dot = new fabric.Circle({
                        left: ptr.x, top: ptr.y, radius: 5/canvas.getZoom(),
                        fill: '#ff3b30', stroke: 'white', strokeWidth: 1/canvas.getZoom(),
                        originX: 'center', originY: 'center', selectable: false
                    });
                    
                    canvas.add(dot).requestRenderAll();
                    calPoints.push({...ptr});
                    updateMagnifierUI(touch);

                    if (calPoints.length === 1) hint.innerText = "Вторая точка";
                    else if (calPoints.length === 2) { 
                        magWrap.style.display = 'none';
                        modal.style.display = 'flex';
                    }
                }, 1000);
            }
        }
    }, { passive: false });

    canvas.upperCanvasEl.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        if (e.touches.length >= 2) {
            const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            canvas.zoomToPoint({ x: (e.touches[0].clientX + e.touches[1].clientX)/2 - 65, y: (e.touches[0].clientY + e.touches[1].clientY)/2 }, initialZoom * (dist / initialDist));
        } else if (!isMultiTouch) {
            if (isScaleMode) {
                updateMagnifierUI(touch);
                if (Math.hypot(touch.clientX - lastX, touch.clientY - lastY) > 5) clearTimeout(calTimer);
            } else {
                const vpt = canvas.viewportTransform;
                vpt[4] += (touch.clientX - lastX); vpt[5] += (touch.clientY - lastY);
                canvas.requestRenderAll();
            }
            lastX = touch.clientX; lastY = touch.clientY;
        }
        e.preventDefault();
    }, { passive: false });

    canvas.upperCanvasEl.addEventListener('touchend', () => {
        clearTimeout(calTimer);
        magWrap.style.display = 'none';
        isMultiTouch = false;
        if (rafId) cancelAnimationFrame(rafId);
    });

    window.addEventListener('resize', () => {
        canvas.setDimensions({ width: window.innerWidth - 65, height: window.innerHeight });
    });
</script>
</body>
</html>
