<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Heavy Haul Simulation – Mobile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        /* ваши оригинальные стили + небольшие дополнения */
        :root {
            --bg: #1a1a1a;
            --menu-w: 65px;
            --accent: #FF9800;
            --cross-size: 30px;
        }
        body, html {
            margin: 0; padding: 0; height: 100%; background: var(--bg);
            overflow: hidden; color: white; font-family: sans-serif; touch-action: none;
        }
        #app { display: flex; width: 100vw; height: 100vh; }
        #sidebar {
            width: var(--menu-w); background: #252525; border-right: 1px solid #333;
            display: flex; flex-direction: column; padding: 10px 4px; gap: 10px;
            z-index: 100; align-items: center;
        }
        .menu-btn {
            width: 85%; aspect-ratio: 1/1; background: #333; border: 1px solid #444;
            border-radius: 10px; color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-size: 9px;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }
        .menu-btn.active {
            border-color: var(--accent); background: rgba(255,152,0,0.2); color: var(--accent);
        }
        #canvas-container { flex-grow: 1; position: relative; background: #000; overflow: hidden; }
        #dist-modal { /* ... прежний ... */ }
    </style>
</head>
<body>
<div id="dist-modal"></div>
<div id="app">
    <aside id="sidebar">
        <div style="font-size:8px;opacity:0.3;">v0.7 SIM</div>
        <div class="menu-btn" id="map-btn">🖼️<span>КАРТА</span></div>
        <div class="menu-btn" id="scale-btn">📏<span>МАСШТАБ</span></div>
        <div class="menu-btn" id="measure-btn">📐<span>ИЗМЕРИТЬ</span></div>
        <div class="menu-btn" id="sim-btn">🚛<span>СИМ</span></div>
        <input type="file" id="map-upload" accept="image/*" style="display:none">
    </aside>
    <main id="canvas-container">
        <canvas id="c"></canvas>
    </main>
</div>

<script>
    // ========== БАЗОВЫЕ ПЕРЕМЕННЫЕ ==========
    const canvasContainer = document.getElementById('canvas-container');
    const canvas = new fabric.Canvas('c', {
        width: window.innerWidth - 65,
        height: window.innerHeight,
        backgroundColor: '#000',
        selection: false,
        renderOnAddRemove: false
    });

    let currentTool = 'none';   // 'scale','measure','simulate'
    let pixelsPerMeter = null;
    let calPoints = [];
    let tempLine = null, tempCircle = null;

    // Режим симуляции
    let simActive = false;
    let roadTrainGroup = null;   // fabric.Group всей сцепки
    let trailerData = [];        // массив описаний трейлеров
    const SIM = {
        tractorAngle: 0,        // угол α между тягачом и платформой (рад)
        platformAngle: 0,       // глобальный угол платформы
        pinX: 0, pinY: 0,       // координаты шкворня в canvas
        icr: null,              // {x,y} центр поворота
        radius: 0
    };

    // Геометрия (метры)
    const GEOM = {
        tractor: { length: 7.5, width: 2.5, wheelBase: 5.5 },  // шкворень от передка 5.5м
        gooseneck: { length: 3.8, width: 2.5, pinOffset: 0.55 },
        axleTrack: 1.8,   // колея
        axleBase: 1.5,    // база между соседними осями
        overhang: 0.75,   // свес от оси до края рамы
        maxAxleAngle: 50 * Math.PI/180
    };

    // ========== ИНИЦИАЛИЗАЦИЯ ИНСТРУМЕНТОВ ==========
    const mapBtn = document.getElementById('map-btn');
    const scaleBtn = document.getElementById('scale-btn');
    const measureBtn = document.getElementById('measure-btn');
    const simBtn = document.getElementById('sim-btn');
    const mapUpload = document.getElementById('map-upload');

    mapBtn.addEventListener('click', () => mapUpload.click());
    scaleBtn.addEventListener('click', () => activateTool('scale'));
    measureBtn.addEventListener('click', () => activateTool('measure'));
    simBtn.addEventListener('click', () => activateTool('simulate'));

    mapUpload.addEventListener('change', handleMapUpload);

    function activateTool(tool) {
        if (currentTool === tool) {
            currentTool = 'none';
            resetAllTools();
        } else {
            currentTool = tool;
            resetAllTools();
            if (tool === 'simulate') startSimulation();
        }
        updateActiveButtons();
    }

    function resetAllTools() {
        calPoints = [];
        canvas.getObjects('circle').forEach(o => canvas.remove(o));
        clearTempPreview();
        if (roadTrainGroup) {
            canvas.remove(roadTrainGroup);
            roadTrainGroup = null;
        }
        simActive = false;
        // убрать вспомогательные линии ICR, если есть
        canvas.getObjects('line').forEach(o => {
            if (o.data && o.data.isHelper) canvas.remove(o);
        });
        canvas.renderAll();
    }

    function updateActiveButtons() {
        scaleBtn.classList.toggle('active', currentTool === 'scale');
        measureBtn.classList.toggle('active', currentTool === 'measure');
        simBtn.classList.toggle('active', currentTool === 'simulate');
    }

    // ========== ЗАГРУЗКА КАРТЫ (ОСТАЁТСЯ) ==========
    function handleMapUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                canvas.clear();
                img.set({ left: canvas.width/2, top: canvas.height/2, originX:'center', originY:'center', selectable:false, evented:false });
                img.scale(Math.min(canvas.width/img.width, canvas.height/img.height) * 0.9);
                canvas.add(img).sendToBack().renderAll();
            });
        };
        reader.readAsDataURL(file);
    }

    // ========== СИМУЛЯЦИЯ: ПОСТРОЕНИЕ АВТОПОЕЗДА ==========
    function buildTrailerConfig() {
        // по умолчанию: 2ос + 3ос + 4ос + 5ос
        return [2, 3, 4, 5];
    }

    function getTrailerLength(numAxles) {
        if (numAxles <= 1) return 0;
        return 3.0 + (numAxles - 2) * 1.5; // метров
    }

    function startSimulation() {
        simActive = true;
        const axleCounts = buildTrailerConfig();
        trailerData = axleCounts.map((n, idx) => ({
            axles: n,
            length: getTrailerLength(n),
            wheelBase: (n-1) * GEOM.axleBase
        }));

        // Начальное положение: ось X вправо, ось Y вниз (как на canvas)
        // Шкворень поместим в центр экрана
        SIM.pinX = canvas.width / 2;
        SIM.pinY = canvas.height / 2;
        SIM.tractorAngle = 0;
        SIM.platformAngle = 0;

        drawRoadTrain();
    }

    function drawRoadTrain() {
        if (roadTrainGroup) canvas.remove(roadTrainGroup);

        const objects = [];
        const scale = pixelsPerMeter || 50; // 1 метр = 50 пикселей по умолчанию

        // --- Тягач ---
        const tractorLen = GEOM.tractor.length * scale;
        const tractorW = GEOM.tractor.width * scale;
        const pinDist = GEOM.tractor.wheelBase * scale; // от передка до шкворня
        // Тягач рисуем от шкворня назад? Удобнее: кабина впереди, шкворень сзади.
        // Центр тягача: смещён вперёд от шкворня на pinDist/2 (если шкворень на 5.5 от передка, то от центра тягача до шкворня = 7.5/2 - 5.5 = -1.75? Не вяжется.)
        // Проще: зададим прямоугольник тягача так, чтобы шкворень находился на его заднем краю? По описанию шкворень расположен "где-то 5500м от начала кабины", при длине 7.5м это почти самый зад. Будем считать, что шкворень находится на расстоянии 5.5м от переднего бампера, т.е. от заднего края 2.0м.
        const tractorCenterX = SIM.pinX - (tractorLen/2 - pinDist) * Math.cos(SIM.platformAngle + SIM.tractorAngle);
        const tractorCenterY = SIM.pinY - (tractorLen/2 - pinDist) * Math.sin(SIM.platformAngle + SIM.tractorAngle);
        const tractor = new fabric.Rect({
            left: tractorCenterX, top: tractorCenterY,
            width: tractorLen, height: tractorW,
            fill: '#2c3e50', stroke: '#ecf0f1', strokeWidth: 2,
            originX: 'center', originY: 'center',
            angle: (SIM.platformAngle + SIM.tractorAngle) * 180/Math.PI,
            selectable: false, evented: false
        });
        objects.push(tractor);

        // --- Гуснек ---
        const gooseneckLen = GEOM.gooseneck.length * scale;
        const gooseneckW = GEOM.gooseneck.width * scale;
        const pinOnGooseneck = GEOM.gooseneck.pinOffset * scale; // от начала гуснека до его шкворня
        // Шкворень гуснека совпадает с шкворнем тягача (точка сцепки).
        // Гуснек направлен вдоль платформы (угол platformAngle).
        const gooseneckCenterX = SIM.pinX + (gooseneckLen/2 - pinOnGooseneck) * Math.cos(SIM.platformAngle);
        const gooseneckCenterY = SIM.pinY + (gooseneckLen/2 - pinOnGooseneck) * Math.sin(SIM.platformAngle);
        const gooseneck = new fabric.Rect({
            left: gooseneckCenterX, top: gooseneckCenterY,
            width: gooseneckLen, height: gooseneckW,
            fill: '#7f8c8d', stroke: '#bdc3c7', strokeWidth: 2,
            originX: 'center', originY: 'center',
            angle: SIM.platformAngle * 180/Math.PI,
            selectable: false, evented: false
        });
        objects.push(gooseneck);

        // --- Трейлеры ---
        let startX = SIM.pinX + (gooseneckLen - pinOnGooseneck) * Math.cos(SIM.platformAngle);
        let startY = SIM.pinY + (gooseneckLen - pinOnGooseneck) * Math.sin(SIM.platformAngle);
        const allTrailerObjects = [];

        trailerData.forEach((trailer, idx) => {
            const len = trailer.length * scale;
            const w = GEOM.gooseneck.width * scale; // ширина как у гуснека
            const cx = startX + (len/2) * Math.cos(SIM.platformAngle);
            const cy = startY + (len/2) * Math.sin(SIM.platformAngle);
            const rect = new fabric.Rect({
                left: cx, top: cy,
                width: len, height: w,
                fill: idx % 2 === 0 ? '#34495e' : '#2c3e50',
                stroke: '#95a5a6', strokeWidth: 2,
                originX: 'center', originY: 'center',
                angle: SIM.platformAngle * 180/Math.PI,
                selectable: false, evented: false
            });
            objects.push(rect);

            // Оси на трейлере
            const axleYOffsets = [];
            const totalAxles = trailer.axles;
            const overhang = GEOM.overhang * scale;
            const axleSpacing = GEOM.axleBase * scale;
            const firstAxleFromFront = overhang;
            for (let a = 0; a < totalAxles; a++) {
                const offsetFromFront = firstAxleFromFront + a * axleSpacing;
                const offsetFromCenter = offsetFromFront - len/2;
                const axleX = cx + offsetFromCenter * Math.cos(SIM.platformAngle);
                const axleY = cy + offsetFromCenter * Math.sin(SIM.platformAngle);
                // Определим угол этой оси
                const alphaFront = Math.min(Math.max(SIM.tractorAngle, -GEOM.maxAxleAngle), GEOM.maxAxleAngle);
                const alphaRear = Math.min(Math.max(-SIM.tractorAngle, -GEOM.maxAxleAngle), GEOM.maxAxleAngle);
                const t = totalAxles > 1 ? a / (totalAxles - 1) : 0;
                const axleAngle = SIM.platformAngle + (alphaFront + t * (alphaRear - alphaFront));
                // Рисуем линию оси (колея)
                const halfTrack = (GEOM.axleTrack / 2) * scale;
                const dx = halfTrack * Math.cos(axleAngle + Math.PI/2);
                const dy = halfTrack * Math.sin(axleAngle + Math.PI/2);
                const line = new fabric.Line(
                    [axleX - dx, axleY - dy, axleX + dx, axleY + dy],
                    { stroke: '#e74c3c', strokeWidth: 3, selectable: false, evented: false }
                );
                objects.push(line);
                // колёса (просто кружки)
                const wheelRadius = 0.2 * scale;
                const leftWheel = new fabric.Circle({
                    left: axleX - dx, top: axleY - dy,
                    radius: wheelRadius, fill: '#111', stroke: '#fff', strokeWidth: 1,
                    originX: 'center', originY: 'center', selectable: false, evented: false
                });
                const rightWheel = new fabric.Circle({
                    left: axleX + dx, top: axleY + dy,
                    radius: wheelRadius, fill: '#111', stroke: '#fff', strokeWidth: 1,
                    originX: 'center', originY: 'center', selectable: false, evented: false
                });
                objects.push(leftWheel, rightWheel);
            }

            startX += len * Math.cos(SIM.platformAngle);
            startY += len * Math.sin(SIM.platformAngle);
        });

        roadTrainGroup = new fabric.Group(objects, {
            selectable: false, evented: false
        });
        canvas.add(roadTrainGroup);
        canvas.renderAll();
    }

    // ========== ОБРАБОТКА ПЕРЕТАСКИВАНИЯ ТЯГАЧА В РЕЖИМЕ СИМ ==========
    canvas.on('mouse:down', opt => {
        if (currentTool !== 'simulate') return;
        const pointer = canvas.getPointer(opt.e);
        // проверим, попали ли в тягач (приблизительно)
        if (isNearTractor(pointer)) {
            canvas.on('mouse:move', onTractorDrag);
            canvas.on('mouse:up', onTractorRelease);
        }
    });

    function isNearTractor(pointer) {
        // простой хит по прямоугольнику тягача
        const scale = pixelsPerMeter || 50;
        const tractorLen = GEOM.tractor.length * scale;
        const tractorW = GEOM.tractor.width * scale;
        const pinDist = GEOM.tractor.wheelBase * scale;
        const cx = SIM.pinX - (tractorLen/2 - pinDist) * Math.cos(SIM.platformAngle + SIM.tractorAngle);
        const cy = SIM.pinY - (tractorLen/2 - pinDist) * Math.sin(SIM.platformAngle + SIM.tractorAngle);
        const angle = (SIM.platformAngle + SIM.tractorAngle);
        const dx = pointer.x - cx;
        const dy = pointer.y - cy;
        const cos = Math.cos(-angle);
        const sin = Math.sin(-angle);
        const localX = dx * cos - dy * sin;
        const localY = dx * sin + dy * cos;
        return Math.abs(localX) <= tractorLen/2 + 10 && Math.abs(localY) <= tractorW/2 + 10;
    }

    function onTractorDrag(opt) {
        const pointer = canvas.getPointer(opt.e);
        const dx = pointer.x - SIM.pinX;
        const dy = pointer.y - SIM.pinY;
        // угол между направлением на палец и осью платформы
        const platformDir = SIM.platformAngle;
        const pointerAngle = Math.atan2(dy, dx);
        let alpha = pointerAngle - platformDir;
        // нормируем в [-PI, PI]
        while (alpha > Math.PI) alpha -= 2*Math.PI;
        while (alpha < -Math.PI) alpha += 2*Math.PI;
        // ограничим +/- 90°
        alpha = Math.min(Math.PI/2, Math.max(-Math.PI/2, alpha));
        SIM.tractorAngle = alpha;
        drawRoadTrain();
        drawICR();
    }

    function onTractorRelease() {
        canvas.off('mouse:move', onTractorDrag);
        canvas.off('mouse:up', onTractorRelease);
    }

    // ========== РАСЧЁТ И ОТРИСОВКА ICR ==========
    function drawICR() {
        // удаляем старые вспомогательные линии
        canvas.getObjects('line').forEach(o => {
            if (o.data && o.data.isHelper) canvas.remove(o);
        });
        if (!simActive || trailerData.length === 0) return;

        const scale = pixelsPerMeter || 50;
        const alpha = SIM.tractorAngle;
        const side = alpha > 0 ? 'left' : 'right';
        const sign = side === 'left' ? 1 : -1;

        // первая ось первого трейлера
        const firstTrailer = trailerData[0];
        const firstAxleDist = GEOM.overhang; // метров
        const gooseneckLen = GEOM.gooseneck.length;
        const gooseneckPin = GEOM.gooseneck.pinOffset;
        const distFromPin = (gooseneckLen - gooseneckPin) + firstAxleDist; // расстояние от шкворня до первой оси
        const axle1X = SIM.pinX + distFromPin * scale * Math.cos(SIM.platformAngle);
        const axle1Y = SIM.pinY + distFromPin * scale * Math.sin(SIM.platformAngle);
        // точка колеса
        const halfTrack = (GEOM.axleTrack/2) * scale;
        const perpAngle = SIM.platformAngle + Math.PI/2;
        const wheel1X = axle1X + sign * halfTrack * Math.cos(perpAngle);
        const wheel1Y = axle1Y + sign * halfTrack * Math.sin(perpAngle);
        const axle1Angle = SIM.platformAngle + Math.min(Math.max(alpha, -GEOM.maxAxleAngle), GEOM.maxAxleAngle);
        const dir1X = Math.cos(axle1Angle);
        const dir1Y = Math.sin(axle1Angle);

        // последняя ось последнего трейлера
        const lastTrailer = trailerData[trailerData.length-1];
        let totalPlatformLen = 0;
        for (let t of trailerData) totalPlatformLen += t.length;
        const lastAxleFromPin = (gooseneckLen - gooseneckPin) + totalPlatformLen - GEOM.overhang;
        const axle2X = SIM.pinX + lastAxleFromPin * scale * Math.cos(SIM.platformAngle);
        const axle2Y = SIM.pinY + lastAxleFromPin * scale * Math.sin(SIM.platformAngle);
        const wheel2X = axle2X + sign * halfTrack * Math.cos(perpAngle);
        const wheel2Y = axle2Y + sign * halfTrack * Math.sin(perpAngle);
        const axle2Angle = SIM.platformAngle + Math.min(Math.max(-alpha, -GEOM.maxAxleAngle), GEOM.maxAxleAngle);
        const dir2X = Math.cos(axle2Angle);
        const dir2Y = Math.sin(axle2Angle);

        // перпендикуляры
        const perp1X = -dir1Y, perp1Y = dir1X;  // просто поворот на 90°
        const perp2X = -dir2Y, perp2Y = dir2X;

        // находим пересечение двух прямых (wheel1 + t1*perp1 = wheel2 + t2*perp2)
        const det = perp1X * perp2Y - perp1Y * perp2X;
        if (Math.abs(det) < 1e-9) return;
        const dWx = wheel2X - wheel1X;
        const dWy = wheel2Y - wheel1Y;
        const t1 = (dWx * perp2Y - dWy * perp2X) / det;
        const icrX = wheel1X + t1 * perp1X;
        const icrY = wheel1Y + t1 * perp1Y;

        SIM.icr = { x: icrX, y: icrY };
        SIM.radius = Math.hypot(icrX - SIM.pinX, icrY - SIM.pinY);

        // рисуем линии перпендикуляров и точку ICR
        const line1 = new fabric.Line([wheel1X, wheel1Y, icrX, icrY], { stroke: '#f1c40f', strokeDashArray: [5,5], data: {isHelper: true} });
        const line2 = new fabric.Line([wheel2X, wheel2Y, icrX, icrY], { stroke: '#f1c40f', strokeDashArray: [5,5], data: {isHelper: true} });
        const icrCircle = new fabric.Circle({
            left: icrX, top: icrY, radius: 5, fill: '#e74c3c', stroke: 'white',
            originX: 'center', originY: 'center', data: {isHelper: true}
        });
        canvas.add(line1, line2, icrCircle);
        canvas.renderAll();
    }

    // ========== ОСТАЛЬНЫЕ ИНСТРУМЕНТЫ (ваши) БЕЗ ИЗМЕНЕНИЙ ==========
    // ... (функции clearTempPreview, resetToolState, placePoint и т.д. оставлены как в оригинале, 
    //      но для краткости не дублирую, т.к. они не затрагивают симуляцию)
</script>
</body>
</html>
