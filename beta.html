<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile Beta v0.4.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root { --bg: #1a1a1a; --menu-w: 70px; --accent: #FF9800; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); overflow: hidden; color: white; font-family: sans-serif; touch-action: none; }
        #app { display: flex; width: 100vw; height: 100vh; }
        
        #sidebar { width: var(--menu-w); background: #252525; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 10px 4px; gap: 10px; z-index: 100; align-items: center; }
        .menu-btn { width: 90%; aspect-ratio: 1/1; background: #333; border: 1px solid #444; border-radius: 12px; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; -webkit-tap-highlight-color: transparent; }
        .menu-btn.active { border-color: var(--accent); background: rgba(255, 152, 0, 0.2); color: var(--accent); }

        #canvas-container { flex-grow: 1; position: relative; background: #000; overflow: hidden; }

        #magnifier-wrap {
            position: absolute;
            pointer-events: none;
            display: none;
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            transform: translate(-50%, -50%);
        }

        #magnifier { 
            width: 180px; 
            height: 180px; 
            border: 3px solid var(--accent); 
            border-radius: 50%; 
            overflow: hidden; 
            background: #111; 
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
            position: relative;
        }

        #hint { 
            background: var(--accent); 
            color: #000; 
            padding: 4px 10px; 
            border-radius: 4px; 
            font-size: 10px; 
            font-weight: 900; 
            margin-top: 10px;
            white-space: nowrap;
        }

        #mag-canvas { width: 100%; height: 100%; }

        .crosshair { position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; transform: translate(-50%, -50%); }
        .crosshair::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: #ff3b30; }
        .crosshair::after { content: ''; position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: #ff3b30; }
    </style>
</head>
<body>
<div id="app">
    <aside id="sidebar">
        <div style="font-size: 9px; opacity: 0.3;">v0.4.0</div>
        <div class="menu-btn" onclick="document.getElementById('map-upload').click()"><i>🖼️</i><span>КАРТА</span></div>
        <div class="menu-btn" id="scale-btn" onclick="toggleScaleMode()"><i>📏</i><span>МАСШТАБ</span></div>
        <input type="file" id="map-upload" accept="image/*" style="display:none" onchange="handleMapUpload(event)">
    </aside>
    <main id="canvas-container">
        <div id="magnifier-wrap">
            <div id="magnifier">
                <canvas id="mag-canvas" width="180" height="180"></canvas>
                <div class="crosshair"></div>
            </div>
            <div id="hint">Удерживайте для точки</div>
        </div>
        <canvas id="c"></canvas>
    </main>
</div>

<script>
    const canvas = new fabric.Canvas('c', {
        width: window.innerWidth - 70,
        height: window.innerHeight,
        backgroundColor: '#000',
        selection: false,
        stopContextMenu: true,
        renderOnAddRemove: true // Авто-рендер при добавлении
    });

    const magWrap = document.getElementById('magnifier-wrap');
    const magCanvasEl = document.getElementById('mag-canvas');
    const magCtx = magCanvasEl.getContext('2d', { alpha: false });
    const hint = document.getElementById('hint');

    let isScaleMode = false, calPoints = [], calTimer = null;
    let initialDist = 0, initialZoom = 1;
    let lastX = 0, lastY = 0;
    let lastMidX = 0, lastMidY = 0;
    let isMultiTouch = false;

    const OFFSET_FROM_FINGER = 130; 

    function handleMapUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                canvas.clear();
                img.set({ left: canvas.width/2, top: canvas.height/2, originX: 'center', originY: 'center', selectable: false, evented: false });
                img.scale(Math.min(canvas.width/img.width, canvas.height/img.height)*0.9);
                canvas.add(img).sendToBack().renderAll();
            });
        };
        reader.readAsDataURL(file);
    }

    function toggleScaleMode() {
        isScaleMode = !isScaleMode;
        document.getElementById('scale-btn').classList.toggle('active', isScaleMode);
        if (!isScaleMode) { 
            calPoints = []; 
            canvas.getObjects('circle').forEach(o => canvas.remove(o)); 
            magWrap.style.display = 'none';
        } else { hint.innerText = "Удерживайте для точки"; }
        canvas.renderAll();
    }

    function getTargetPoint(touch) {
        return canvas.getPointer({ 
            clientX: touch.clientX, 
            clientY: touch.clientY - OFFSET_FROM_FINGER 
        });
    }

    function updateMagnifierUI(touch) {
        if (!isScaleMode || !touch || isMultiTouch) return;
        
        magWrap.style.left = `${touch.clientX - 70}px`;
        magWrap.style.top = `${touch.clientY - OFFSET_FROM_FINGER}px`;
        magWrap.style.display = 'flex';

        const ptr = getTargetPoint(touch); 
        const zoom = canvas.getZoom();
        
        magCtx.save();
        magCtx.imageSmoothingEnabled = false;
        magCtx.fillStyle = "#111";
        magCtx.fillRect(0, 0, 180, 180);
        magCtx.translate(90, 90);
        magCtx.scale(8 * zoom, 8 * zoom); 
        magCtx.translate(-ptr.x, -ptr.y);
        
        // Метод renderCanvas отрисовывает текущие объекты Fabric в наш magCtx
        canvas.renderCanvas(magCtx, canvas.getObjects());
        magCtx.restore();
    }

    canvas.upperCanvasEl.addEventListener('touchstart', (e) => {
        if (e.touches.length >= 2) {
            isMultiTouch = true;
            clearTimeout(calTimer);
            magWrap.style.display = 'none';
            initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            initialZoom = canvas.getZoom();
            lastMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            lastMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        } else {
            isMultiTouch = false;
            const touch = e.touches[0];
            lastX = touch.clientX; lastY = touch.clientY;
            
            if (isScaleMode) {
                updateMagnifierUI(touch);
                clearTimeout(calTimer);
                calTimer = setTimeout(() => {
                    if (isMultiTouch) return;
                    const ptr = getTargetPoint(touch); 
                    const dot = new fabric.Circle({
                        left: ptr.x, top: ptr.y, radius: 5/canvas.getZoom(),
                        fill: '#ff3b30', stroke: 'white', strokeWidth: 1.5/canvas.getZoom(),
                        originX: 'center', originY: 'center', selectable: false,
                        objectCaching: false // Отключаем кэш для этого объекта
                    });
                    
                    canvas.add(dot);
                    dot.setCoords(); // Обновляем координаты для корректного рендера
                    canvas.renderAll(); 
                    
                    calPoints.push({...ptr});
                    
                    // Сразу форсируем обновление лупы, чтобы увидеть новую точку
                    updateMagnifierUI(touch);

                    if (calPoints.length === 1) {
                        hint.innerText = "Вторая точка";
                    } else if (calPoints.length === 2) { 
                        alert("Масштаб сохранен"); 
                        toggleScaleMode(); 
                    }
                }, 1000);
            }
        }
    }, { passive: false });

    canvas.upperCanvasEl.addEventListener('touchmove', (e) => {
        if (e.touches.length >= 2) {
            const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            const zoomPoint = { x: midX - 70, y: midY };
            canvas.zoomToPoint(zoomPoint, initialZoom * (dist / initialDist));
            const dx = midX - lastMidX;
            const dy = midY - lastMidY;
            const vpt = canvas.viewportTransform;
            vpt[4] += dx; vpt[5] += dy;
            canvas.requestRenderAll();
            lastMidX = midX; lastMidY = midY;
        } else if (e.touches.length === 1) {
            const touch = e.touches[0];
            const dx = touch.clientX - lastX;
            const dy = touch.clientY - lastY;
            if (isScaleMode) {
                updateMagnifierUI(touch);
                // Если палец двигается, сбрасываем таймер постановки точки
                if (Math.hypot(dx, dy) > 2) clearTimeout(calTimer);
            } else {
                const vpt = canvas.viewportTransform;
                vpt[4] += dx; vpt[5] += dy;
                canvas.requestRenderAll();
            }
            lastX = touch.clientX; lastY = touch.clientY;
        }
        e.preventDefault();
    }, { passive: false });

    canvas.upperCanvasEl.addEventListener('touchend', () => {
        clearTimeout(calTimer);
        // Скрываем лупу только если мы НЕ в режиме масштабирования или палец просто убран
        if (!isScaleMode || calPoints.length === 2) {
            magWrap.style.display = 'none';
        }
        isMultiTouch = false;
    });

    window.addEventListener('resize', () => {
        canvas.setDimensions({ width: window.innerWidth - 70, height: window.innerHeight });
    });
</script>
</body>
</html>
