<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HeavyTransport v0.1.0-beta</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
   <style>
    :root { --red: #A2231D; --border: #444; --blue: #2196F3; }
    * { box-sizing: border-box; -webkit-user-select: none; margin: 0; padding: 0; }
    body { 
        font-family: sans-serif; background: #000; color: white; 
        display: flex; height: 100dvh; width: 100vw; overflow: hidden; 
    }
    #sidebar { 
        width: 115px; min-width: 115px; background: #222; 
        border-right: 1px solid var(--border); display: flex; 
        flex-direction: column; padding: 10px 5px; gap: 8px; z-index: 999; 
        overflow-y: auto;
    }
    button { 
        width: 100%; padding: 12px 2px; border: none; border-radius: 6px; 
        font-size: 10px; font-weight: bold; cursor: pointer; color: white; 
    }
    .btn-blue { background: var(--blue); }
    .btn-red { background: var(--red); }
    #canvas-wrap { flex-grow: 1; position: relative; background: #333; overflow: hidden; }
    #c { touch-action: none; }
    .overlay-msg { 
        position: absolute; top: 15px; left: 50%; transform: translateX(-50%); 
        background: rgba(0,0,0,0.85); padding: 10px 20px; border-radius: 25px; 
        font-size: 11px; z-index: 100; display: none; border: 2px solid var(--blue); 
    }
</style>
</head>
<body>

<div id="hub-screen">
    <button class="btn-blue" onclick="startEditor()">ПЕРЕЙТИ К ТЕСТАМ</button>
</div>

<div id="main-app" style="display:none; width: 100%; height: 100%;">
    <div id="sidebar">
        <button class="btn-blue" onclick="document.getElementById('file-input').click()">🗺 КАРТА</button>
        <button class="btn-blue" id="cal-btn" onclick="toggleCalibration()">📏 МАСШТАБ</button>
        <button class="btn-red" onclick="addVehicle('Тягач', 7.8, 2.5, 'white', 5.55, 'truck')">ТЯГАЧ</button>
        <button class="btn-red" onclick="addCargo()">📦 ГРУЗ</button>
    </div>
    <input type="file" id="file-input" style="display:none" onchange="loadMap(event)">
    <div id="canvas-wrap">
        <div id="cal-msg" class="overlay-msg">УДЕРЖИВАЙТЕ 1 СЕК</div>
        <canvas id="c"></canvas>
    </div>
</div>

<script>
const canvas = new fabric.Canvas('c', { 
    selection: false, 
    allowTouchScrolling: false,
    imageSmoothingEnabled: false 
});

let PX_METER = 40, isCalibrating = false, calPoints = [];
let isDraggingCanvas = false, lastPosX, lastPosY, rotationTarget = null;

// Инициализация касания (mouseDown)
canvas.on('mouse:down', function(opt) {
    const evt = opt.e;
    const cX = evt.touches ? evt.touches[0].clientX : evt.clientX;
    const cY = evt.touches ? evt.touches[0].clientY : evt.clientY;
    const ptr = canvas.getPointer(evt);
    
    lastPosX = cX; lastPosY = cY;

    if (opt.target && opt.target.type === 'handle') {
        rotationTarget = opt.target.handleType;
        return;
    }

    if (!opt.target && !isCalibrating) {
        isDraggingCanvas = true;
    }
});

// Движение пальцем (mouseMove)
canvas.on('mouse:move', function(opt) {
    const evt = opt.e;
    const cX = evt.touches ? evt.touches[0].clientX : evt.clientX;
    const cY = evt.touches ? evt.touches[0].clientY : evt.clientY;

    if (isDraggingCanvas) {
        const vpt = canvas.viewportTransform;
        vpt[4] += cX - lastPosX;
        vpt[5] += cY - lastPosY;
        canvas.requestRenderAll();
    }
    lastPosX = cX; lastPosY = cY;
});

// Завершение касания
canvas.on('mouse:up', () => {
    isDraggingCanvas = false;
    rotationTarget = null;
});

// Зум (работает от колесика или щипка на некоторых тачпадах)
canvas.on('mouse:wheel', function(opt) {
    let delta = opt.e.deltaY;
    let zoom = canvas.getZoom() * (0.999 ** delta);
    if (zoom > 20) zoom = 20;
    if (zoom < 0.01) zoom = 0.01;
    canvas.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, zoom);
    opt.e.preventDefault();
});

function startEditor() {
    document.getElementById('hub-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'flex';
    canvas.setDimensions({ 
        width: document.getElementById('canvas-wrap').clientWidth, 
        height: document.getElementById('canvas-wrap').clientHeight 
    });
}
</script>
</body>
</html>
