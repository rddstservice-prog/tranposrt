<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HeavyTransport v0.1.0-beta</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

    <style>
        :root { --red: #A2231D; --border: #444; --blue: #2196F3; --orange: #FF8C00; }
        * { box-sizing: border-box; -webkit-user-select: none; }

        body {
            margin: 0; font-family: sans-serif; background: #000; color: white;
            display: flex; height: 100vh; height: 100dvh; width: 100vw; overflow: hidden; position: fixed;
        }

        #hub-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }
        .hub-title { font-size: 18px; font-weight: bold; margin-bottom: 30px; color: var(--blue); text-transform: uppercase; letter-spacing: 2px; }
        .hub-card { background: #222; border: 2px solid var(--border); padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; }

        #main-app { display: none; width: 100%; height: 100%; }

        #sidebar {
            width: 115px; min-width: 115px; background: #222; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 10px 5px; gap: 8px; z-index: 150;
            overflow-y: auto; touch-action: pan-y !important; -webkit-overflow-scrolling: touch;
            padding-top: env(safe-area-inset-top); height: 100%;
        }

        button { width: 100%; padding: 12px 2px; border: none; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; color: white; flex-shrink: 0; }
        .btn-tool { background: #444; } .btn-white { background: #fff; color: #000; } .btn-red { background: var(--red); } .btn-blue { background: var(--blue); } .btn-danger { background: #551111; }
        .btn-orange { background: var(--orange); color: black; }
        .btn-active-red { background: var(--red) !important; color: white !important; }

        .freeze-split { display: flex; width: 100%; gap: 2px; flex-shrink: 0; }
        .btn-fz { width: 50%; background: #008080; font-size: 7px; border: 1px solid #00ffff; padding: 12px 0; border-radius: 6px; }

        .section-label { font-size: 8px; color: #777; text-align: center; margin-top: 5px; text-transform: uppercase; flex-shrink: 0; }

        #canvas-wrap { flex-grow: 1; position: relative; background: #333; overflow: hidden; height: 100%; touch-action: none; }

        .opacity-wrap { padding: 5px; background: #333; border-radius: 6px; margin-top: 5px; flex-shrink: 0; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--blue); }

        .overlay-msg {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); color: white; padding: 10px 20px; border-radius: 15px;
            font-size: 11px; z-index: 1000; display: none; border: 2px solid var(--blue);
        }

        .bottom-ctrl {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); padding: 12px; border-radius: 20px;
            display: none; z-index: 1100; flex-direction: column; gap: 8px; align-items: center; min-width: 150px;
        }
        .ctrl-row { display: flex; gap: 6px; justify-content: center; }
        .btn-ovl { width: 38px; height: 38px; font-size: 18px; background: #444; color: white; border-radius: 8px; border: 1px solid #666; display: flex; align-items: center; justify-content: center; }
        .btn-ok { width: 100px; height: 35px; font-size: 11px; font-weight: bold; background: #4CAF50; color: white; border-radius: 8px; border: none; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="hub-screen">
    <div class="hub-title">Выберите редактор</div>
    <div class="hub-card" onclick="startEditor('truck-goose')"><h3>🚛 Тягач + Гусь</h3><p>Модульные перевозки THP</p></div>
</div>

<div id="main-app">
    <div id="sidebar">
        <div class="section-label">КАРТА</div>
        <button class="btn-tool" onclick="document.getElementById('file-input').click()">🗺 КАРТА</button>
        <button class="btn-blue" id="cal-btn" onclick="toggleCalibration()">📏 МАСШТАБ</button>

        <div class="section-label">МОДУЛЯЦИЯ</div>
        <div class="freeze-split">
            <button class="btn-fz" onclick="freezeModel('fwd')">❄️ ВПЕРЕД</button>
            <button class="btn-fz" onclick="freezeModel('bwd')">❄️ НАЗАД</button>
        </div>
        <button class="btn-white" id="ruler-btn" onclick="toggleRuler()">📏 ЛИНЕЙКА</button>
        <button class="btn-orange" id="grid-btn" onclick="gridMenu()">📏 РАЗМ. СЕТКА</button>

        <div class="section-label">ПРОЗР. ТЕХНИКИ</div>
        <div class="opacity-wrap"><input type="range" id="op-slider" min="0.1" max="1.0" step="0.1" value="0.6"></div>
        <div class="section-label">ПРОЗР. ГРУЗА</div>
        <div class="opacity-wrap"><input type="range" id="cargo-op-slider" min="0.1" max="1.0" step="0.1" value="0.6"></div>

        <div class="section-label">ТЕХНИКА</div>
        <button class="btn-white" onclick="addVehicle('Тягач 8х4', 7.8, 2.5, 'white', 5.55, 'truck')">ТЯГАЧ 8х4</button>
        <button class="btn-red" onclick="addVehicle('Гуснек', 4.2, 2.5, '#A2231D', 4.2, 'mod', 0.5)">ГУСНЕК</button>
        <button class="btn-red" style="background:#555" onclick="let w = prompt('Ширина (3.0-5.5):', '3.0'); if(w) { let l = prompt('Длина (4.0-30.0):', '8.5'); if(l) addVehicle('Балки', parseFloat(l), parseFloat(w), 'multi', parseFloat(l), 'mod', 0, true) }">🏗 БАЛКИ</button>

        <div class="section-label">МОДУЛИ THP</div>
        <button class="btn-red" onclick="addVehicle('THP 2', 3.0, 3.0, '#A2231D', 3.0, 'mod', 0)">THP 2</button>
        <button class="btn-red" onclick="addVehicle('THP 3', 4.5, 3.0, '#A2231D', 4.5, 'mod', 0)">THP 3</button>
        <button class="btn-red" onclick="addVehicle('THP 4', 6.0, 3.0, '#A2231D', 6.0, 'mod', 0)">THP 4</button>
        <button class="btn-red" onclick="addVehicle('THP 5', 7.5, 3.0, '#A2231D', 7.5, 'mod', 0)">THP 5</button>
        <button class="btn-red" onclick="addVehicle('THP 6', 9.0, 3.0, '#A2231D', 9.0, 'mod', 0)">THP 6</button>

        <div class="section-label">ГРУЗ</div>
        <button class="btn-red" style="background:#e6a100; color:black;" onclick="addCargo()">📦 ПОСТАВИТЬ</button>

        <div style="flex-grow: 1;"></div>
        <button class="btn-danger" style="margin-bottom: 4px; background: #8B4513;" onclick="clearAllButMap()">🧹 ОЧИСТИТЬ</button>
        <button class="btn-danger" onclick="deleteSelected()">🗑 УДАЛИТЬ</button>
        <div style="min-height: 80px;"></div>
    </div>

    <input type="file" id="file-input" style="display:none" accept="image/*" onchange="loadMap(event)">

    <div id="canvas-wrap">
        <div id="cal-msg" class="overlay-msg">УДЕРЖИВАЙТЕ 1 СЕК</div>

        <div id="grid-controls" class="bottom-ctrl">
            <div style="font-size:10px; color:var(--orange);">УПРАВЛЕНИЕ СЕТКОЙ</div>
            <div class="ctrl-row">
                <button class="btn-ovl" onmousedown="startAction('gridMove',0,-5)" onmouseup="stopAction()" ontouchstart="startAction('gridMove',0,-5)" ontouchend="stopAction()">▲</button>
            </div>
            <div class="ctrl-row">
                <button class="btn-ovl" onmousedown="startAction('gridMove',-5,0)" onmouseup="stopAction()" ontouchstart="startAction('gridMove',-5,0)" ontouchend="stopAction()">◀</button>
                <button class="btn-ovl" onmousedown="startAction('gridMove',5,0)" onmouseup="stopAction()" ontouchstart="startAction('gridMove',5,0)" ontouchend="stopAction()">▶</button>
            </div>
            <div class="ctrl-row">
                <button class="btn-ovl" onmousedown="startAction('gridMove',0,5)" onmouseup="stopAction()" ontouchstart="startAction('gridMove',0,5)" ontouchend="stopAction()">▼</button>
            </div>
            <div class="ctrl-row" style="margin-top:5px;">
                <button class="btn-ovl" style="background:#555" onmousedown="startAction('gridRot',-2)" onmouseup="stopAction()" ontouchstart="startAction('gridRot',-2)" ontouchend="stopAction()">⟲</button>
                <button class="btn-ovl" style="background:#555" onmousedown="startAction('gridRot',2)" onmouseup="stopAction()" ontouchstart="startAction('gridRot',2)" ontouchend="stopAction()">⟳</button>
            </div>
            <button class="btn-ok" onclick="confirmGrid()">ГОТОВО</button>
        </div>

        <div id="cargo-controls" class="bottom-ctrl">
            <div style="font-size:10px; color:#e6a100;">СМЕЩЕНИЕ ГРУЗА</div>
            <div class="ctrl-row">
                <button class="btn-ovl" onmousedown="startAction('cargoMove',-0.05)" onmouseup="stopAction()" ontouchstart="startAction('cargoMove',-0.05)" ontouchend="stopAction()">⬅️</button>
                <button class="btn-ovl" onmousedown="startAction('cargoMove',0.05)" onmouseup="stopAction()" ontouchstart="startAction('cargoMove',0.05)" ontouchend="stopAction()">➡️</button>
            </div>
            <button class="btn-ok" onclick="confirmCargo()">ГОТОВО</button>
        </div>

        <canvas id="c"></canvas>
    </div>
</div>

<script>
    const tg = window.Telegram?.WebApp; if(tg) { tg.expand(); tg.ready(); }
    function startEditor(type) { if(type === 'truck-goose') { document.getElementById('hub-screen').style.display = 'none'; document.getElementById('main-app').style.display = 'flex'; setTimeout(() => { canvas.setDimensions({ width: wrap.clientWidth, height: wrap.clientHeight }); canvas.requestRenderAll(); }, 50); } }

    const wrap = document.getElementById('canvas-wrap');
    const canvas = new fabric.Canvas('c', { width: wrap.clientWidth, height: wrap.clientHeight, backgroundColor: '#333', selection: true, allowTouchScrolling: false, imageSmoothingEnabled: false });
    const overlayMsg = document.getElementById('cal-msg'), ovlText = document.getElementById('ovl-text');
    const gridBox = document.getElementById('grid-controls'), cargoBox = document.getElementById('cargo-controls');

    let PX_METER = 40, rotationTarget = null, isDraggingCanvas = false, lastPosX, lastPosY, startPosX, startPosY, lastDistance = 0;
    let isCalibrating = false, calPoints = [], calTimer = null, isRulerMode = false, rulerPoints = [];
    let GLOBAL_OPACITY = 0.6, CARGO_OPACITY = 0.6, activeCargo = null, currentGrid = null, actionInterval = null;
    let crosshair = null; // объект перекрестия

    document.getElementById('op-slider').oninput = (e) => { GLOBAL_OPACITY = parseFloat(e.target.value); canvas.getObjects().filter(o => o.type === 'part').forEach(o => o.set('opacity', GLOBAL_OPACITY)); canvas.requestRenderAll(); };
    document.getElementById('cargo-op-slider').oninput = (e) => { CARGO_OPACITY = parseFloat(e.target.value); canvas.getObjects().filter(o => o.type === 'cargo').forEach(o => o.set('opacity', CARGO_OPACITY)); canvas.requestRenderAll(); };

    function syncAll() {
        const parts = canvas.getObjects().filter(o => o.type === 'part' && !o.isFrozen);
        const cargos = canvas.getObjects().filter(o => o.type === 'cargo' && !o.isFrozen);
        const map = canvas.getObjects().find(o => o.type === 'map'), sc = PX_METER / 40;
        if(map) map.sendToBack();
        canvas.getObjects().filter(o => o.type === 'handle').forEach(h => canvas.remove(h));
        parts.forEach(p => p.set({ scaleX: sc, scaleY: sc }));

        const truck = parts.find(p => p.vehicleType === 'truck'), mods = parts.filter(p => p.vehicleType === 'mod');
        if (truck && mods.length > 0) {
            const m0 = mods[0], radM = (m0.angle * Math.PI)/180;
            const kpX = m0.left + (m0.f_val * sc) * Math.cos(radM), kpY = m0.top + (m0.f_val * sc) * Math.sin(radM), radT = (truck.angle * Math.PI)/180;
            truck.set({ left: kpX - (truck.b_val * sc) * Math.cos(radT), top: kpY - (truck.b_val * sc) * Math.sin(radT) });
            truck.moveTo(map ? 1 : 0);
            mods.forEach((m, i) => { if (i > 0) { const prev = mods[i-1], radP = (prev.angle * Math.PI)/180; m.set({ left: prev.left + ((prev.b_val - m.f_val) * sc) * Math.cos(radP), top: prev.top + ((prev.b_val - m.f_val) * sc) * Math.sin(radP) }); } m.setCoords(); });
            if (cargos.length > 0) {
                const lastM = mods[mods.length-1], centerX = (m0.left + (lastM.left + (lastM.b_val * sc) * Math.cos(radM)))/2, centerY = (m0.top + (lastM.top + (lastM.b_val * sc) * Math.sin(radM)))/2;
                cargos.forEach(c => { c.set({ left: centerX + (c.offsetMeters * PX_METER) * Math.cos(radM), top: centerY + (c.offsetMeters * PX_METER) * Math.sin(radM), angle: m0.angle, scaleX: sc, scaleY: sc }); c.setCoords(); });
            }
            createHandle(truck.left + (1.2*40*sc) * Math.cos(radT), truck.top + (1.2*40*sc) * Math.sin(radT), 'truck');
            const lastM = mods[mods.length-1], radL = (lastM.angle * Math.PI)/180;
            createHandle((lastM.left + (lastM.b_val * sc) * Math.cos(radL)) - (1.2*40*sc) * Math.cos(radL), (lastM.top + (lastM.b_val * sc) * Math.sin(radL)) - (1.2*40*sc) * Math.sin(radL), 'trailer');
        }
        parts.forEach(p => p.bringToFront()); cargos.forEach(c => c.bringToFront());
        canvas.getObjects().filter(o => o.isFrozen).forEach(f => f.bringToFront());
        canvas.getObjects().filter(o => o.type === 'grid5x5').forEach(g => g.bringToFront());
        canvas.getObjects().filter(o => o.isCalDot || o.isRuler || o.type === 'handle' || o.type === 'crosshair').forEach(o => { if(o.type === 'circle' && (o.isCalDot || o.isRuler)) o.set({ scaleX: sc, scaleY: sc }); o.bringToFront(); });
        canvas.renderAll();
    }

    function createHandle(x, y, t) { canvas.add(new fabric.Circle({ left: x, top: y, radius: 10, fill: '#2196F3', stroke: 'white', strokeWidth: 2, originX: 'center', originY: 'center', type: 'handle', handleType: t, hasControls: false, padding: 20 })); }

    // --- Перекрестие ---
    function addCrosshair() {
        if (crosshair) return;
        const lineV = new fabric.Line([0, -24, 0, 24], { stroke: '#2196F3', strokeWidth: 2 });
        const lineH = new fabric.Line([-24, 0, 24, 0], { stroke: '#2196F3', strokeWidth: 2 });
        crosshair = new fabric.Group([lineV, lineH], {
            left: 0, top: 0,
            originX: 'center', originY: 'center',
            selectable: false, evented: false, type: 'crosshair'
        });
        canvas.add(crosshair);
    }
    function updateCrosshair(x, y) {
        if (crosshair) {
            crosshair.set({ left: x, top: y });
            crosshair.setCoords();
            canvas.requestRenderAll();
        }
    }
    function removeCrosshair() {
        if (crosshair) {
            canvas.remove(crosshair);
            crosshair = null;
        }
    }

    // --- Временная линия калибровки ---
    let tempCalLine = null;
    function updateTempCalLine(x1, y1, x2, y2) {
        if (!tempCalLine) {
            tempCalLine = new fabric.Line([x1, y1, x2, y2], { stroke: '#2196F3', strokeWidth: 2, strokeDashArray: [5, 5] });
            canvas.add(tempCalLine);
        } else {
            tempCalLine.set({ x1: x1, y1: y1, x2: x2, y2: y2 });
            tempCalLine.setCoords();
        }
    }
    function clearTempCalLine() {
        if (tempCalLine) {
            canvas.remove(tempCalLine);
            tempCalLine = null;
        }
    }

    function gridMenu() {
        let action = prompt("1 - Добавить\n2 - Удалить все", "1");
        if (action === "1") {
            let sInput = prompt("Размер (м):", "25"); if (!sInput) return;
            let s = Math.round(parseInt(sInput) / 5) * 5; if (s < 5) s = 5;
            const totalPx = s * PX_METER, items = [];
            for (let i = 0; i <= s; i += 5) {
                let p = i * PX_METER;
                items.push(new fabric.Line([p, 0, p, totalPx], { stroke: '#FF8C00', strokeWidth: 3, opacity: 0.8 }));
                items.push(new fabric.Line([0, p, totalPx, p], { stroke: '#FF8C00', strokeWidth: 3, opacity: 0.8 }));
                items.push(new fabric.Text(i + "м", { left: p, top: totalPx + 10, fontSize: 24, fill: '#FF8C00', fontWeight: 'bold', originX: 'center' }));
                items.push(new fabric.Text(i + "м", { left: -15, top: totalPx - p, fontSize: 24, fill: '#FF8C00', fontWeight: 'bold', originY: 'center', originX: 'right' }));
            }
            currentGrid = new fabric.Group(items, { left: canvas.width/2, top: canvas.height/2, originX: 'center', originY: 'center', type: 'grid5x5', selectable: false, evented: false });
            canvas.add(currentGrid); gridBox.style.display = 'flex'; syncAll();
        } else if (action === "2") { canvas.getObjects().filter(o => o.type === 'grid5x5').forEach(g => canvas.remove(g)); gridBox.style.display = 'none'; currentGrid = null; canvas.requestRenderAll(); }
    }
    function confirmGrid() { if(currentGrid) { currentGrid.set({ isFrozen: true }); currentGrid = null; gridBox.style.display = 'none'; syncAll(); } }

    function startAction(type, p1, p2) { stopAction(); actionInterval = setInterval(() => { if (type === 'gridMove' && currentGrid) { currentGrid.left += p1; currentGrid.top += p2; } if (type === 'gridRot' && currentGrid) { currentGrid.angle += p1; } if (type === 'cargoMove' && activeCargo) { activeCargo.offsetMeters += p1; syncAll(); } canvas.requestRenderAll(); }, 40); }
    function stopAction() { if(actionInterval) clearInterval(actionInterval); }

    // --- МАТЕМАТИКА ICR (Мгновенный центр поворота) ---
    function freezeModel(dir) { /* ... без изменений ... */ }

    function addCargo() { /* ... без изменений ... */ }

    function confirmCargo() { if(activeCargo) { activeCargo.isPlaced = true; activeCargo = null; cargoBox.style.display = 'none'; syncAll(); } }

    function toggleCalibration() {
        isCalibrating = !isCalibrating;
        isRulerMode = false;
        calPoints = [];
        canvas.getObjects().filter(o => o.isCalDot).forEach(dot => canvas.remove(dot));
        clearTempCalLine();
        if (isCalibrating) {
            addCrosshair();
            document.getElementById('cal-btn').classList.add('btn-active-red');
            overlayMsg.style.display = 'block';
        } else {
            removeCrosshair();
            document.getElementById('cal-btn').classList.remove('btn-active-red');
            overlayMsg.style.display = 'none';
        }
    }

    function toggleRuler() {
        isRulerMode = !isRulerMode;
        isCalibrating = false;
        rulerPoints = [];
        canvas.getObjects().filter(o => o.isRuler).forEach(o => canvas.remove(o));
        clearTempCalLine();
        if (isRulerMode) {
            addCrosshair();
            document.getElementById('ruler-btn').classList.add('btn-active-red');
            overlayMsg.style.display = 'block';
        } else {
            removeCrosshair();
            document.getElementById('ruler-btn').classList.remove('btn-active-red');
            overlayMsg.style.display = 'none';
        }
        syncAll();
    }

    canvas.on('mouse:down', function(opt) {
        const touches = opt.e.touches; if (touches && touches.length === 2) { canvas.selection = false; isDraggingCanvas = false; rotationTarget = null; lastDistance = Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY); return; }
        const cX = touches ? touches[0].clientX : opt.e.clientX, cY = touches ? touches[0].clientY : opt.e.clientY, ptr = canvas.getPointer(opt.e);
        startPosX = lastPosX = cX; startPosY = lastPosY = cY;
        if (isCalibrating || isRulerMode) {
            calTimer = setTimeout(() => {
                if(isCalibrating) {
                    calPoints.push(ptr);
                    canvas.add(new fabric.Circle({ left: ptr.x, top: ptr.y, radius: 5, fill: '#2196F3', stroke: 'white', strokeWidth: 2, originX: 'center', originY: 'center', isCalDot: true }));
                    if (calPoints.length === 2) {
                        clearTempCalLine(); // убираем линию перед запросом
                        let m = prompt("Метры:", "100");
                        if (m) {
                            PX_METER = Math.hypot(calPoints[0].x - calPoints[1].x, calPoints[0].y - calPoints[1].y) / parseFloat(m);
                        }
                        toggleCalibration();
                        syncAll();
                    }
                }
                else if(isRulerMode) {
                    rulerPoints.push(ptr);
                    canvas.add(new fabric.Circle({ left: ptr.x, top: ptr.y, radius: 6, fill: 'white', stroke: '#000', strokeWidth: 1, originX: 'center', originY: 'center', isRuler: true }));
                    if (rulerPoints.length === 2) {
                        let distM = (Math.hypot(rulerPoints[0].x - rulerPoints[1].x, rulerPoints[0].y - rulerPoints[1].y) / PX_METER).toFixed(2);
                        canvas.add(new fabric.Line([rulerPoints[0].x, rulerPoints[0].y, rulerPoints[1].x, rulerPoints[1].y], { stroke: 'white', strokeWidth: 2, strokeDashArray: [5, 5], isRuler: true }));
                        ovlText.innerText = "РАССТОЯНИЕ: " + distM + " м";
                        rulerPoints = [];
                    }
                }
            }, 1000);
        }
        if (opt.target && opt.target.type === 'handle') { rotationTarget = opt.target.handleType; return; }
        if (!opt.target || opt.target.type === 'map' || opt.target.isFrozen) isDraggingCanvas = true;
        canvas.getObjects().forEach(o => { if(!o.isFrozen) { o._lastLeft = o.left; o._lastTop = o.top; } });
    });

    canvas.on('mouse:move', function(opt) {
        const touches = opt.e.touches, cX = touches ? touches[0].clientX : opt.e.clientX, cY = touches ? touches[0].clientY : opt.e.clientY, ptr = canvas.getPointer(opt.e);
        if (touches && touches.length === 2) { let dist = Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY); if (lastDistance > 0) canvas.zoomToPoint(new fabric.Point(canvas.width / 2, canvas.height / 2), canvas.getZoom() * (dist / lastDistance)); lastDistance = dist; return; }

        // Обновляем перекрестие
        if (isCalibrating || isRulerMode) {
            updateCrosshair(ptr.x, ptr.y);
            // Если калибровка и уже есть первая точка — рисуем временную линию
            if (isCalibrating && calPoints.length === 1) {
                updateTempCalLine(calPoints[0].x, calPoints[0].y, ptr.x, ptr.y);
            } else {
                clearTempCalLine();
            }
            if (Math.hypot(cX - startPosX, cY - startPosY) > 10) { clearTimeout(calTimer); calTimer = null; }
        }

        if (rotationTarget) {
            const parts = canvas.getObjects().filter(o => o.type === 'part' && !o.isFrozen), truck = parts.find(p => p.vehicleType === 'truck'), m0 = parts.find(p => p.vehicleType === 'mod'), sc = PX_METER / 40;
            if (truck && m0) {
                const radM = (m0.angle * Math.PI) / 180, kpX = m0.left + (m0.f_val * sc) * Math.cos(radM), kpY = m0.top + (m0.f_val * sc) * Math.sin(radM);
                if (rotationTarget === 'truck') truck.angle = Math.atan2(kpY - ptr.y, kpX - ptr.x) * 180 / Math.PI;
                else parts.filter(p => p.vehicleType === 'mod').forEach(p => p.angle = Math.atan2(ptr.y - kpY, ptr.x - kpX) * 180 / Math.PI);
                syncAll();
            }
        } else if (isDraggingCanvas) { let vpt = canvas.viewportTransform; vpt[4] += cX - lastPosX; vpt[5] += cY - lastPosY; canvas.requestRenderAll(); }
        lastPosX = cX; lastPosY = cY;
    });

    canvas.on('object:moving', (e) => {
        const moved = e.target; if (moved.isFrozen) return;
        if (moved.type === 'part' || moved.type === 'cargo') {
            const dx = moved.left - moved._lastLeft, dy = moved.top - moved._lastTop;
            canvas.getObjects().filter(o => (o.type === 'part' || o.type === 'cargo') && !o.isFrozen && o !== moved).forEach(p => { p.left += dx; p.top += dy; p.setCoords(); });
            canvas.getObjects().forEach(o => { if(!o.isFrozen) { o._lastLeft = o.left; o._lastTop = o.top; } }); syncAll();
        }
    });

    canvas.on('mouse:up', () => { if (calTimer) clearTimeout(calTimer); isDraggingCanvas = false; rotationTarget = null; lastDistance = 0; syncAll(); });

    function clearAllButMap() { /* ... без изменений ... */ }
    function loadMap(event) { /* ... без изменений ... */ }
