<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HeavyTransport v0.1.0-beta</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <style>
        :root { --red: #A2231D; --border: #444; --blue: #2196F3; --orange: #FF8C00; }
        * { box-sizing: border-box; -webkit-user-select: none; }
        
        body { 
            margin: 0; font-family: sans-serif; background: #000; color: white; 
            display: flex; height: 100vh; height: 100dvh; width: 100vw; overflow: hidden; position: fixed; 
        }
        
        /* Стили для Хаба */
        #hub-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }
        .hub-title { font-size: 18px; font-weight: bold; margin-bottom: 30px; color: var(--blue); text-transform: uppercase; letter-spacing: 2px; }
        .hub-card { background: #222; border: 2px solid var(--border); padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; width: 280px; }

        #main-app { display: none; width: 100%; height: 100%; }
        
        #sidebar { 
            width: 115px; min-width: 115px; background: #222; border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 10px 5px; gap: 8px; z-index: 150; 
            overflow-y: auto; touch-action: pan-y !important; -webkit-overflow-scrolling: touch;
            padding-top: env(safe-area-inset-top); height: 100%;
        }
        
        button { width: 100%; padding: 12px 2px; border: none; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; color: white; flex-shrink: 0; }
        .btn-tool { background: #444; } .btn-white { background: #fff; color: #000; } .btn-red { background: var(--red); } .btn-blue { background: var(--blue); } .btn-danger { background: #551111; }
        .btn-orange { background: var(--orange); color: black; }
        .btn-fz { width: 50%; background: #008080; font-size: 7px; border: 1px solid #00ffff; padding: 12px 0; border-radius: 6px; }
        .freeze-split { display: flex; width: 100%; gap: 2px; flex-shrink: 0; }
        .section-label { font-size: 8px; color: #777; text-align: center; margin-top: 5px; text-transform: uppercase; flex-shrink: 0; }
        
        #canvas-wrap { flex-grow: 1; position: relative; background: #333; overflow: hidden; height: 100%; touch-action: none; }
        .opacity-wrap { padding: 5px; background: #333; border-radius: 6px; margin-top: 5px; flex-shrink: 0; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--blue); }

        .overlay-msg { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.9); color: white; padding: 10px 20px; border-radius: 15px; 
            font-size: 11px; z-index: 1000; display: none; border: 2px solid var(--blue); 
        }
        
        .bottom-ctrl {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); padding: 12px; border-radius: 20px;
            display: none; z-index: 1100; flex-direction: column; gap: 8px; align-items: center; min-width: 150px;
        }
        .ctrl-row { display: flex; gap: 6px; justify-content: center; }
        .btn-ovl { width: 38px; height: 38px; font-size: 18px; background: #444; color: white; border-radius: 8px; border: 1px solid #666; display: flex; align-items: center; justify-content: center; }
        .btn-ok { width: 100px; height: 35px; font-size: 11px; font-weight: bold; background: #4CAF50; color: white; border-radius: 8px; border: none; text-transform: uppercase; }

        #magnifier { position: absolute; top: 10px; left: 10px; width: 180px; height: 180px; border: 4px solid var(--blue); border-radius: 50%; overflow: hidden; background: #111; display: none; z-index: 2000; pointer-events: none; box-shadow: 0 0 30px rgba(0,0,0,0.7); }
        #mag-canvas { position: absolute; top: 0; left: 0; }
        #mag-crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; z-index: 2001; pointer-events: none; }
        #mag-crosshair::before { content:''; position:absolute; background:var(--blue); width:100%; height:2px; top:14px; left:0; }
        #mag-crosshair::after { content:''; position:absolute; background:var(--blue); height:100%; width:2px; left:14px; top:0; }
    </style>
</head>
<body>

<div id="hub-screen">
    <div class="hub-title">Выберите редактор</div>
    <div class="hub-card" onclick="startEditor('truck-goose')"><h3>🚛 Тягач + Гусь</h3><p>Модульные перевозки THP</p></div>
</div>

<div id="main-app">
    <div id="sidebar">
        <div class="section-label">КАРТА</div>
        <button class="btn-tool" onclick="document.getElementById('file-input').click()">🗺 КАРТА</button>
        <button class="btn-blue" id="cal-btn" onclick="toggleCalibration()">📏 МАСШТАБ</button>
        
        <div class="section-label">МОДУЛЯЦИЯ</div>
        <div class="freeze-split">
            <button class="btn-fz" onclick="freezeModel('fwd')">❄️ ВПЕРЕД</button>
            <button class="btn-fz" onclick="freezeModel('bwd')">❄️ НАЗАД</button>
        </div>
        <button class="btn-white" id="ruler-btn" onclick="toggleRuler()">📏 ЛИНЕЙКА</button>
        <button class="btn-orange" id="grid-btn" onclick="gridMenu()">📏 РАЗМ. СЕТКА</button>

        <div class="section-label">ПРОЗР. ТЕХНИКИ</div>
        <div class="opacity-wrap"><input type="range" id="op-slider" min="0.1" max="1.0" step="0.1" value="0.6"></div>
        <div class="section-label">ПРОЗР. ГРУЗА</div>
        <div class="opacity-wrap"><input type="range" id="cargo-op-slider" min="0.1" max="1.0" step="0.1" value="0.6"></div>

        <div class="section-label">ТЕХНИКА</div>
        <button class="btn-white" onclick="addVehicle('Тягач 8х4', 7.8, 2.5, 'white', 5.55, 'truck')">ТЯГАЧ 8х4</button>
        <button class="btn-red" onclick="addVehicle('Гуснек', 4.2, 2.5, '#A2231D', 4.2, 'mod', 0.5)">ГУСНЕК</button>
        <button class="btn-red" style="background:#555" onclick="let w = prompt('Ширина (3.0-5.5):', '3.0'); if(w) { let l = prompt('Длина (4.0-30.0):', '8.5'); if(l) addVehicle('Балки', parseFloat(l), parseFloat(w), 'multi', parseFloat(l), 'mod', 0, true) }">🏗 БАЛКИ</button>
        
        <div class="section-label">МОДУЛИ THP</div>
        <button class="btn-red" onclick="addVehicle('THP 2', 3.0, 3.0, '#A2231D', 3.0, 'mod', 0)">THP 2</button>
        <button class="btn-red" onclick="addVehicle('THP 4', 6.0, 3.0, '#A2231D', 6.0, 'mod', 0)">THP 4</button>
        <button class="btn-red" onclick="addVehicle('THP 6', 9.0, 3.0, '#A2231D', 9.0, 'mod', 0)">THP 6</button>

        <div class="section-label">ГРУЗ</div>
        <button class="btn-red" style="background:#e6a100; color:black;" onclick="addCargo()">📦 ПОСТАВИТЬ</button>
        
        <div style="flex-grow: 1;"></div>
        <button class="btn-danger" style="margin-bottom: 4px; background: #8B4513;" onclick="clearAllButMap()">🧹 ОЧИСТИТЬ</button>
        <button class="btn-danger" onclick="deleteSelected()">🗑 УДАЛИТЬ</button>
        <div style="min-height: 80px;"></div> 
    </div>

    <input type="file" id="file-input" style="display:none" accept="image/*" onchange="loadMap(event)">

    <div id="canvas-wrap">
        <div id="cal-msg" class="overlay-msg"><span id="ovl-text">УДЕРЖИВАЙТЕ 1 СЕК</span></div>

        <div id="grid-controls" class="bottom-ctrl">
            <button class="btn-ok" onclick="confirmGrid()">ГОТОВО</button>
        </div>

        <div id="cargo-controls" class="bottom-ctrl">
            <button class="btn-ok" onclick="confirmCargo()">ГОТОВО</button>
        </div>

        <div id="magnifier"><canvas id="mag-canvas" width="180" height="180"></canvas><div id="mag-crosshair"></div></div>
        <canvas id="c"></canvas>
    </div>
</div>

<script>
    const tg = window.Telegram?.WebApp; if(tg) { tg.expand(); tg.ready(); }
    
    // Функция запуска, которую вызывает Хаб
    function startEditor(type) { 
        if(type === 'truck-goose') { 
            document.getElementById('hub-screen').style.display = 'none'; 
            document.getElementById('main-app').style.display = 'flex'; 
            setTimeout(() => { 
                canvas.setDimensions({ width: wrap.clientWidth, height: wrap.clientHeight }); 
                canvas.requestRenderAll(); 
            }, 100); 
        } 
    }
    
    const wrap = document.getElementById('canvas-wrap');
    const canvas = new fabric.Canvas('c', { 
        width: wrap.clientWidth, 
        height: wrap.clientHeight, 
        backgroundColor: '#333', 
        selection: true, 
        allowTouchScrolling: false 
    });

    // МАСШТАБ (Вернул на 40, чтобы не было маленьким)
    let PX_METER = 40; 
    let rotationTarget = null, isDraggingCanvas = false;
    let lastPosX, lastPosY;
    let GLOBAL_OPACITY = 0.6;
    let CARGO_OPACITY = 0.6;

    // Слайдеры
    document.getElementById('op-slider').oninput = (e) => { 
        GLOBAL_OPACITY = parseFloat(e.target.value); 
        canvas.getObjects().filter(o => o.type === 'part').forEach(o => o.set('opacity', GLOBAL_OPACITY)); 
        canvas.requestRenderAll(); 
    };

    // --- ФУНКЦИЯ СИНХРОНИЗАЦИИ (ТВОЯ ЛОГИКА) ---
    function syncAll() {
        const parts = canvas.getObjects().filter(o => o.type === 'part' && !o.isFrozen);
        const sc = PX_METER / 40;
        
        canvas.getObjects().filter(o => o.type === 'handle').forEach(h => canvas.remove(h));

        const truck = parts.find(p => p.vehicleType === 'truck');
        const mods = parts.filter(p => p.vehicleType === 'mod');
        
        if (truck && mods.length > 0) {
            const m0 = mods[0];
            const radM = (m0.angle * Math.PI)/180;
            const kpX = m0.left + (m0.f_val * sc) * Math.cos(radM);
            const kpY = m0.top + (m0.f_val * sc) * Math.sin(radM);
            const radT = (truck.angle * Math.PI)/180;
            
            truck.set({ 
                left: kpX - (truck.b_val * sc) * Math.cos(radT), 
                top: kpY - (truck.b_val * sc) * Math.sin(radT) 
            });
            
            // Ручки управления
            createHandle(truck.left + (1.2*40*sc) * Math.cos(radT), truck.top + (1.2*40*sc) * Math.sin(radT), 'truck'); 
            const lastM = mods[mods.length-1];
            const radL = (lastM.angle * Math.PI)/180;
            createHandle((lastM.left + (lastM.b_val * sc) * Math.cos(radL)) - (1.2*40*sc) * Math.cos(radL), (lastM.top + (lastM.b_val * sc) * Math.sin(radL)) - (1.2*40*sc) * Math.sin(radL), 'trailer');
        }
        canvas.renderAll();
    }

    function createHandle(x, y, t) { 
        canvas.add(new fabric.Circle({ 
            left: x, top: y, radius: 10, fill: '#2196F3', stroke: 'white', strokeWidth: 2, 
            originX: 'center', originY: 'center', type: 'handle', handleType: t, hasControls: false 
        })); 
    }

    // --- Отрисовка Техники (Твой блок с колесами) ---
    function addVehicle(n, l, w, c, b, t, f, isMulti = false) {
        const sc = PX_METER / 40;
        let cX = 150, cY = 150;
        let obj;

        if (t === 'truck') {
            const tL = l*40, tW = w*40;
            // Колеса тягача
            let wheels = [];
            [1.3*40, 3.9*40, 5.3*40, 6.7*40].forEach((x, idx) => {
                const hW = (idx < 2) ? 13 : 26;
                [-(tW/2), (tW/2 - hW)].forEach(pY => {
                    wheels.push(new fabric.Rect({ left: x - 22, top: pY, width: 44, height: hW, fill: '#222', rx: 4, ry: 4 }));
                });
            });
            obj = new fabric.Group([
                new fabric.Rect({ width: tL, height: tW, fill: 'white', stroke: 'black', originY: 'center' }),
                ...wheels
            ], { 
                left: cX, top: cY, type: 'part', vehicleType: t, b_val: b * 40, f_val: (f||0) * 40, 
                originX: 'left', originY: 'center', hasControls: false, opacity: GLOBAL_OPACITY, scaleX: sc, scaleY: sc 
            });
        } else {
            obj = new fabric.Rect({ 
                left: cX, top: cY, width: l*40, height: w*40, fill: c, stroke: 'black', 
                type: 'part', vehicleType: 'mod', b_val: b * 40, f_val: (f||0) * 40, 
                originX: 'left', originY: 'center', hasControls: false, opacity: GLOBAL_OPACITY, scaleX: sc, scaleY: sc 
            });
        }
        canvas.add(obj);
        syncAll();
    }

    // Управление
    canvas.on('mouse:down', function(opt) {
        if (opt.target && opt.target.type === 'handle') { rotationTarget = opt.target.handleType; return; }
        if (!opt.target) isDraggingCanvas = true;
        lastPosX = opt.e.clientX; lastPosY = opt.e.clientY;
    });

    canvas.on('mouse:move', function(opt) {
        const ptr = canvas.getPointer(opt.e);
        if (rotationTarget) {
            const parts = canvas.getObjects().filter(o => o.type === 'part' && !o.isFrozen);
            const truck = parts.find(p => p.vehicleType === 'truck');
            const m0 = parts.find(p => p.vehicleType === 'mod');
            const sc = PX_METER/40;
            if (truck && m0) {
                const radM = (m0.angle * Math.PI)/180;
                const kpX = m0.left + (m0.f_val * sc) * Math.cos(radM);
                const kpY = m0.top + (m0.f_val * sc) * Math.sin(radM);
                if (rotationTarget === 'truck') truck.angle = Math.atan2(kpY - ptr.y, kpX - ptr.x) * 180 / Math.PI;
                else m0.angle = Math.atan2(ptr.y - kpY, ptr.x - kpX) * 180 / Math.PI;
                syncAll();
            }
        } else if (isDraggingCanvas) {
            let vpt = canvas.viewportTransform;
            vpt[4] += opt.e.clientX - lastPosX;
            vpt[5] += opt.e.clientY - lastPosY;
            canvas.requestRenderAll();
            lastPosX = opt.e.clientX; lastPosY = opt.e.clientY;
        }
    });

    canvas.on('mouse:up', () => { isDraggingCanvas = false; rotationTarget = null; });

    function loadMap(e) {
        const reader = new FileReader();
        reader.onload = (f) => { fabric.Image.fromURL(f.target.result, (img) => { canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas)); }); };
        reader.readAsDataURL(e.target.files[0]);
    }

    function deleteSelected() { canvas.getActiveObjects().forEach(o => canvas.remove(o)); canvas.discardActiveObject(); syncAll(); }
    function clearAllButMap() { canvas.getObjects().forEach(o => { if(o.type !== 'image') canvas.remove(o); }); syncAll(); }
</script>
</body>
</html>
