<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HeavyTransport PRO</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <style>
        :root { --red: #A2231D; --border: #444; --blue: #2196F3; --orange: #FF8C00; }
        * { box-sizing: border-box; -webkit-user-select: none; }
        
        body { 
            margin: 0; font-family: sans-serif; background: #000; color: white; 
            display: flex; height: 100vh; height: 100dvh; width: 100vw; overflow: hidden; position: fixed; 
        }
        
        #hub-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }
        .hub-title { font-size: 18px; font-weight: bold; margin-bottom: 30px; color: var(--blue); text-transform: uppercase; letter-spacing: 2px; }
        .hub-card { background: #222; border: 2px solid var(--border); padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; }

        #main-app { display: none; width: 100%; height: 100%; }
        
        #sidebar { 
            width: 120px; min-width: 120px; background: #222; border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 10px 5px; gap: 8px; z-index: 150; 
            overflow-y: auto; height: 100%;
        }
        
        button { width: 100%; padding: 12px 2px; border: none; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; color: white; flex-shrink: 0; }
        .btn-tool { background: #444; } 
        .btn-white { background: #fff; color: #000; } 
        .btn-red { background: var(--red); } 
        .btn-blue { background: var(--blue); } 
        .btn-orange { background: var(--orange); color: black; }
        .btn-danger { background: #551111; }
        .btn-active-red { background: var(--red) !important; color: white !important; }

        .freeze-split { display: flex; width: 100%; gap: 2px; }
        .btn-fz { width: 50%; background: #008080; font-size: 7px; border: 1px solid #00ffff; padding: 10px 0; border-radius: 4px; }

        .section-label { font-size: 8px; color: #777; text-align: center; margin-top: 5px; text-transform: uppercase; }
        
        #canvas-wrap { flex-grow: 1; position: relative; background: #333; overflow: hidden; height: 100%; touch-action: none; }
        
        .opacity-wrap { padding: 5px; background: #333; border-radius: 6px; }
        input[type=range] { width: 100%; accent-color: var(--blue); }

        .overlay-msg { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.9); color: white; padding: 10px 20px; border-radius: 15px; 
            font-size: 11px; z-index: 1000; display: none; border: 2px solid var(--blue); 
        }
        
        .bottom-ctrl {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); padding: 12px; border-radius: 20px;
            display: none; z-index: 1100; flex-direction: column; gap: 8px; align-items: center; min-width: 160px;
        }
        .ctrl-row { display: flex; gap: 6px; justify-content: center; }
        .btn-ovl { width: 40px; height: 40px; font-size: 18px; background: #444; color: white; border-radius: 8px; border: 1px solid #666; display: flex; align-items: center; justify-content: center; }
        .btn-ok { width: 110px; height: 35px; font-size: 11px; font-weight: bold; background: #4CAF50; color: white; border-radius: 8px; border: none; }

        #magnifier { position: absolute; top: 10px; left: 10px; width: 180px; height: 180px; border: 4px solid var(--blue); border-radius: 50%; overflow: hidden; background: #111; display: none; z-index: 2000; pointer-events: none; }
        #mag-canvas { position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

<div id="hub-screen">
    <div class="hub-title">Heavy Transport Editor</div>
    <div class="hub-card" onclick="startEditor('truck-goose')">
        <h3>🚛 Тягач + Модули</h3>
        <p>Расчет вписываемости и нагрузок</p>
    </div>
</div>

<div id="main-app">
    <div id="sidebar">
        <div class="section-label">КАРТА</div>
        <button class="btn-tool" onclick="document.getElementById('file-input').click()">🗺 КАРТА</button>
        <button class="btn-blue" id="cal-btn" onclick="toggleCalibration()">📏 МАСШТАБ</button>
        
        <div class="section-label">МОДУЛЯЦИЯ</div>
        <div class="freeze-split">
            <button class="btn-fz" onclick="freezeModel('fwd')">❄️ ВПЕРЕД</button>
            <button class="btn-fz" onclick="freezeModel('bwd')">❄️ НАЗАД</button>
        </div>
        <button class="btn-white" id="ruler-btn" onclick="toggleRuler()">📏 ЛИНЕЙКА</button>
        <button class="btn-orange" id="grid-btn" onclick="gridMenu()">📏 СЕТКА</button>

        <div class="section-label">ПРОЗРАЧНОСТЬ</div>
        <div class="opacity-wrap"><input type="range" id="op-slider" min="0.1" max="1.0" step="0.1" value="0.6"></div>

        <div class="section-label">ТЕХНИКА</div>
        <button class="btn-white" onclick="addVehicle('Тягач 8х4', 7.8, 2.5, 'white', 5.55, 'truck')">ТЯГАЧ 8х4</button>
        <button class="btn-red" onclick="addVehicle('Гуснек', 4.2, 2.5, '#A2231D', 4.2, 'mod', 0.5)">ГУСНЕК</button>
        <button class="btn-red" style="background:#555" onclick="addBeams()">🏗 БАЛКИ</button>
        
        <div class="section-label">МОДУЛИ THP</div>
        <button class="btn-red" onclick="addVehicle('THP 2', 3.0, 3.0, '#A2231D', 3.0, 'mod', 0)">THP 2</button>
        <button class="btn-red" onclick="addVehicle('THP 4', 6.0, 3.0, '#A2231D', 6.0, 'mod', 0)">THP 4</button>
        <button class="btn-red" onclick="addVehicle('THP 6', 9.0, 3.0, '#A2231D', 9.0, 'mod', 0)">THP 6</button>

        <div class="section-label">ГРУЗ</div>
        <button class="btn-red" style="background:#e6a100; color:black;" onclick="addCargo()">📦 ПОСТАВИТЬ</button>
        
        <div style="flex-grow: 1;"></div>
        <button class="btn-danger" style="background: #8B4513;" onclick="clearAllButMap()">🧹 ОЧИСТИТЬ</button>
        <button class="btn-danger" onclick="deleteSelected()">🗑 УДАЛИТЬ</button>
    </div>

    <input type="file" id="file-input" style="display:none" accept="image/*" onchange="loadMap(event)">

    <div id="canvas-wrap">
        <div id="cal-msg" class="overlay-msg">УДЕРЖИВАЙТЕ 1 СЕК ДЛЯ ТОЧКИ</div>
        
        <div id="grid-controls" class="bottom-ctrl">
            <div class="ctrl-row"><button class="btn-ovl" ontouchstart="startAction('gridMove',0,-5)" ontouchend="stopAction()">▲</button></div>
            <div class="ctrl-row">
                <button class="btn-ovl" ontouchstart="startAction('gridMove',-5,0)" ontouchend="stopAction()">◀</button>
                <button class="btn-ovl" ontouchstart="startAction('gridMove',5,0)" ontouchend="stopAction()">▶</button>
            </div>
            <div class="ctrl-row"><button class="btn-ovl" ontouchstart="startAction('gridMove',0,5)" ontouchend="stopAction()">▼</button></div>
            <div class="ctrl-row" style="margin-top:5px;">
                <button class="btn-ovl" style="background:#555" ontouchstart="startAction('gridRot',-2)" ontouchend="stopAction()">⟲</button>
                <button class="btn-ovl" style="background:#555" ontouchstart="startAction('gridRot',2)" ontouchend="stopAction()">⟳</button>
            </div>
            <button class="btn-ok" onclick="confirmGrid()">ГОТОВО</button>
        </div>

        <div id="cargo-controls" class="bottom-ctrl">
            <div style="font-size:10px; color:#e6a100; margin-bottom:5px;">СМЕЩЕНИЕ ГРУЗА</div>
            <div class="ctrl-row">
                <button class="btn-ovl" ontouchstart="startAction('cargoMove',-0.1)" ontouchend="stopAction()">⬅️</button>
                <button class="btn-ovl" ontouchstart="startAction('cargoMove',0.1)" ontouchend="stopAction()">➡️</button>
            </div>
            <button class="btn-ok" onclick="confirmCargo()">ЗАФИКСИРОВАТЬ</button>
        </div>

        <div id="magnifier"><canvas id="mag-canvas" width="180" height="180"></canvas></div>
        <canvas id="c"></canvas>
    </div>
</div>

<script>
    const wrap = document.getElementById('canvas-wrap');
    const canvas = new fabric.Canvas('c', { width: wrap.clientWidth, height: wrap.clientHeight, backgroundColor: '#333' });
    
    let PX_METER = 40, GLOBAL_OPACITY = 0.6;
    let isCalibrating = false, calPoints = [], calTimer = null;
    let currentGrid = null, activeCargo = null, actionInterval = null;
    let rotationTarget = null;

    function startEditor(type) {
        document.getElementById('hub-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        setTimeout(() => { canvas.setDimensions({ width: wrap.clientWidth, height: wrap.clientHeight }); }, 100);
    }

    // --- Моделирование техники (из вашего кода) ---
    function addVehicle(n, l, w, c, b, t, f, isMulti = false) {
        const sc = PX_METER / 40;
        let cX = canvas.width/2, cY = canvas.height/2;
        const activeParts = canvas.getObjects().filter(o => o.type === 'part' && !o.isFrozen);
        let lastAngle = activeParts.length ? activeParts[activeParts.length-1].angle : 0;

        if (activeParts.length) {
            let last = activeParts[activeParts.length-1], rad = (lastAngle * Math.PI) / 180;
            cX = last.left + (last.b_val * sc) * Math.cos(rad);
            cY = last.top + (last.b_val * sc) * Math.sin(rad);
        }

        let obj;
        if (t === 'truck') {
            const tL = l*40, tW = w*40, axX = [1.3*40, 3.9*40, 5.3*40, 6.7*40];
            let wheels = [];
            axX.forEach((x, idx) => {
                const hW = (idx < 2) ? 13 : 26;
                [-(tW/2), (tW/2 - hW)].forEach(pY => {
                    wheels.push(new fabric.Rect({ left: x - 22, top: pY, width: 44, height: hW, fill: '#222', rx: 4, ry: 4 }));
                });
            });
            obj = new fabric.Group([
                new fabric.Rect({ width: tL, height: tW, fill: 'white', stroke: 'black', originY: 'center' }),
                new fabric.Rect({ width: tL*0.3, height: tW, fill: '#eee', stroke: 'black', originY: 'center' }),
                ...wheels
            ], { left: cX, top: cY, angle: lastAngle, type: 'part', vehicleType: t, b_val: b*40, originX: 'left', originY: 'center', hasControls: false });
        } else {
            const mL = l*40, mW = w*40;
            let shape;
            if (n === 'Гуснек') {
                shape = new fabric.Polygon([{x:26, y:0}, {x:mL, y:0}, {x:mL, y:mW}, {x:26, y:mW}, {x:0, y:mW-26}, {x:0, y:26}], { fill: c, stroke: 'black', top: -mW/2 });
            } else {
                shape = new fabric.Rect({ width: mL, height: mW, fill: c, stroke: 'black', originY: 'center' });
            }
            obj = new fabric.Group([shape], { left: cX, top: cY, angle: lastAngle, type: 'part', vehicleType: 'mod', b_val: l*40, f_val: (f||0)*40, originX: 'left', originY: 'center', hasControls: false });
        }

        obj.set({ opacity: GLOBAL_OPACITY, scaleX: sc, scaleY: sc });
        canvas.add(obj);
        syncAll();
    }

    function addBeams() {
        let w = prompt('Ширина (3.0-5.5):', '3.0');
        let l = prompt('Длина (4.0-30.0):', '12.0');
        if(!l || !w) return;
        const sc = PX_METER / 40;
        const bl = parseFloat(l)*40, bw = (parseFloat(w)*40)/2;
        const beams = new fabric.Group([
            new fabric.Rect({left:24, top:-bw, width:bl, height:18, fill:'#A2231D', stroke:'black'}),
            new fabric.Rect({left:24, top:bw-18, width:bl, height:18, fill:'#A2231D', stroke:'black'}),
            new fabric.Rect({left:0, top:-60, width:24, height:120, fill:'#444'}),
            new fabric.Rect({left:bl+24, top:-60, width:24, height:120, fill:'#444'})
        ], { type: 'part', vehicleType: 'mod', b_val: (parseFloat(l)+1.2)*40, f_val: 0, originX: 'left', originY: 'center', hasControls: false, scaleX: sc, scaleY: sc });
        canvas.add(beams);
        syncAll();
    }

    function addCargo() {
        const mods = canvas.getObjects().filter(o => o.vehicleType === 'mod' && !o.isFrozen);
        if (mods.length === 0) return alert("Сначала добавьте модули!");
        let l = prompt('Длина груза (м):', '10');
        let w = prompt('Ширина груза (м):', '3.5');
        if (!l || !w) return;

        activeCargo = new fabric.Group([
            new fabric.Rect({ width: l*40, height: w*40, fill: '#FFD700', stroke: 'black', strokeWidth: 2, originX:'center', originY:'center' }),
            new fabric.Line([-15,0,15,0],{stroke:'black'}), new fabric.Line([0,-15,0,15],{stroke:'black'})
        ], { type:'cargo', offsetMeters: 0, originX:'center', originY:'center', hasControls:false, selectable:false });
        
        canvas.add(activeCargo);
        document.getElementById('cargo-controls').style.display = 'flex';
        syncAll();
    }

    // --- Системные функции ---
    function syncAll() {
        const sc = PX_METER / 40;
        const parts = canvas.getObjects().filter(o => o.type === 'part' && !o.isFrozen);
        const truck = parts.find(p => p.vehicleType === 'truck');
        const mods = parts.filter(p => p.vehicleType === 'mod');

        if (truck && mods.length > 0) {
            const m0 = mods[0], radM = (m0.angle * Math.PI)/180;
            const kpX = m0.left + (m0.f_val * sc) * Math.cos(radM);
            const kpY = m0.top + (m0.f_val * sc) * Math.sin(radM);
            const radT = (truck.angle * Math.PI)/180;
            
            truck.set({ left: kpX - (truck.b_val * sc) * Math.cos(radT), top: kpY - (truck.b_val * sc) * Math.sin(radT) });
            
            mods.forEach((m, i) => {
                if (i > 0) {
                    const prev = mods[i-1], radP = (prev.angle * Math.PI)/180;
                    m.set({ left: prev.left + ((prev.b_val - m.f_val) * sc) * Math.cos(radP), top: prev.top + ((prev.b_val - m.f_val) * sc) * Math.sin(radP) });
                }
            });
        }

        if (activeCargo && mods.length > 0) {
            const m0 = mods[0], ml = mods[mods.length-1];
            const rad = (m0.angle * Math.PI)/180;
            const centerX = (m0.left + ml.left)/2;
            const centerY = (m0.top + ml.top)/2;
            activeCargo.set({ 
                left: centerX + (activeCargo.offsetMeters * PX_METER) * Math.cos(rad),
                top: centerY + (activeCargo.offsetMeters * PX_METER) * Math.sin(rad),
                angle: m0.angle, scaleX: sc, scaleY: sc
            });
        }
        canvas.renderAll();
    }

    function startAction(type, p1, p2) {
        stopAction();
        actionInterval = setInterval(() => {
            if (type === 'gridMove' && currentGrid) { currentGrid.left += p1; currentGrid.top += p2; }
            if (type === 'gridRot' && currentGrid) { currentGrid.angle += p1; }
            if (type === 'cargoMove' && activeCargo) { activeCargo.offsetMeters += p1; syncAll(); }
            canvas.requestRenderAll();
        }, 40);
    }
    function stopAction() { clearInterval(actionInterval); }

    function gridMenu() {
        let sInput = prompt("Размер сетки (м):", "20");
        if (!sInput) return;
        const s = parseInt(sInput), totalPx = s * PX_METER, items = [];
        for (let i = 0; i <= s; i += 5) {
            let p = i * PX_METER;
            items.push(new fabric.Line([p, 0, p, totalPx], { stroke: '#FF8C00', opacity: 0.6 }));
            items.push(new fabric.Line([0, p, totalPx, p], { stroke: '#FF8C00', opacity: 0.6 }));
        }
        currentGrid = new fabric.Group(items, { left: canvas.width/2, top: canvas.height/2, originX: 'center', originY: 'center', selectable: false });
        canvas.add(currentGrid);
        document.getElementById('grid-controls').style.display = 'flex';
    }

    function confirmGrid() { currentGrid = null; document.getElementById('grid-controls').style.display = 'none'; }
    function confirmCargo() { activeCargo = null; document.getElementById('cargo-controls').style.display = 'none'; }

    function loadMap(e) {
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                img.set({ selectable: false, evented: false, type: 'map' });
                canvas.add(img); img.sendToBack();
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function toggleCalibration() {
        isCalibrating = !isCalibrating;
        calPoints = [];
        document.getElementById('cal-btn').classList.toggle('btn-active-red');
        document.getElementById('cal-msg').style.display = isCalibrating ? 'block' : 'none';
    }

    canvas.on('mouse:down', (opt) => {
        if (isCalibrating) {
            const ptr = canvas.getPointer(opt.e);
            calTimer = setTimeout(() => {
                calPoints.push(ptr);
                canvas.add(new fabric.Circle({ left: ptr.x, top: ptr.y, radius: 5, fill: '#2196F3', isCalDot: true }));
                if (calPoints.length === 2) {
                    let m = prompt("Сколько метров между точками?", "10");
                    if (m) PX_METER = Math.hypot(calPoints[0].x - calPoints[1].x, calPoints[0].y - calPoints[1].y) / parseFloat(m);
                    canvas.getObjects().filter(o => o.isCalDot).forEach(o => canvas.remove(o));
                    toggleCalibration();
                    syncAll();
                }
            }, 800);
        }
    });

    canvas.on('mouse:up', () => clearTimeout(calTimer));

    function clearAllButMap() {
        canvas.getObjects().forEach(o => { if(o.type !== 'map') canvas.remove(o); });
        syncAll();
    }

    function deleteSelected() {
        canvas.getActiveObjects().forEach(o => canvas.remove(o));
        canvas.discardActiveObject();
        syncAll();
    }
</script>
</body>
</html>
