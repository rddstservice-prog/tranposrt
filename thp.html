<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HeavyTransport PRO</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <style>
        :root { --red: #A2231D; --border: #444; --blue: #2196F3; --orange: #FF8C00; }
        * { box-sizing: border-box; -webkit-user-select: none; }
        
        body { 
            margin: 0; font-family: sans-serif; background: #000; color: white; 
            display: flex; height: 100vh; height: 100dvh; width: 100vw; overflow: hidden; position: fixed; 
        }
        
        #hub-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }

        #main-app { display: none; width: 100%; height: 100%; }
        
        #sidebar { 
            width: 115px; min-width: 115px; background: #222; border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 10px 5px; gap: 8px; z-index: 150; 
            overflow-y: auto; height: 100%; padding-top: env(safe-area-inset-top);
        }
        
        button { width: 100%; padding: 12px 2px; border: none; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; color: white; flex-shrink: 0; }
        .btn-tool { background: #444; } 
        .btn-white { background: #fff; color: #000; } 
        .btn-red { background: var(--red); } 
        .btn-blue { background: var(--blue); } 
        .btn-orange { background: var(--orange); color: black; }
        .btn-danger { background: #551111; }
        .btn-active-red { background: var(--red) !important; color: white !important; }

        .section-label { font-size: 8px; color: #777; text-align: center; margin-top: 5px; text-transform: uppercase; }
        #canvas-wrap { flex-grow: 1; position: relative; background: #333; overflow: hidden; height: 100%; touch-action: none; }
        
        .opacity-wrap { padding: 5px; background: #333; border-radius: 6px; }
        input[type=range] { width: 100%; accent-color: var(--blue); }

        .overlay-msg { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.9); color: white; padding: 10px 20px; border-radius: 15px; 
            font-size: 11px; z-index: 1000; display: none; border: 2px solid var(--blue); 
        }
        
        .bottom-ctrl {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); padding: 12px; border-radius: 20px;
            display: none; z-index: 1100; flex-direction: column; gap: 8px; align-items: center; min-width: 150px;
        }
        .ctrl-row { display: flex; gap: 6px; }
        .btn-ovl { width: 38px; height: 38px; font-size: 18px; background: #444; color: white; border-radius: 8px; border: 1px solid #666; display: flex; align-items: center; justify-content: center; }
        .btn-ok { width: 100px; height: 35px; font-size: 11px; font-weight: bold; background: #4CAF50; color: white; border-radius: 8px; border: none; }

        #magnifier { 
            position: absolute; top: 10px; left: 10px; width: 180px; height: 180px; 
            border: 4px solid var(--blue); border-radius: 50%; overflow: hidden; 
            background: #111; display: none; z-index: 2000; pointer-events: none;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
        #mag-canvas { position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

<div id="hub-screen">
    <div class="hub-card" onclick="startEditor('truck-goose')"><h3>🚛 Тягач + Гусь</h3><p>Модульные перевозки THP</p></div>
</div>

<div id="main-app">
    <div id="sidebar">
        <div class="section-label">КАРТА</div>
        <button class="btn-tool" onclick="document.getElementById('file-input').click()">🗺 КАРТА</button>
        <button class="btn-blue" id="cal-btn" onclick="toggleCalibration()">📏 МАСШТАБ</button>
        
        <div class="section-label">МОДУЛЯЦИЯ</div>
        <button class="btn-white" id="ruler-btn" onclick="toggleRuler()">📏 ЛИНЕЙКА</button>
        <button class="btn-orange" onclick="gridMenu()">📏 СЕТКА</button>

        <div class="section-label">ПРОЗРАЧНОСТЬ</div>
        <div class="opacity-wrap"><input type="range" id="op-slider" min="0.1" max="1.0" step="0.1" value="0.6"></div>

        <div class="section-label">ТЕХНИКА</div>
        <button class="btn-white" onclick="addVehicle('Тягач 8х4', 7.8, 2.5, 'white', 5.55, 'truck')">ТЯГАЧ 8х4</button>
        <button class="btn-red" onclick="addVehicle('Гуснек', 4.2, 2.5, '#A2231D', 4.2, 'mod', 0.5)">ГУСНЕК</button>
        
        <div class="section-label">МОДУЛИ THP</div>
        <button class="btn-red" onclick="addVehicle('THP 4', 6.0, 3.0, '#A2231D', 6.0, 'mod', 0)">THP 4</button>
        <button class="btn-red" onclick="addVehicle('THP 6', 9.0, 3.0, '#A2231D', 9.0, 'mod', 0)">THP 6</button>

        <div class="section-label">ГРУЗ</div>
        <button class="btn-red" style="background:#e6a100; color:black;" onclick="addCargo()">📦 ПОСТАВИТЬ</button>
        
        <div style="flex-grow: 1;"></div>
        <button class="btn-danger" onclick="deleteSelected()">🗑 УДАЛИТЬ</button>
    </div>

    <input type="file" id="file-input" style="display:none" accept="image/*" onchange="loadMap(event)">

    <div id="canvas-wrap">
        <div id="cal-msg" class="overlay-msg">УДЕРЖИВАЙТЕ 1 СЕК</div>
        
        <div id="cargo-controls" class="bottom-ctrl">
            <div style="font-size:10px; color:#e6a100;">СМЕЩЕНИЕ ГРУЗА</div>
            <div class="ctrl-row">
                <button class="btn-ovl" ontouchstart="startAction('cargoMove',-0.05)" ontouchend="stopAction()">⬅️</button>
                <button class="btn-ovl" ontouchstart="startAction('cargoMove',0.05)" ontouchend="stopAction()">➡️</button>
            </div>
            <button class="btn-ok" onclick="confirmCargo()">ГОТОВО</button>
        </div>

        <div id="magnifier"><canvas id="mag-canvas" width="180" height="180"></canvas></div>
        <canvas id="c"></canvas>
    </div>
</div>

<script>
    const wrap = document.getElementById('canvas-wrap');
    const canvas = new fabric.Canvas('c', { width: wrap.clientWidth, height: wrap.clientHeight, backgroundColor: '#333' });
    const magEl = document.getElementById('magnifier'), magCtx = document.getElementById('mag-canvas').getContext('2d');
    
    let PX_METER = 40, GLOBAL_OPACITY = 0.6;
    let isCalibrating = false, calPoints = [], calTimer = null;
    let activeCargo = null, actionInterval = null, rotationTarget = null;

    function startEditor() {
        document.getElementById('hub-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        setTimeout(() => { canvas.setDimensions({ width: wrap.clientWidth, height: wrap.clientHeight }); }, 50);
    }

    // --- МАГНИТНАЯ СВЯЗКА (СИСТЕМА МАГНИТ) ---
    function syncAll() {
        const sc = PX_METER / 40;
        const parts = canvas.getObjects().filter(o => o.type === 'part');
        const truck = parts.find(p => p.vehicleType === 'truck');
        const mods = parts.filter(p => p.vehicleType === 'mod');

        canvas.getObjects().filter(o => o.type === 'handle').forEach(h => canvas.remove(h));

        if (truck && mods.length > 0) {
            const m0 = mods[0], radM = (m0.angle * Math.PI)/180;
            const kpX = m0.left + (m0.f_val * sc) * Math.cos(radM);
            const kpY = m0.top + (m0.f_val * sc) * Math.sin(radM);
            
            const radT = (truck.angle * Math.PI)/180;
            truck.set({ left: kpX - (truck.b_val * sc) * Math.cos(radT), top: kpY - (truck.b_val * sc) * Math.sin(radT) });

            mods.forEach((m, i) => {
                if (i > 0) {
                    const prev = mods[i-1], radP = (prev.angle * Math.PI)/180;
                    m.set({ left: prev.left + ((prev.b_val - m.f_val) * sc) * Math.cos(radP), top: prev.top + ((prev.b_val - m.f_val) * sc) * Math.sin(radP) });
                }
            });

            // Создаем синие точки вращения (как в оригинале)
            createHandle(truck.left + (1.2*40*sc) * Math.cos(radT), truck.top + (1.2*40*sc) * Math.sin(radT), 'truck');
            const lastM = mods[mods.length-1], radL = (lastM.angle * Math.PI)/180;
            createHandle(lastM.left + (lastM.b_val * sc - 40) * Math.cos(radL), lastM.top + (lastM.b_val * sc - 40) * Math.sin(radL), 'trailer');
        }

        // Привязка груза
        const cargo = canvas.getObjects().find(o => o.type === 'cargo');
        if (cargo && mods.length > 0) {
            const m0 = mods[0], ml = mods[mods.length-1], rad = (m0.angle * Math.PI)/180;
            const centerX = (m0.left + ml.left)/2, centerY = (m0.top + ml.top)/2;
            cargo.set({ 
                left: centerX + (cargo.offsetMeters * PX_METER) * Math.cos(rad), 
                top: centerY + (cargo.offsetMeters * PX_METER) * Math.sin(rad),
                angle: m0.angle, scaleX: sc, scaleY: sc
            });
        }
        canvas.renderAll();
    }

    function createHandle(x, y, t) {
        canvas.add(new fabric.Circle({ left: x, top: y, radius: 12, fill: '#2196F3', stroke: 'white', originX: 'center', originY: 'center', type: 'handle', handleType: t, hasControls: false }));
    }

    // --- ЛУПА И КАЛИБРОВКА ---
    function updateMagnifier(ptr) {
        magCtx.clearRect(0,0,180,180);
        magCtx.save();
        magCtx.translate(90,90);
        magCtx.scale(2.5, 2.5);
        magCtx.translate(-ptr.x, -ptr.y);
        canvas.getObjects().forEach(obj => { if(obj.type === 'map' || obj.isCalDot) obj.render(magCtx); });
        magCtx.restore();
    }

    canvas.on('mouse:down', (opt) => {
        const ptr = canvas.getPointer(opt.e);
        if (isCalibrating) {
            magEl.style.display = 'block';
            updateMagnifier(ptr);
            calTimer = setTimeout(() => {
                calPoints.push(ptr);
                canvas.add(new fabric.Circle({ left: ptr.x, top: ptr.y, radius: 5, fill: '#2196F3', isCalDot: true }));
                if (calPoints.length === 2) {
                    let m = prompt("Метры:", "10");
                    if (m) PX_METER = Math.hypot(calPoints[0].x - calPoints[1].x, calPoints[0].y - calPoints[1].y) / parseFloat(m);
                    toggleCalibration();
                }
            }, 800);
        }
        if (opt.target && opt.target.type === 'handle') rotationTarget = opt.target.handleType;
    });

    canvas.on('mouse:move', (opt) => {
        const ptr = canvas.getPointer(opt.e);
        if (isCalibrating) updateMagnifier(ptr);
        
        if (rotationTarget) {
            const parts = canvas.getObjects().filter(o => o.type === 'part'), truck = parts.find(p => p.vehicleType === 'truck'), m0 = parts.find(p => p.vehicleType === 'mod');
            if (truck && m0) {
                const sc = PX_METER/40, radM = (m0.angle * Math.PI)/180;
                const kpX = m0.left + (m0.f_val * sc) * Math.cos(radM), kpY = m0.top + (m0.f_val * sc) * Math.sin(radM);
                if (rotationTarget === 'truck') truck.angle = Math.atan2(kpY - ptr.y, kpX - ptr.x) * 180 / Math.PI;
                else m0.angle = Math.atan2(ptr.y - kpY, ptr.x - kpX) * 180 / Math.PI;
                syncAll();
            }
        }
    });

    canvas.on('mouse:up', () => { 
        clearTimeout(calTimer); 
        magEl.style.display = 'none'; 
        rotationTarget = null; 
    });

    // --- ТЕХНИКА И ГРУЗ ---
    function addVehicle(n, l, w, c, b, t, f) {
        const sc = PX_METER / 40;
        let cX = canvas.width/2, cY = canvas.height/2;
        const obj = new fabric.Group([
            new fabric.Rect({ width: l*40, height: w*40, fill: c, stroke: 'black', originY: 'center' })
        ], { left: cX, top: cY, type: 'part', vehicleType: t, b_val: b*40, f_val: (f||0)*40, originX: 'left', originY: 'center', hasControls: false });
        
        obj.set({ scaleX: sc, scaleY: sc, opacity: GLOBAL_OPACITY });
        canvas.add(obj);
        syncAll();
    }

    function addCargo() {
        let l = prompt('Длина (м):', '12'), w = prompt('Ширина (м):', '3.5');
        if (!l || !w) return;
        activeCargo = new fabric.Group([
            new fabric.Rect({ width: l*40, height: w*40, fill: '#FFD700', stroke: 'black', originX:'center', originY:'center' }),
            new fabric.Line([-15,0,15,0],{stroke:'black'}), new fabric.Line([0,-15,0,15],{stroke:'black'})
        ], { type:'cargo', offsetMeters: 0, originX:'center', originY:'center', hasControls:false });
        canvas.add(activeCargo);
        document.getElementById('cargo-controls').style.display = 'flex';
        syncAll();
    }

    function startAction(type, val) {
        actionInterval = setInterval(() => {
            if (type === 'cargoMove' && activeCargo) { activeCargo.offsetMeters += val; syncAll(); }
        }, 40);
    }
    function stopAction() { clearInterval(actionInterval); }
    function confirmCargo() { activeCargo = null; document.getElementById('cargo-controls').style.display = 'none'; }

    function toggleCalibration() {
        isCalibrating = !isCalibrating;
        calPoints = [];
        document.getElementById('cal-btn').classList.toggle('btn-active-red', isCalibrating);
        document.getElementById('cal-msg').style.display = isCalibrating ? 'block' : 'none';
        canvas.getObjects().filter(o => o.isCalDot).forEach(o => canvas.remove(o));
    }

    function loadMap(e) {
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                img.set({ selectable: false, evented: false, type: 'map' });
                canvas.add(img); img.sendToBack();
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function deleteSelected() {
        canvas.getActiveObjects().forEach(o => canvas.remove(o));
        canvas.discardActiveObject();
        syncAll();
    }
</script>
</body>
</html>
