<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HeavyTransport v0.1.0-beta</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <style>
        :root { --red: #A2231D; --border: #444; --blue: #2196F3; --orange: #FF8C00; }
        * { box-sizing: border-box; -webkit-user-select: none; }
        
        body { 
            margin: 0; 
            font-family: sans-serif; 
            background: #000; 
            color: white; 
            display: flex; 
            height: 100vh; 
            height: 100dvh; 
            width: 100vw; 
            overflow: hidden; 
            position: fixed; 
        }
        
        #hub-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }
        .hub-title { font-size: 18px; font-weight: bold; margin-bottom: 30px; color: var(--blue); text-transform: uppercase; letter-spacing: 2px; }
        .hub-grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; max-width: 300px; }
        .hub-card {
            background: #222; border: 2px solid var(--border); padding: 20px; border-radius: 12px;
            text-align: center; cursor: pointer; transition: 0.2s;
        }
        .hub-card:active { transform: scale(0.95); border-color: var(--blue); }
        .hub-card h3 { margin: 0 0 5px 0; font-size: 14px; }
        .hub-card p { margin: 0; font-size: 10px; color: #777; }
        .hub-card.locked { opacity: 0.5; border-style: dashed; }

        #main-app { display: none; width: 100%; height: 100%; }
        
        #sidebar { 
            width: 115px; 
            min-width: 115px; 
            background: #222; 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 10px 5px; 
            gap: 8px; 
            z-index: 150; 
            overflow-y: auto; 
            overflow-x: hidden;
            touch-action: pan-y !important; 
            -webkit-overflow-scrolling: touch;
            padding-top: env(safe-area-inset-top); 
            height: 100%;
        }
        
        button { width: 100%; padding: 12px 2px; border: none; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; color: white; flex-shrink: 0; }
        .btn-tool { background: #444; } .btn-white { background: #fff; color: #000; } .btn-red { background: var(--red); } .btn-blue { background: var(--blue); } .btn-danger { background: #551111; }
        .btn-freeze { background: #008080; border: 1px solid #00ffff; }
        .btn-orange { background: var(--orange); color: black; }
        .btn-mini { width: 48%; padding: 8px 2px; font-size: 14px; }

        .section-label { font-size: 8px; color: #777; text-align: center; margin-top: 5px; text-transform: uppercase; flex-shrink: 0; }
        
        #canvas-wrap { 
            flex-grow: 1; 
            position: relative; 
            background: #333; 
            overflow: hidden; 
            height: 100%;
            touch-action: none; 
        }
        
        .opacity-wrap { padding: 5px; background: #333; border-radius: 6px; margin-top: 5px; flex-shrink: 0; }
        #op-slider, #cargo-op-slider { width: 100%; cursor: pointer; accent-color: var(--blue); }

        .overlay-msg { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 10px 20px; border-radius: 25px; font-size: 11px; z-index: 100; display: none; pointer-events: none; border: 2px solid var(--blue); text-align: center; }
        
        #confirm-cargo {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #4CAF50; color: white; padding: 12px 24px; border-radius: 25px;
            font-weight: bold; font-size: 14px; cursor: pointer; display: none; z-index: 1000;
            border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        #grid-controls { display: none; flex-direction: column; gap: 4px; background: #333; padding: 5px; border-radius: 6px; }
        .grid-rot-row { display: flex; justify-content: space-between; gap: 4px; width: 100%; }

        #magnifier { position: absolute; top: 10px; left: 10px; width: 180px; height: 180px; border: 4px solid var(--blue); border-radius: 50%; overflow: hidden; background: #111; display: none; z-index: 200; pointer-events: none; box-shadow: 0 0 30px rgba(0,0,0,0.7); }
        #mag-canvas { position: absolute; top: 0; left: 0; }
        #mag-crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; pointer-events: none; }
        #mag-crosshair::before, #mag-crosshair::after { content: ''; position: absolute; background: var(--blue); box-shadow: 0 0 2px black; }
        #mag-crosshair::before { width: 100%; height: 2px; top: 14px; left: 0; }
        #mag-crosshair::after { height: 100%; width: 2px; left: 14px; top: 0; }
    </style>
</head>
<body>

<div id="hub-screen">
    <div class="hub-title">Выберите редактор</div>
    <div class="hub-grid">
        <div class="hub-card" onclick="startEditor('truck-goose')">
            <h3>🚛 Тягач + Гусь</h3>
            <p>Модульные перевозки THP</p>
        </div>
        <div class="hub-card locked">
            <h3>🏗 Спецтехника</h3>
            <p>Скоро добавится</p>
        </div>
    </div>
</div>

<div id="main-app">
    <div id="sidebar">
        <div class="section-label">КАРТА</div>
        <button class="btn-tool" onclick="document.getElementById('file-input').click()">🗺 КАРТА</button>
        <button class="btn-blue" id="cal-btn" onclick="toggleCalibration()">📏 МАСШТАБ</button>
        <button class="btn-white" id="ruler-btn" onclick="toggleRuler()">📏 ЛИНЕЙКА</button>
        <button class="btn-orange" onclick="addGrid5x5()">📏 РАЗМ. СЕТКА</button>
        
        <div id="grid-controls">
            <div class="grid-rot-row">
                <button class="btn-tool btn-mini" onclick="rotateGridActive(-5)">⟲</button>
                <button class="btn-tool btn-mini" onclick="rotateGridActive(5)">⟳</button>
            </div>
            <button class="btn-freeze" style="font-size: 8px; padding: 6px 0;" onclick="confirmGrid()">✅ ОК (ФИКС)</button>
        </div>

        <div class="section-label">МОДУЛЯЦИЯ</div>
        <button class="btn-freeze" onclick="freezeModel()">❄️ ЗАМОРОЗИТЬ</button>

        <div class="section-label">ПРОЗР. ТЕХНИКИ</div>
        <div class="opacity-wrap">
            <input type="range" id="op-slider" min="0.1" max="1.0" step="0.1" value="0.6" oninput="changeGlobalOpacity(this.value)">
        </div>
        
        <div class="section-label">ПРОЗР. ГРУЗА</div>
        <div class="opacity-wrap">
            <input type="range" id="cargo-op-slider" min="0.1" max="1.0" step="0.1" value="0.6" oninput="changeCargoOpacity(this.value)">
        </div>

        <div class="section-label">ТЕХНИКА</div>
        <button class="btn-white" onclick="addVehicle('Тягач 8х4', 7.8, 2.5, 'white', 5.55, 'truck')">ТЯГАЧ 8х4</button>
        <button class="btn-red" onclick="addVehicle('Гуснек', 4.2, 2.5, '#A2231D', 4.2, 'mod', 0.5)">ГУСНЕК</button>
        <button class="btn-red" style="background:#555" onclick="let w = prompt('Ширина (3.0 - 5.5):', '3.0'); if(w) { let l = prompt('Длина (4.0 - 30.0):', '8.5'); if(l) addVehicle('Балки', parseFloat(l), parseFloat(w), 'multi', parseFloat(l), 'mod', 0, true) }">🏗 БАЛКИ</button>
        
        <div class="section-label">МОДУЛИ THP</div>
        <button class="btn-red" onclick="addVehicle('THP 2', 3.0, 3.0, '#A2231D', 3.0, 'mod', 0)">THP 2</button>
        <button class="btn-red" onclick="addVehicle('THP 3', 4.5, 3.0, '#A2231D', 4.5, 'mod', 0)">THP 3</button>
        <button class="btn-red" onclick="addVehicle('THP 4', 6.0, 3.0, '#A2231D', 6.0, 'mod', 0)">THP 4</button>
        <button class="btn-red" onclick="addVehicle('THP 5', 7.5, 3.0, '#A2231D', 7.5, 'mod', 0)">THP 5</button>
        <button class="btn-red" onclick="addVehicle('THP 6', 9.0, 3.0, '#A2231D', 9.0, 'mod', 0)">THP 6</button>

        <div class="section-label">ГРУЗ</div>
        <button class="btn-red" style="background:#e6a100; color:black;" onclick="addCargo()">📦 ПОСТАВИТЬ</button>
        
        <div style="flex-grow: 1;"></div>
        <button class="btn-danger" style="margin-bottom: 4px; background: #8B4513;" onclick="clearAllButMap()">🧹 ОЧИСТИТЬ</button>
        <button class="btn-danger" onclick="deleteSelected()">🗑 УДАЛИТЬ</button>
        
        <div style="min-height: 100px; flex-shrink: 0; width: 100%;"></div> 
    </div>

    <input type="file" id="file-input" style="display:none" accept="image/*" onchange="loadMap(event)">

    <div id="canvas-wrap">
        <div id="cal-msg" class="overlay-msg">УДЕРЖИВАЙТЕ 1 СЕК</div>
        <div id="confirm-cargo" onclick="confirmCargo()">✅ ГОТОВО</div>
        
        <div id="magnifier"><canvas id="mag-canvas" width="180" height="180"></canvas><div id="mag-crosshair"></div></div>
        <canvas id="c"></canvas>
    </div>
</div>

<script>
    const tg = window.Telegram?.WebApp; 
    if(tg) { tg.expand(); tg.ready(); }

    function startEditor(type) {
        if(type === 'truck-goose') {
            document.getElementById('hub-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            setTimeout(() => {
                canvas.setDimensions({ width: wrap.clientWidth, height: wrap.clientHeight });
                canvas.requestRenderAll();
            }, 50);
        }
    }

    window.oncontextmenu = function(e) { e.preventDefault(); return false; };

    const wrap = document.getElementById('canvas-wrap');
    const canvas = new fabric.Canvas('c', { width: wrap.clientWidth, height: wrap.clientHeight, backgroundColor: '#333', selection: true, allowTouchScrolling: false, imageSmoothingEnabled: false });
    const magEl = document.getElementById('magnifier'), magCtx = document.getElementById('mag-canvas').getContext('2d');
    const overlayMsg = document.getElementById('cal-msg');

    window.addEventListener('resize', () => {
        canvas.setDimensions({ width: wrap.clientWidth, height: wrap.clientHeight });
        canvas.requestRenderAll();
    });

    let PX_METER = 40, rotationTarget = null, isDraggingCanvas = false, lastPosX, lastPosY, startPosX, startPosY, lastDistance = 0;
    let isCalibrating = false, calPoints = [], calTimer = null;
    let isRulerMode = false, rulerPoints = [];
    let GLOBAL_OPACITY = 0.6; 
    let CARGO_OPACITY = 0.6;
    let activeCargoIndex = -1; 
    let currentGrid = null;

    function updateLastPos() { canvas.getObjects().forEach(o => { if(!o.isFrozen) { o._lastLeft = o.left; o._lastTop = o.top; } }); }

    function syncAll() {
        const parts = canvas.getObjects().filter(o => o.type === 'part' && !o.isFrozen);
        const cargos = canvas.getObjects().filter(o => o.type === 'cargo' && !o.isFrozen);
        const map = canvas.getObjects().find(o => o.type === 'map');
        const truck = parts.find(p => p.vehicleType === 'truck'), modules = parts.filter(p => p.vehicleType === 'mod'), sc = PX_METER / 40;
        
        if(map) map.sendToBack();
        canvas.getObjects().filter(o => o.type === 'handle').forEach(h => canvas.remove(h));
        parts.forEach(p => p.set({ scaleX: sc, scaleY: sc }));

        if (truck && modules.length > 0) {
            const mod0 = modules[0], radM = (mod0.angle * Math.PI) / 180, kpX = mod0.left + (mod0.f_val * sc) * Math.cos(radM), kpY = mod0.top + (mod0.f_val * sc) * Math.sin(radM), radT = (truck.angle * Math.PI) / 180;
            truck.set({ left: kpX - (truck.b_val * sc) * Math.cos(radT), top: kpY - (truck.b_val * sc) * Math.sin(radT) });
            truck.moveTo(map ? 1 : 0);
            modules.forEach((mod, idx) => {
                if (idx > 0) {
                    const prev = modules[idx-1], radP = (prev.angle * Math.PI) / 180;
                    mod.set({ left: prev.left + ((prev.b_val - mod.f_val) * sc) * Math.cos(radP), top: prev.top + ((prev.b_val - mod.f_val) * sc) * Math.sin(radP) });
                }
                mod.setCoords(); mod.bringToFront();
            });
            if (cargos.length > 0) {
                const firstMod = modules[0];
                const lastMod = modules[modules.length - 1];
                const centerX = (firstMod.left + (lastMod.left + (lastMod.b_val * sc) * Math.cos(radM))) / 2;
                const centerY = (firstMod.top + (lastMod.top + (lastMod.b_val * sc) * Math.sin(radM))) / 2;
                cargos.forEach((cargo) => {
                    const offX = (cargo.offsetMeters * PX_METER) * Math.cos(radM);
                    const offY = (cargo.offsetMeters * PX_METER) * Math.sin(radM);
                    cargo.set({ left: centerX + offX, top: centerY + offY, angle: firstMod.angle, scaleX: sc, scaleY: sc });
                    cargo.setCoords(); cargo.bringToFront();
                });
            }
            createHandle(truck.left + (1.2*40*sc) * Math.cos(radT), truck.top + (1.2*40*sc) * Math.sin(radT), 'truck'); 
            const lastMod = modules[modules.length-1], radL = (lastMod.angle * Math.PI) / 180;
            createHandle((lastMod.left + (lastMod.b_val * sc) * Math.cos(radL)) - (1.2*40*sc) * Math.cos(radL), (lastMod.top + (lastMod.b_val * sc) * Math.sin(radL)) - (1.2*40*sc) * Math.sin(radL), 'trailer');
            cargos.forEach((cargo, idx) => { if (!cargo.isPlaced) createHandle(cargo.left, cargo.top, 'cargo', idx); });
        }
        canvas.getObjects().filter(o => o.isCalDot || o.isRuler).forEach(o => { if(o.type === 'circle') o.set({ scaleX: sc, scaleY: sc }); o.bringToFront(); });
        canvas.renderAll();
    }

    function createHandle(x, y, t, cargoIndex = -1) { 
        const h = new fabric.Circle({ left: x, top: y, radius: 10, fill: '#2196F3', stroke: 'white', strokeWidth: 2, originX: 'center', originY: 'center', type: 'handle', handleType: t, cargoIdx: cargoIndex, hasControls: false, padding: 20 });
        canvas.add(h); h.bringToFront();
    }

    function addGrid5x5() {
        let sizeInput = prompt("Размер сетки (округление до 5м):", "25");
        if (!sizeInput) return;
        let s = Math.round(parseInt(sizeInput) / 5) * 5; if (s < 5) s = 5;
        const totalPx = s * PX_METER;
        const gridItems = [];

        for (let i = 0; i <= s; i += 5) {
            let pos = i * PX_METER;
            gridItems.push(new fabric.Line([pos, 0, pos, totalPx], { stroke: '#FF8C00', strokeWidth: 1.5, opacity: 0.7 }));
            gridItems.push(new fabric.Line([0, pos, totalPx, pos], { stroke: '#FF8C00', strokeWidth: 1.5, opacity: 0.7 }));
            // Горизонтальная ось (0 слева, пошло направо):
            gridItems.push(new fabric.Text(i + "м", { left: pos, top: totalPx + 5, fontSize: 14, fill: '#FF8C00', fontWeight: 'bold', originX: 'center', originY: 'top' }));
            // Вертикальная ось (снизу вверх):
            gridItems.push(new fabric.Text(i + "м", { left: -8, top: totalPx - pos, fontSize: 14, fill: '#FF8C00', fontWeight: 'bold', originY: 'center', originX: 'right' }));
        }

        currentGrid = new fabric.Group(gridItems, {
            left: canvas.width / 2, top: canvas.height / 2,
            originX: 'center', originY: 'center',
            type: 'grid5x5', selectable: true, hasControls: false
        });

        canvas.add(currentGrid);
        document.getElementById('grid-controls').style.display = 'flex';
        syncAll();
    }

    function rotateGridActive(deg) { if(currentGrid) { currentGrid.angle += deg; canvas.requestRenderAll(); } }
    function confirmGrid() { if(currentGrid) { currentGrid.set({ selectable: false, evented: false, isFrozen: true }); currentGrid = null; document.getElementById('grid-controls').style.display = 'none'; } }

    function toggleCalibration() { isCalibrating = !isCalibrating; isRulerMode = false; calPoints = []; canvas.getObjects().filter(o => o.isCalDot).forEach(dot => canvas.remove(dot)); overlayMsg.innerText = "УДЕРЖИВАЙТЕ 1 СЕК"; overlayMsg.style.display = isCalibrating ? 'block' : 'none'; }
    function toggleRuler() { isRulerMode = !isRulerMode; isCalibrating = false; rulerPoints = []; canvas.getObjects().filter(o => o.isRuler).forEach(o => canvas.remove(o)); overlayMsg.innerText = "ЛИНЕЙКА: УДЕРЖИВАЙТЕ ТОЧКИ"; overlayMsg.style.display = isRulerMode ? 'block' : 'none'; syncAll(); }

    function freezeModel() {
        const active = canvas.getObjects().filter(o => (o.type === 'part' || o.type === 'cargo') && !o.isFrozen);
        if(active.length === 0) return;
        const groupId = "group_" + Date.now();
        active.forEach(obj => {
            obj.clone(cl => {
                cl.set({ selectable: true, hasControls: false, lockMovementX: true, lockMovementY: true, isFrozen: true, freezeGroup: groupId, opacity: obj.type === 'cargo' ? CARGO_OPACITY : GLOBAL_OPACITY });
                canvas.add(cl);
            });
        });
        setTimeout(syncAll, 50);
    }

    function addCargo() {
        const mods = canvas.getObjects().filter(o => o.vehicleType === 'mod' && !o.isFrozen);
        if (mods.length === 0) { alert("Сначала добавьте модули!"); return; }
        let l = parseFloat(prompt('Длина (м):', '10.0')), w = parseFloat(prompt('Ширина (м):', '3.5')), off = parseFloat(prompt('Смещение (м):', '0')) || 0;
        if (!l || !w) return;
        const sc = PX_METER / 40;
        const cargo = new fabric.Group([new fabric.Rect({ width: l*40, height: w*40, fill: '#FFD700', stroke: 'black', strokeWidth: 2 }), new fabric.Line([-15,0,15,0],{stroke:'black'}), new fabric.Line([0,-15,0,15],{stroke:'black'})], { type:'cargo', offsetMeters: off, isPlaced:false, isFrozen:false, originX:'center', originY:'center', hasControls:false, opacity:CARGO_OPACITY, scaleX:sc, scaleY:sc });
        canvas.add(cargo); document.getElementById('confirm-cargo').style.display = 'block'; syncAll();
    }

    function confirmCargo() { document.getElementById('confirm-cargo').style.display = 'none'; canvas.getObjects().filter(o => o.type === 'cargo').forEach(c => c.isPlaced = true); rotationTarget = null; activeCargoIndex = -1; syncAll(); }

    function updateMagnifier(ptr) {
        if (!isCalibrating && !isRulerMode) return;
        magEl.style.display = 'block';
        magCtx.clearRect(0, 0, 180, 180); magCtx.save();
        magCtx.translate(90, 90); magCtx.scale(2.5, 2.5); magCtx.translate(-ptr.x, -ptr.y);
        canvas.getObjects().forEach(obj => { if (['map','part','cargo','grid5x5'].includes(obj.type) || obj.isCalDot || obj.isRuler) obj.render(magCtx); });
        magCtx.restore();
    }

    canvas.on('mouse:down', function(opt) {
        const evt = opt.e; const touches = evt.touches;
        if (touches && touches.length === 2) { canvas.selection = false; isDraggingCanvas = false; rotationTarget = null; lastDistance = Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY); return; }
        const cX = touches ? touches[0].clientX : evt.clientX, cY = touches ? touches[0].clientY : evt.clientY, ptr = canvas.getPointer(evt);
        startPosX = lastPosX = cX; startPosY = lastPosY = cY; canvas.selection = true;
        if (isCalibrating || isRulerMode) {
            updateMagnifier(ptr);
            calTimer = setTimeout(() => {
                if(isCalibrating) {
                    calPoints.push(ptr); canvas.add(new fabric.Circle({ left: ptr.x, top: ptr.y, radius: 5, fill: '#2196F3', stroke: 'white', strokeWidth: 2, originX: 'center', originY: 'center', selectable: false, evented: false, isCalDot: true }));
                    if (calPoints.length === 2) { let m = prompt("Метры:", "10"); if (m) PX_METER = Math.hypot(calPoints[0].x - calPoints[1].x, calPoints[0].y - calPoints[1].y) / parseFloat(m); toggleCalibration(); syncAll(); }
                } else if(isRulerMode) {
                    rulerPoints.push(ptr); canvas.add(new fabric.Circle({ left: ptr.x, top: ptr.y, radius: 6, fill: 'white', stroke: '#000', strokeWidth: 1, originX: 'center', originY: 'center', selectable: false, evented: false, isRuler: true }));
                    if (rulerPoints.length === 2) { let distM = (Math.hypot(rulerPoints[0].x - rulerPoints[1].x, rulerPoints[0].y - rulerPoints[1].y) / PX_METER).toFixed(2); canvas.add(new fabric.Line([rulerPoints[0].x, rulerPoints[0].y, rulerPoints[1].x, rulerPoints[1].y], { stroke: 'white', strokeWidth: 2, strokeDashArray: [5, 5], selectable: false, evented: false, isRuler: true })); overlayMsg.innerText = "РАССТОЯНИЕ: " + distM + " м"; rulerPoints = []; }
                }
            }, 1000);
        }
        if (opt.target && opt.target.type === 'handle') { rotationTarget = opt.target.handleType; if (rotationTarget === 'cargo') activeCargoIndex = opt.target.cargoIdx; return; }
        if (!opt.target || opt.target.type === 'map' || opt.target.isCalDot || opt.target.isFrozen) isDraggingCanvas = true;
        updateLastPos();
    });

    canvas.on('mouse:move', function(opt) {
        const evt = opt.e; const touches = evt.touches;
        if (touches && touches.length === 2) { canvas.selection = false; isDraggingCanvas = false; rotationTarget = null; let dist = Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY); if (lastDistance > 0) canvas.zoomToPoint(new fabric.Point(canvas.width / 2, canvas.height / 2), canvas.getZoom() * (dist / lastDistance)); lastDistance = dist; return; }
        const cX = touches ? touches[0].clientX : evt.clientX, cY = touches ? touches[0].clientY : evt.clientY, ptr = canvas.getPointer(evt);
        if (isCalibrating || isRulerMode) { updateMagnifier(ptr); if (Math.hypot(cX - startPosX, cY - startPosY) > 10) { clearTimeout(calTimer); calTimer = null; } }
        if (rotationTarget) {
            const parts = canvas.getObjects().filter(o => o.type === 'part' && !o.isFrozen);
            const truck = parts.find(p => p.vehicleType === 'truck'), mod0 = parts.find(p => p.vehicleType === 'mod'), sc = PX_METER / 40;
            if (rotationTarget === 'cargo') {
                const cargos = canvas.getObjects().filter(o => o.type === 'cargo' && !o.isFrozen);
                if (mod0 && cargos[activeCargoIndex]) {
                    const radM = (mod0.angle * Math.PI) / 180, lastMod = parts.filter(p => p.vehicleType === 'mod').pop();
                    const centerX = (mod0.left + (lastMod.left + (lastMod.b_val * sc) * Math.cos(radM))) / 2, centerY = (mod0.top + (lastMod.top + (lastMod.b_val * sc) * Math.sin(radM))) / 2;
                    cargos[activeCargoIndex].offsetMeters = ((ptr.x - centerX) * Math.cos(radM) + (ptr.y - centerY) * Math.sin(radM)) / PX_METER; syncAll();
                }
            } else if (truck && mod0) {
                const radM = (mod0.angle * Math.PI) / 180, kpX = mod0.left + (mod0.f_val * sc) * Math.cos(radM), kpY = mod0.top + (mod0.f_val * sc) * Math.sin(radM);
                if (rotationTarget === 'truck') truck.angle = Math.atan2(kpY - ptr.y, kpX - ptr.x) * 180 / Math.PI;
                else parts.filter(p => p.vehicleType === 'mod').forEach(p => p.angle = Math.atan2(ptr.y - kpY, ptr.x - kpX) * 180 / Math.PI);
                syncAll();
            }
        } else if (isDraggingCanvas) { let vpt = canvas.viewportTransform; vpt[4] += cX - lastPosX; vpt[5] += cY - lastPosY; canvas.requestRenderAll(); }
        lastPosX = cX; lastPosY = cY;
    });

    canvas.on('object:moving', (e) => {
        const moved = e.target; if (moved.isFrozen) return;
        if (['part','cargo','grid5x5'].includes(moved.type)) {
            const dx = moved.left - moved._lastLeft, dy = moved.top - moved._lastTop;
            if (moved.type !== 'grid5x5') canvas.getObjects().filter(o => (o.type === 'part' || o.type === 'cargo') && !o.isFrozen && o !== moved).forEach(p => { p.left += dx; p.top += dy; p.setCoords(); });
            updateLastPos(); syncAll();
        }
    });

    canvas.on('mouse:up', () => { if (calTimer) clearTimeout(calTimer); magEl.style.display = 'none'; isDraggingCanvas = false; rotationTarget = null; lastDistance = 0; canvas.selection = true; syncAll(); });

    function addVehicle(n, l, w, c, b, t, f, isMulti = false) {
        const sc = PX_METER / 40; let cX = (canvas.width/2 - canvas.viewportTransform[4])/canvas.getZoom(), cY = (canvas.height/2 - canvas.viewportTransform[5])/canvas.getZoom();
        const activeParts = canvas.getObjects().filter(o => o.type === 'part' && !o.isFrozen);
        let lastAngle = activeParts.length ? activeParts[activeParts.length-1].angle : 0;
        if (activeParts.length) { let last = activeParts[activeParts.length-1], rad = (lastAngle * Math.PI) / 180; cX = last.left + (last.b_val * sc) * Math.cos(rad) - (f||0)*sc*Math.cos(rad); cY = last.top + (last.b_val * sc) * Math.sin(rad) - (f||0)*sc*Math.sin(rad); }
        let obj;
        if(isMulti) {
            const bl = l*40, bw = (w*40)/2;
            obj = new fabric.Group([new fabric.Rect({left:24, top:-bw, width:bl, height:18, fill:'#A2231D', stroke:'black', strokeWidth:2}), new fabric.Rect({left:24, top:bw-18, width:bl, height:18, fill:'#A2231D', stroke:'black', strokeWidth:2}), new fabric.Rect({left:0, top:-60, width:24, height:120, fill:'#444', stroke:'black', strokeWidth:2, opacity: 0.9}), new fabric.Rect({left:bl+24, top:-60, width:24, height:120, fill:'#444', stroke:'black', strokeWidth:2, opacity: 0.9})], { left: cX, top: cY, angle: lastAngle, type: 'part', vehicleType: 'mod', isFrozen: false, b_val: (l+1.2)*40, f_val: 0, originX: 'left', originY: 'center', hasControls: false, opacity: GLOBAL_OPACITY, scaleX: sc, scaleY: sc });
        } else if (t === 'truck') {
            const tL = l * 40, tW = w * 40, wL = 1.12 * 40, axX = [1.3 * 40, 3.9 * 40, 5.343 * 40, 6.763 * 40], cabL = tL * 0.3, instL = axX[1] - cabL - wL/2, fanBoxSize = instL * 0.85, fanCX = cabL + instL / 2, fanR = (fanBoxSize * 0.8) / 2;
            let wheels = []; axX.forEach((x, idx) => { const hWheel = (idx < 2) ? 13 : 26; [-(tW/2), (tW/2 - hWheel)].forEach(posY => wheels.push(new fabric.Rect({ left: x - wL/2, top: posY, width: wL, height: hWheel, fill: '#222', rx: 4, ry: 4, stroke: 'black', strokeWidth: 1 }))); });
            const fanElems = [new fabric.Rect({ left: cabL + (instL - fanBoxSize) / 2, top: -fanBoxSize / 2, width: fanBoxSize, height: fanBoxSize, fill: '#ddd', stroke: '#555', strokeWidth: 1.5 }), new fabric.Circle({ radius: fanR, left: fanCX, top: 0, originX: 'center', originY: 'center', fill: '#f0f0f0', stroke: '#333', strokeWidth: 2 }), ...Array.from({length: 8}).map((_, i) => new fabric.Rect({ width: 2, height: fanR * 1.8, left: fanCX, top: 0, originX: 'center', originY: 'center', fill: '#333', angle: i * 45 })), new fabric.Circle({ radius: fanR * 0.2, left: fanCX, top: 0, originX: 'center', originY: 'center', fill: '#222' })];
            obj = new fabric.Group([new fabric.Rect({ width: tL, height: tW, fill: 'white', stroke: 'black', strokeWidth: 2, originY: 'center' }), new fabric.Rect({ width: cabL, height: tW, left: 0, top: -tW/2, fill: 'white', stroke: 'black', strokeWidth: 1 }), new fabric.Rect({ width: instL, height: tW, left: cabL, top: -tW/2, fill: 'white', stroke: 'black', strokeWidth: 1 }), ...fanElems, ...wheels], { left: cX, top: cY, angle: lastAngle, type: 'part', vehicleType: t, isFrozen: false, b_val: b * 40, f_val: (f||0) * 40, originX: 'left', originY: 'center', hasControls: false, opacity: GLOBAL_OPACITY, scaleX: sc, scaleY: sc });
        } else {
            let modElems = []; const mL = l * 40, mW = w * 40;
            if (n === 'Гуснек') { modElems.push(new fabric.Polygon([{ x: 0.65*40, y: 0 }, { x: mL, y: 0 }, { x: mL, y: mW }, { x: 0.65*40, y: mW }, { x: 0, y: mW - 0.65*40 }, { x: 0, y: 0.65*40 }], { fill: c, stroke: 'black', strokeWidth: 2, left: 0, top: -mW/2 })); [0.3 * 40, -0.3 * 40].forEach(y => modElems.push(new fabric.Rect({ left: 2.3 * 40, top: y, width: 0.5 * 40 * 2.5, height: 0.22 * 40, fill: '#444', stroke: 'black', strokeWidth: 1, originX: 'left', originY: 'center' }))); }
            else if (n.startsWith('THP')) { modElems.push(new fabric.Polygon([{ x: 0.32*40, y: 0 }, { x: mL - 0.32*40, y: 0 }, { x: mL, y: 0.32*40 }, { x: mL, y: mW - 0.32*40 }, { x: mL - 0.32*40, y: mW }, { x: 0.32*40, y: mW }, { x: 0, y: mW - 0.32*40 }, { x: 0, y: 0.32*40 }], { fill: c, stroke: 'black', strokeWidth: 2, left: 0, top: -mW/2 })); for (let i = 0; i < parseInt(n.split(' ')[1]); i++) { let pX = (0.75 + i * 1.5) * 40; [-0.9*40, 0.9*40].forEach(pY => modElems.push(new fabric.Circle({left: pX, top: pY, radius: 18, originX: 'center', originY: 'center', fill: 'transparent', stroke: 'rgba(0,0,0,0.5)', strokeWidth: 1, strokeDashArray: [4, 4]}))); } }
            else { modElems.push(new fabric.Rect({ width: l*40, height: w*40, fill: c, stroke: 'black', strokeWidth: 2, originY: 'center' })); }
            obj = new fabric.Group(modElems, { left: cX, top: cY, angle: lastAngle, type: 'part', vehicleType: t, isFrozen: false, b_val: b * 40, f_val: (f||0) * 40, originX: 'left', originY: 'center', hasControls: false, opacity: GLOBAL_OPACITY, scaleX: sc, scaleY: sc });
        }
        canvas.add(obj); syncAll();
    }

    function deleteSelected() { 
        canvas.getActiveObjects().forEach(obj => { 
            if (obj.isFrozen && obj.freezeGroup) canvas.getObjects().filter(o => o.freezeGroup === obj.freezeGroup).forEach(o => canvas.remove(o)); 
            else if (obj.type === 'grid5x5') {
                canvas.remove(obj); 
                document.getElementById('grid-controls').style.display = 'none'; 
                if(currentGrid === obj) currentGrid = null;
            } 
            else canvas.remove(obj); 
        }); 
        canvas.discardActiveObject(); syncAll(); 
    }

    function clearAllButMap() { if(confirm("Удалить всё?")) { canvas.getObjects().forEach(obj => { if (obj.type !== 'map') canvas.remove(obj); }); overlayMsg.style.display = 'none'; document.getElementById('grid-controls').style.display = 'none'; currentGrid = null; syncAll(); } }
    
    function changeGlobalOpacity(val) { GLOBAL_OPACITY = parseFloat(val); canvas.getObjects().forEach(obj => { if (obj.type === 'part') obj.set('opacity', GLOBAL_OPACITY); }); canvas.requestRenderAll(); }
    function changeCargoOpacity(val) { CARGO_OPACITY = parseFloat(val); canvas.getObjects().forEach(obj => { if (obj.type === 'cargo') obj.set('opacity', CARGO_OPACITY); }); canvas.requestRenderAll(); }

    function loadMap(event) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader(); reader.onload = f => fabric.Image.fromURL(f.target.result, img => {
            canvas.getObjects().filter(o => o.type === 'map').forEach(m => canvas.remove(m));
            img.set({ selectable: false, evented: false, type: 'map' }); canvas.add(img).sendToBack();
            canvas.setZoom(Math.min((canvas.width - 40) / img.width, (canvas.height - 40) / img.height)); canvas.requestRenderAll();
        }); reader.readAsDataURL(file);
    }
</script>
