<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HT Assembler v8.9.70 PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root { --red: #A2231D; --border: #444; --blue: #2196F3; }
        * { box-sizing: border-box; touch-action: none; -webkit-user-select: none; }
        body { margin: 0; font-family: sans-serif; background: #000; color: white; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        #sidebar { width: 115px; min-width: 115px; background: #222; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 10px 5px; gap: 8px; z-index: 50; overflow-y: auto; }
        button { width: 100%; padding: 12px 2px; border: none; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; color: white; }
        .btn-tool { background: #444; } .btn-white { background: #fff; color: #000; } .btn-red { background: var(--red); } .btn-blue { background: var(--blue); } .btn-danger { background: #551111; }
        .section-label { font-size: 8px; color: #777; text-align: center; margin-top: 5px; text-transform: uppercase; }
        #canvas-wrap { flex-grow: 1; position: relative; background: #333; overflow: hidden; }
        #c { position: absolute; top: 0; left: 0; }
        .overlay-msg { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 10px 20px; border-radius: 25px; font-size: 11px; z-index: 100; display: none; border: 2px solid var(--blue); }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="section-label">КАРТА</div>
    <button class="btn-tool" onclick="document.getElementById('file-input').click()">🗺 КАРТА</button>
    <button class="btn-blue" onclick="toggleCalibration()">📏 МАСШТАБ</button>
    <div class="section-label">ТЕХНИКА</div>
    <button class="btn-white" onclick="addVehicle('Тягач', 7.6, 2.5, 'white', 5.4, 'truck')">ТЯГАЧ</button>
    <button class="btn-red" onclick="addVehicle('Гуснек', 4.2, 2.5, '#A2231D', 4.2, 'mod', 0.5)">ГУСНЕК</button>
    <div class="section-label">МОДУЛИ THP</div>
    <button class="btn-red" onclick="addVehicle('THP 2', 3.0, 3.0, '#A2231D', 3.0, 'mod', 0)">THP 2</button>
    <button class="btn-red" onclick="addVehicle('THP 3', 4.5, 3.0, '#A2231D', 4.5, 'mod', 0)">THP 3</button>
    <button class="btn-red" onclick="addVehicle('THP 4', 6.0, 3.0, '#A2231D', 6.0, 'mod', 0)">THP 4</button>
    <button class="btn-red" onclick="addVehicle('THP 6', 9.0, 3.0, '#A2231D', 9.0, 'mod', 0)">THP 6</button>
    <div style="flex-grow: 1;"></div>
    <button class="btn-danger" onclick="deleteSelected()">🗑 УДАЛИТЬ</button>
    <button class="btn-danger" style="background:#000; border:1px solid var(--border)" onclick="clearAll()">❌ СБРОС</button>
</div>

<input type="file" id="file-input" style="display:none" accept="image/*" onchange="loadMap(event)">

<div id="canvas-wrap">
    <div id="cal-msg" class="overlay-msg">РЕЖИМ КАЛИБРОВКИ</div>
    <canvas id="c"></canvas>
</div>

<script>
    const wrap = document.getElementById('canvas-wrap');
    const canvas = new fabric.Canvas('c', { width: wrap.clientWidth, height: wrap.clientHeight, backgroundColor: '#333', selection: false });
    
    let PX_METER = 40, isCalibrating = false, calPoints = [], isDraggingCanvas = false, lastPosX, lastPosY, lastDistance = 0, rotationTarget = null;

    function syncAll() {
        const parts = canvas.getObjects().filter(o => o.type === 'part');
        const truck = parts.find(p => p.vehicleType === 'truck'), modules = parts.filter(p => p.vehicleType === 'mod'), sc = PX_METER / 40;
        
        canvas.getObjects().filter(o => o.type === 'handle').forEach(h => canvas.remove(h));
        
        if (truck && modules.length > 0) {
            const mod0 = modules[0], radM = (mod0.angle * Math.PI) / 180;
            const kpX = mod0.left + (mod0.f_val * sc) * Math.cos(radM), kpY = mod0.top + (mod0.f_val * sc) * Math.sin(radM);
            const radT = (truck.angle * Math.PI) / 180;
            
            // Тягач всегда под первым модулем (гуснеком)
            truck.set({ left: kpX - (truck.b_val * sc) * Math.cos(radT), top: kpY - (truck.b_val * sc) * Math.sin(radT), scaleX: sc, scaleY: sc });
            truck.moveTo(1); 

            modules.forEach((mod, idx) => {
                mod.scaleX = mod.scaleY = sc;
                if (idx > 0) {
                    const prev = modules[idx-1], radP = (prev.angle * Math.PI) / 180;
                    mod.set({ 
                        left: prev.left + ((prev.b_val - mod.f_val) * sc) * Math.cos(radP), 
                        top: prev.top + ((prev.b_val - mod.f_val) * sc) * Math.sin(radP),
                        angle: prev.angle 
                    });
                }
                mod.setCoords();
                mod.bringToFront();
            });

            // Ручки управления
            createHandle(truck.left + (1.2*40*sc) * Math.cos(radT), truck.top + (1.2*40*sc) * Math.sin(radT), 'truck'); 
            const lastMod = modules[modules.length-1], radL = (lastMod.angle * Math.PI) / 180;
            createHandle((lastMod.left + (lastMod.b_val * sc) * Math.cos(radL)) - (1.2*40*sc) * Math.cos(radL), (lastMod.top + (lastMod.b_val * sc) * Math.sin(radL)) - (1.2*40*sc) * Math.sin(radL), 'trailer');
        }
        canvas.renderAll();
    }

    function createHandle(x, y, t) {
        const h = new fabric.Circle({ left: x, top: y, radius: 15, fill: '#2196F3', stroke: 'white', strokeWidth: 3, originX: 'center', originY: 'center', type: 'handle', handleType: t, hasControls: false });
        canvas.add(h); h.bringToFront();
    }

    canvas.on('mouse:down', function(opt) {
        const evt = opt.e;
        if (evt.touches && evt.touches.length === 2) {
            lastDistance = Math.hypot(evt.touches[0].clientX - evt.touches[1].clientX, evt.touches[0].clientY - evt.touches[1].clientY);
            return;
        }
        const target = opt.target;
        lastPosX = evt.touches ? evt.touches[0].clientX : evt.clientX;
        lastPosY = evt.touches ? evt.touches[0].clientY : evt.clientY;

        if (target && target.type === 'handle') { rotationTarget = target.handleType; }
        else if (!target || target.type === 'map') { isDraggingCanvas = true; }
        
        // Координаты для каждого объекта для синхронного движения
        canvas.getObjects().forEach(obj => { obj._lastLeft = obj.left; obj._lastTop = obj.top; });
    });

    canvas.on('mouse:move', function(opt) {
        const evt = opt.e;
        if (evt.touches && evt.touches.length === 2) {
            const dist = Math.hypot(evt.touches[0].clientX - evt.touches[1].clientX, evt.touches[0].clientY - evt.touches[1].clientY);
            const pointer = canvas.getPointer(evt, true);
            if (lastDistance > 0) canvas.zoomToPoint(new fabric.Point(pointer.x, pointer.y), canvas.getZoom() * (dist / lastDistance));
            lastDistance = dist; return;
        }
        const ptr = canvas.getPointer(evt);
        const cX = evt.touches ? evt.touches[0].clientX : evt.clientX, cY = evt.touches ? evt.touches[0].clientY : evt.clientY;

        if (rotationTarget) {
            const truck = canvas.getObjects().find(o => o.vehicleType === 'truck');
            const mod0 = canvas.getObjects().find(o => o.vehicleType === 'mod');
            if (truck && mod0) {
                const sc = PX_METER / 40, radM = (mod0.angle * Math.PI) / 180;
                const kpX = mod0.left + (mod0.f_val * sc) * Math.cos(radM), kpY = mod0.top + (mod0.f_val * sc) * Math.sin(radM);
                if (rotationTarget === 'truck') truck.angle = Math.atan2(kpY - ptr.y, kpX - ptr.x) * 180 / Math.PI;
                else canvas.getObjects().filter(o => o.vehicleType === 'mod').forEach(m => m.angle = Math.atan2(ptr.y - kpY, ptr.x - kpX) * 180 / Math.PI);
                syncAll();
            }
        } else if (isDraggingCanvas) {
            const vpt = canvas.viewportTransform;
            vpt[4] += cX - lastPosX; vpt[5] += cY - lastPosY;
            canvas.requestRenderAll();
        }
        lastPosX = cX; lastPosY = cY;
    });

    canvas.on('object:moving', function(e) {
        const moved = e.target; if (moved.type !== 'part') return;
        const dx = moved.left - moved._lastLeft, dy = moved.top - moved._lastTop;
        // Двигаем ВСЕ части автопоезда вместе
        canvas.getObjects().filter(o => o.type === 'part' && o !== moved).forEach(p => {
            p.left += dx; p.top += dy; p.setCoords();
        });
        canvas.getObjects().forEach(obj => { obj._lastLeft = obj.left; obj._lastTop = obj.top; });
        syncAll();
    });

    canvas.on('mouse:up', () => { isDraggingCanvas = false; rotationTarget = null; lastDistance = 0; syncAll(); });

    function addVehicle(n, l, w, c, b, t, f) {
        const sc = PX_METER / 40, vpt = canvas.viewportTransform;
        let cX = (canvas.width/2 - vpt[4])/canvas.getZoom(), cY = (canvas.height/2 - vpt[5])/canvas.getZoom();
        
        const parts = canvas.getObjects().filter(o => o.type === 'part');
        if (parts.length > 0) {
            const last = parts[parts.length-1], rad = (last.angle * Math.PI) / 180;
            cX = last.left + (last.b_val * sc) * Math.cos(rad) - (f||0)*sc*Math.cos(rad);
            cY = last.top + (last.b_val * sc) * Math.sin(rad) - (f||0)*sc*Math.sin(rad);
        }

        const obj = new fabric.Group([
            new fabric.Rect({ width: l*40, height: w*40, fill: c, stroke: 'black', strokeWidth: 1, originY: 'center' }),
            new fabric.Text(n, { fontSize: 10, originX: 'center', left: (l*40)/2, fill: (c==='white'?'black':'white'), fontWeight:'bold' })
        ], { left: cX, top: cY, type: 'part', vehicleType: t, b_val: b * 40, f_val: (f||0) * 40, originX: 'left', originY: 'center', hasControls: false });

        if (parts.length > 0) obj.angle = parts[0].angle;
        canvas.add(obj); syncAll();
    }

    function loadMap(event) {
        const reader = new FileReader(); reader.onload = f => fabric.Image.fromURL(f.target.result, img => {
            img.set({ selectable: false, evented: false, type: 'map' }); 
            canvas.add(img); img.sendToBack(); syncAll();
        }); reader.readAsDataURL(event.target.files[0]);
    }

    function toggleCalibration() { isCalibrating = !isCalibrating; document.getElementById('cal-msg').style.display = isCalibrating?'block':'none'; }
    function deleteSelected() { canvas.getActiveObjects().forEach(o => canvas.remove(o)); syncAll(); }
    function clearAll() { if(confirm("Сбросить всё?")) { canvas.clear(); canvas.setViewportTransform([1,0,0,1,0,0]); syncAll(); } }
</script>
</body>
</html>
