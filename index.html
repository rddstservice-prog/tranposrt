<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HeavyTransport v0.1.0-beta</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <style>
        :root { --red: #A2231D; --border: #444; --blue: #2196F3; }
        * { box-sizing: border-box; touch-action: none; -webkit-user-select: none; }
        
        body { 
            margin: 0; 
            font-family: sans-serif; 
            background: #000; 
            color: white; 
            display: flex; 
            height: 100vh; 
            height: 100dvh; 
            width: 100vw; 
            overflow: hidden; 
            position: fixed; 
        }
        
        #hub-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }
        .hub-title { font-size: 18px; font-weight: bold; margin-bottom: 30px; color: var(--blue); text-transform: uppercase; letter-spacing: 2px; }
        .hub-grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; max-width: 300px; }
        .hub-card {
            background: #222; border: 2px solid var(--border); padding: 20px; border-radius: 12px;
            text-align: center; cursor: pointer; transition: 0.2s;
        }
        .hub-card:active { transform: scale(0.95); border-color: var(--blue); }
        .hub-card h3 { margin: 0 0 5px 0; font-size: 14px; }
        .hub-card p { margin: 0; font-size: 10px; color: #777; }
        .hub-card.locked { opacity: 0.5; border-style: dashed; }

        #main-app { display: none; width: 100%; height: 100%; }
        
        #sidebar { 
            width: 115px; 
            min-width: 115px; 
            background: #222; 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 10px 5px; 
            gap: 8px; 
            z-index: 50; 
            overflow-y: auto; 
            padding-top: env(safe-area-inset-top); 
            height: 100%;
        }
        
        button { width: 100%; padding: 12px 2px; border: none; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; color: white; flex-shrink: 0; }
        .btn-tool { background: #444; } .btn-white { background: #fff; color: #000; } .btn-red { background: var(--red); } .btn-blue { background: var(--blue); } .btn-danger { background: #551111; }
        .section-label { font-size: 8px; color: #777; text-align: center; margin-top: 5px; text-transform: uppercase; flex-shrink: 0; }
        #canvas-wrap { flex-grow: 1; position: relative; background: #333; overflow: hidden; height: 100%; }
        
        .opacity-wrap { padding: 5px; background: #333; border-radius: 6px; margin-top: 5px; flex-shrink: 0; }
