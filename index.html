<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HT Assembler PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root { --red: #A2231D; --border: #444; --blue: #2196F3; }
        * { box-sizing: border-box; touch-action: none; -webkit-user-select: none; }
        body { margin: 0; font-family: sans-serif; background: #000; color: white; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        #loader { position: absolute; width: 100vw; height: 100vh; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { border: 4px solid #333; border-top: 4px solid var(--blue); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #l-text { font-size: 14px; color: #888; font-weight: bold; text-align: center; padding: 0 20px; }
        #sidebar { width: 115px; background: #222; border-right: 1px solid var(--border); display: none; flex-direction: column; padding: 10px 5px; gap: 8px; z-index: 50; overflow-y: auto; }
        button { width: 100%; padding: 12px 2px; border: none; border-radius: 6px; font-size: 10px; font-weight: bold; color: white; }
        .btn-tool { background: #444; } .btn-white { background: #fff; color: #000; } .btn-red { background: var(--red); } .btn-blue { background: var(--blue); } .btn-danger { background: #551111; }
        .section-label { font-size: 8px; color: #777; text-align: center; margin-top: 5px; text-transform: uppercase; }
        #canvas-wrap { flex-grow: 1; position: relative; background: #333; display: none; }
        .overlay-msg { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 10px 20px; border-radius: 25px; font-size: 11px; z-index: 100; display: none; border: 2px solid var(--blue); }
        #magnifier { position: absolute; top: 10px; left: 10px; width: 180px; height: 180px; border: 4px solid var(--blue); border-radius: 50%; overflow: hidden; background: #111; display: none; z-index: 200; box-shadow: 0 0 30px rgba(0,0,0,0.7); }
        #mag-canvas { position: absolute; top: 0; left: 0; }
        #mag-crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; }
        #mag-crosshair::before, #mag-crosshair::after { content: ''; position: absolute; background: var(--blue); }
        #mag-crosshair::before { width: 100%; height: 2px; top: 14px; left: 0; }
        #mag-crosshair::after { height: 100%; width: 2px; left: 14px; top: 0; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="l-text">АВТОРИЗАЦИЯ...</div>
</div>

<div id="sidebar">
    <div class="section-label">КАРТА</div>
    <button class="btn-tool" onclick="document.getElementById('file-input').click()">🗺 КАРТА</button>
    <button class="btn-blue" id="cal-btn" onclick="toggleCalibration()">📏 МАСШТАБ</button>
    <div class="section-label">ТЕХНИКА</div>
    <button class="btn-white" onclick="addVehicle('Тягач', 7.6, 2.5, 'white', 5.4, 'truck')">ТЯГАЧ</button>
    <button class="btn-red" onclick="addVehicle('Гуснек', 4.2, 2.5, '#A2231D', 4.2, 'mod', 0.5)">ГУСНЕК</button>
    <button class="btn-red" style="background:#555" onclick="let w = prompt('Ширина:', '3.0'); if(w) { let l = prompt('Длина:', '8.5'); if(l) addVehicle('Балки', parseFloat(l), parseFloat(w), 'multi', parseFloat(l), 'mod', 0, true) }">🏗 БАЛКИ</button>
    <div class="section-label">МОДУЛИ THP</div>
    <button class="btn-red" onclick="addVehicle('THP 2', 3.0, 3.0, '#A2231D', 3.0, 'mod', 0)">THP 2</button>
    <button class="btn-red" onclick="addVehicle('THP 3', 4.5, 3.0, '#A2231D', 4.5, 'mod', 0)">THP 3</button>
    <button class="btn-red" onclick="addVehicle('THP 4', 6.0, 3.0, '#A2231D', 6.0, 'mod', 0)">THP 4</button>
    <button class="btn-red" onclick="addVehicle('THP 5', 7.5, 3.0, '#A2231D', 7.5, 'mod', 0)">THP 5</button>
    <button class="btn-red" onclick="addVehicle('THP 6', 9.0, 3.0, '#A2231D', 9.0, 'mod', 0)">THP 6</button>
    <div style="flex-grow: 1;"></div>
    <button class="btn-danger" onclick="deleteSelected()">🗑 УДАЛИТЬ</button>
    <button class="btn-danger" style="background:#000; border:1px solid var(--border)" onclick="clearAll()">❌ СБРОС</button>
</div>

<input type="file" id="file-input" style="display:none" accept="image/*" onchange="loadMap(event)">

<div id="canvas-wrap">
    <div id="cal-msg" class="overlay-msg">УДЕРЖИВАЙТЕ 2 СЕК</div>
    <div id="magnifier"><canvas id="mag-canvas" width="180" height="180"></canvas><div id="mag-crosshair"></div></div>
    <canvas id="c"></canvas>
</div>

<script>
    const tg = window.Telegram.WebApp; 
    tg.expand(); tg.ready();

    // ЗАМЕНИТЕ ЭТУ ССЫЛКУ НА ВАШУ
    const G_URL = "https://script.google.com/macros/s/AKfycbxPOzabeYYqp8VheNikI00x5ITkouRJ8VM1VIK5FjzsbxBJaJEVjnJrfKFaI9IAuBCpAw/exec";

    async function checkAccess() {
        const initData = tg.initData;
        if (!initData) { showError("ЗАПУСТИТЕ ИЗ БОТА"); return; }
        try {
            const res = await fetch(G_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ initData: initData })
            });
            const data = await res.json();
            if (data.allowed) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('sidebar').style.display = 'flex';
                document.getElementById('canvas-wrap').style.display = 'block';
                initApp();
            } else {
                showError("ДОСТУП ЗАПРЕЩЕН");
            }
        } catch (e) { showError("ОШИБКА СЕРВЕРА"); }
    }

    function showError(text) {
        document.querySelector('.spinner').style.display = 'none';
        document.getElementById('l-text').innerText = text;
        document.getElementById('l-text').style.color = '#ff4444';
    }

    // --- ЛОГИКА ПРИЛОЖЕНИЯ ---
    let wrap, canvas, magEl, magCtx;
    let PX_METER = 40, rotationTarget = null, isDraggingCanvas = false, lastPosX, lastPosY;
    let isCalibrating = false, calPoints = [], calTimer = null;

    function initApp() {
        wrap = document.getElementById('canvas-wrap');
        canvas = new fabric.Canvas('c', { width: wrap.clientWidth, height: wrap.clientHeight, backgroundColor: '#333', selection: false });
        magEl = document.getElementById('magnifier');
        magCtx = document.getElementById('mag-canvas').getContext('2d');

        canvas.on('mouse:down', function(opt) {
            const evt = opt.e;
            const cX = evt.touches ? evt.touches[0].clientX : evt.clientX, cY = evt.touches ? evt.touches[0].clientY : evt.clientY;
            const ptr = canvas.getPointer(evt);
            lastPosX = cX; lastPosY = cY;
            if (isCalibrating) {
                updateMagnifier(ptr);
                calTimer = setTimeout(() => {
                    calPoints.push(ptr); addCalDot(ptr);
                    if (calPoints.length === 2) {
                        const m = prompt("Метры:", "10");
                        if (m) PX_METER = Math.hypot(calPoints[0].x - calPoints[1].x, calPoints[0].y - calPoints[1].y) / parseFloat(m);
                        toggleCalibration(); syncAll();
                    }
                }, 2000);
            }
            if (opt.target && opt.target.type === 'handle') { rotationTarget = opt.target.handleType; return; }
            if (!opt.target || opt.target.type === 'map') isDraggingCanvas = true;
        });

        canvas.on('mouse:move', function(opt) {
            const evt = opt.e; 
            const cX = evt.touches ? evt.touches[0].clientX : evt.clientX, cY = evt.touches ? evt.touches[0].clientY : evt.clientY;
            const ptr = canvas.getPointer(evt);
            if (isCalibrating) updateMagnifier(ptr);
            if (rotationTarget) {
                const parts = canvas.getObjects().filter(o => o.type === 'part');
                const truck = parts.find(p => p.vehicleType === 'truck'), mod0 = parts.find(p => p.vehicleType === 'mod'), sc = PX_METER / 40;
                const radM = (mod0.angle * Math.PI) / 180, kpX = mod0.left + (mod0.f_val * sc) * Math.cos(radM), kpY = mod0.top + (mod0.f_val * sc) * Math.sin(radM);
                if (rotationTarget === 'truck') truck.angle = Math.atan2(kpY - ptr.y, kpX - ptr.x) * 180 / Math.PI;
                else parts.forEach(p => { if (p.vehicleType === 'mod') p.angle = Math.atan2(ptr.y - kpY, ptr.x - kpX) * 180 / Math.PI; });
                syncAll();
            } else if (isDraggingCanvas) {
                const vpt = canvas.viewportTransform; vpt[4] += cX - lastPosX; vpt[5] += cY - lastPosY; canvas.requestRenderAll();
            }
            lastPosX = cX; lastPosY = cY;
        });

        canvas.on('mouse:up', () => { clearTimeout(calTimer); magEl.style.display = 'none'; isDraggingCanvas = false; rotationTarget = null; syncAll(); });
    }

    function syncAll() {
        const parts = canvas.getObjects().filter(o => o.type === 'part');
        const sc = PX_METER / 40;
        const truck = parts.find(p => p.vehicleType === 'truck'), modules = parts.filter(p => p.vehicleType === 'mod');
        canvas.getObjects().filter(o => o.type === 'handle').forEach(h => canvas.remove(h));
        if (truck && modules.length > 0) {
            const mod0 = modules[0], radM = (mod0.angle * Math.PI) / 180, kpX = mod0.left + (mod0.f_val * sc) * Math.cos(radM), kpY = mod0.top + (mod0.f_val * sc) * Math.sin(radM), radT = (truck.angle * Math.PI) / 180;
            truck.set({ left: kpX - (truck.b_val * sc) * Math.cos(radT), top: kpY - (truck.b_val * sc) * Math.sin(radT), scaleX: sc, scaleY: sc });
            modules.forEach((mod, idx) => {
                mod.scaleX = mod.scaleY = sc;
                if (idx > 0) {
                    const prev = modules[idx-1], radP = (prev.angle * Math.PI) / 180;
                    mod.set({ left: prev.left + ((prev.b_val - mod.f_val) * sc) * Math.cos(radP), top: prev.top + ((prev.b_val - mod.f_val) * sc) * Math.sin(radP) });
                }
            });
            createHandle(truck.left + (1.2*40*sc) * Math.cos(radT), truck.top + (1.2*40*sc) * Math.sin(radT), 'truck');
            const lastMod = modules[modules.length-1], radL = (lastMod.angle * Math.PI) / 180;
            createHandle(lastMod.left + (lastMod.b_val * sc - 1.2*40*sc) * Math.cos(radL), lastMod.top + (lastMod.b_val * sc - 1.2*40*sc) * Math.sin(radL), 'trailer');
        }
        canvas.renderAll();
    }

    function createHandle(x, y, t) { canvas.add(new fabric.Circle({ left: x, top: y, radius: 10, fill: '#2196F3', stroke: 'white', originX: 'center', originY: 'center', type: 'handle', handleType: t, hasControls: false })); }
    function updateMagnifier(ptr) {
        magEl.style.display = 'block'; magCtx.clearRect(0,0,180,180); magCtx.save();
        magCtx.translate(90,90); magCtx.scale(2.5,2.5); magCtx.translate(-ptr.x, -ptr.y);
        canvas.getObjects().forEach(o => { if(o.type==='map' || o.isCalDot) o.render(magCtx); }); magCtx.restore();
    }
    function addCalDot(ptr) { canvas.add(new fabric.Circle({ left: ptr.x, top: ptr.y, radius: 5, fill: '#2196F3', stroke: 'white', isCalDot: true, selectable: false })); }
    function toggleCalibration() { isCalibrating = !isCalibrating; calPoints = []; document.getElementById('cal-msg').style.display = isCalibrating?'block':'none'; }
    function addVehicle(n, l, w, c, b, t, f, multi=false) {
        const sc = PX_METER/40;
        const obj = new fabric.Group([new fabric.Rect({ width: l*40, height: w*40, fill: c, stroke: 'black' }), new fabric.Text(n, { fontSize: 10, left: 5 })], { left: 100, top: 100, type: 'part', vehicleType: t, b_val: b*40, f_val: (f||0)*40, originY: 'center', hasControls: false });
        canvas.add(obj); syncAll();
    }
    function loadMap(e) {
        const reader = new FileReader(); reader.onload = f => fabric.Image.fromURL(f.target.result, img => { canvas.add(img.set({ selectable: false, type: 'map' })).sendToBack(); });
        reader.readAsDataURL(e.target.files[0]);
    }
    function deleteSelected() { canvas.getActiveObjects().forEach(o => canvas.remove(o)); syncAll(); }
    function clearAll() { canvas.clear(); PX_METER=40; }

    checkAccess();
</script>
</body>
</html>
