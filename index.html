<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HeavyTransport Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card-bg: #1a1a1a; --accent: #2196F3; --text: #fff; --border: #333; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; }
        #hub-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; box-sizing: border-box; }
        .hub-title { font-size: 20px; font-weight: bold; color: var(--accent); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }
        .menu-grid { width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 12px; }
        .hub-card { background: var(--card-bg); border: 2px solid var(--border); padding: 20px; border-radius: 16px; cursor: pointer; transition: 0.2s; }
        .hub-card:active { transform: scale(0.96); border-color: var(--accent); }
        .hub-card h3 { margin: 0 0 4px 0; font-size: 16px; }
        .hub-card p { margin: 0; font-size: 12px; color: #888; }
        #app-viewport { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 10; background: #000; }
        #exit-btn { display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 100; background: rgba(0,0,0,0.8); color: white; border: 1px solid var(--border); padding: 12px 25px; border-radius: 30px; font-size: 12px; font-weight: bold; backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="hub-screen">
        <div class="hub-title">HeavyTransport Pro</div>
        <div class="menu-grid">
            <div class="hub-card" onclick="launchApp('thp.html')">
                <h3>🚛 THP Модули</h3>
                <p>Тягач + Гусь и модули Goldhofer THP.</p>
            </div>
            <div class="hub-card" onclick="launchApp('spmt.html')">
                <h3>🕹 SPMT Самоходные</h3>
                <p>Работа с самоходными модулями.</p>
            </div>
            <div class="hub-card" onclick="launchApp('calc.html')">
                <h3>⚖️ CALC Нагрузки</h3>
                <p>Расчет осевых нагрузок и развесовки.</p>
            </div>
            <div class="hub-card" onclick="launchApp('beta.html')">
                <h3>🧪 BETA Тест</h3>
                <p>Новые функции и экспериментальные модели.</p>
            </div>
        </div>
    </div>
    <button id="exit-btn" onclick="closeApp()">⬅ В МЕНЮ</button>
    <iframe id="app-viewport" src=""></iframe>
    <script>
        const tg = window.Telegram.WebApp; tg.expand(); tg.ready();
        const viewport = document.getElementById('app-viewport'), hub = document.getElementById('hub-screen'), exitBtn = document.getElementById('exit-btn');
        function launchApp(url) {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            viewport.src = url; viewport.style.display = 'block'; exitBtn.style.display = 'block'; hub.style.display = 'none';
        }
        function closeApp() {
            if (confirm("Выйти в главное меню?")) {
                viewport.src = ""; viewport.style.display = 'none'; exitBtn.style.display = 'none'; hub.style.display = 'flex';
            }
        }
    </script>
</body>
</html>
