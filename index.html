<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HeavyTransport Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card-bg: #1a1a1a; --accent: #2196F3; --text: #fff; --border: #333; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; }
        #hub-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; box-sizing: border-box; }
        .hub-title { font-size: 20px; font-weight: bold; color: var(--accent); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }
        .menu-grid { width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 15px; }
        .hub-card { background: var(--card-bg); border: 2px solid var(--border); padding: 22px; border-radius: 16px; cursor: pointer; transition: 0.2s; }
        .hub-card:active { transform: scale(0.97); border-color: var(--accent); }
        .hub-card h3 { margin: 0 0 5px 0; font-size: 17px; }
        .hub-card p { margin: 0; font-size: 13px; color: #888; }
        #app-viewport { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 10; }
        #exit-btn { display: none; position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 100; background: rgba(0,0,0,0.8); color: white; border: 1px solid var(--border); padding: 10px 25px; border-radius: 25px; font-size: 12px; font-weight: bold; backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="hub-screen">
        <div class="hub-title">HeavyTransport Systems</div>
        <div class="menu-grid">
            <div class="hub-card" onclick="launchApp('editor_thp.html')">
                <h3>🚛 Тягач + Гусь</h3>
                <p>Модули THP и балки.</p>
            </div>
            <div class="hub-card" onclick="launchApp('editor_crane.html')">
                <h3>🏗 Крановая установка</h3>
                <p>Расчет вылетов и контуров.</p>
            </div>
            <div class="hub-card" onclick="launchApp('editor_loads.html')">
                <h3>⚖️ Осевые нагрузки</h3>
                <p>Развесовка по осям.</p>
            </div>
        </div>
    </div>
    <button id="exit-btn" onclick="closeApp()">⬅ В МЕНЮ</button>
    <iframe id="app-viewport" src=""></iframe>
    <script>
        const tg = window.Telegram.WebApp; tg.expand(); tg.ready();
        const viewport = document.getElementById('app-viewport'), hub = document.getElementById('hub-screen'), exitBtn = document.getElementById('exit-btn');
        function launchApp(url) {
            tg.HapticFeedback.impactOccurred('medium');
            viewport.src = url; viewport.style.display = 'block'; exitBtn.style.display = 'block'; hub.style.display = 'none';
        }
        function closeApp() {
            if (confirm("Вернуться в меню?")) {
                viewport.src = ""; viewport.style.display = 'none'; exitBtn.style.display = 'none'; hub.style.display = 'flex';
            }
        }
    </script>
</body>
</html>
