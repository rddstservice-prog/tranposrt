<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HT Assembler PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #status { text-align: center; }
        .loader { border: 4px solid #333; border-top: 4px solid #2196F3; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #app { display: none; width: 100%; height: 100%; background: #222; }
    </style>
</head>
<body>

<div id="status">
    <div class="loader"></div>
    <h2 id="status-text">Авторизация...</h2>
</div>

<div id="app">
    <h1 style="padding: 20px;">Программа запущена</h1>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const G_URL = "https://script.google.com/macros/s/AKfycbxMXsQQ2_dnKq3V8YDqfBwf_n9hqt8qpdsz1Z22-B8IgIOwvUDcrruqqLrr6IN_7D_UVg/exec";

    async function init() {
        tg.expand();
        const userId = tg.initDataUnsafe?.user?.id;
        
        if (!userId) {
            document.getElementById('status-text').innerText = "Ошибка: Откройте через бота";
            return;
        }

        try {
            // Запрос к Google Script на проверку доступа
            const response = await fetch(`${G_URL}?action=checkAccess&id=${userId}`);
            const result = await response.json();

            if (result.allowed) {
                document.getElementById('status').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                // Здесь запускай функцию инициализации твоего САПР
            } else {
                document.getElementById('status-text').innerText = "У вас нет доступа. Нажмите /start в боте.";
            }
        } catch (e) {
            document.getElementById('status-text').innerText = "Ошибка сервера. Проверьте интернет или VPN.";
        }
    }

    init();
</script>
</body>
</html>
