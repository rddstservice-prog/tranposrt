<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HT Assembler v8.9.70 PRO</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <style>
        :root { --red: #A2231D; --border: #444; --blue: #2196F3; }
        * { box-sizing: border-box; touch-action: none; -webkit-user-select: none; }
        body { margin: 0; font-family: sans-serif; background: #000; color: white; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 20px;
        }
        #pass-input { 
            background: #222; border: 2px solid var(--border); padding: 15px; 
            color: white; border-radius: 10px; width: 220px; text-align: center; font-size: 16px;
        }
        #auth-btn { background: var(--blue); padding: 12px 30px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; }

        #sidebar { width: 115px; min-width: 115px; background: #222; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 10px 5px; gap: 8px; z-index: 50; overflow-y: auto; padding-top: env(safe-area-inset-top); }
        button { width: 100%; padding: 12px 2px; border: none; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; color: white; flex-shrink: 0; }
        .btn-tool { background: #444; } .btn-white { background: #fff; color: #000; } .btn-red { background: var(--red); } .btn-blue { background: var(--blue); } .btn-danger { background: #551111; }
        .section-label { font-size: 8px; color: #777; text-align: center; margin-top: 5px; text-transform: uppercase; flex-shrink: 0; }
        #canvas-wrap { flex-grow: 1; position: relative; background: #333; overflow: hidden; }
        
        /* ИНДИКАТОР ТОЧКИ */
        #touch-indicator {
            position: absolute; width: 24px; height: 24px;
            background: rgba(33, 150, 243, 0.4); border: 2px solid var(--blue);
            border-radius: 50%; pointer-events: none; display: none; z-index: 1000;
            transform: translate(-50%, -50%);
        }

        .overlay-msg { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 10px 20px; border-radius: 25px; font-size: 11px; z-index: 100; display: none; pointer-events: none; border: 2px solid var(--blue); }
        
        /* ЛУПА */
        #magnifier { position: absolute; top: 10px; left: 10px; width: 180px; height: 180px; border: 4px solid var(--blue); border-radius: 50%; overflow: hidden; background: #111; display: none; z-index: 200; pointer-events: none; box-shadow: 0 0 30px rgba(0,0,0,0.7); }
        #mag-canvas { position: absolute; top: 0; left: 0; }
        #mag-crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; pointer-events: none; }
        #mag-crosshair::before, #mag-crosshair::after { content: ''; position: absolute; background: var(--blue); }
        #mag-crosshair::before { width: 100%; height: 2px; top: 14px; left: 0; }
        #mag-crosshair::after { height: 100%; width: 2px; left: 14px; top: 0; }
        
        .undo-row { display: flex; gap: 4px; margin-top: 5px; }
        .btn-undo { background: #333; border: 1px solid #555; padding: 10px 0; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h2>HT ASSEMBLER PRO</h2>
    <input type="password" id="pass-input" placeholder="ВВЕДИТЕ ПАРОЛЬ">
    <button id="auth-btn" onclick="checkAuth()">ВОЙТИ</button>
</div>

<div id="sidebar">
    <div class="section-label">КАРТА</div>
    <button class="btn-tool" onclick="document.getElementById('file-input').click()">🗺 КАРТА</button>
    <button class="btn-blue" id="cal-btn" onclick="toggleCalibration()">📏 МАСШТАБ</button>
    <div class="section-label">ТЕХНИКА</div>
    <button class="btn-white" onclick="addVehicle('Тягач', 7.6, 2.5, 'white', 5.4, 'truck')">ТЯГАЧ</button>
    <button class="btn-red" onclick="addVehicle('Гуснек', 4.2, 2.5, '#A2231D', 4.2, 'mod', 0.5)">ГУСНЕК</button>
    <button class="btn-red" style="background:#555" onclick="let w = prompt('Ширина:', '3.0'); if(w) { let l = prompt('Длина:', '9.7'); if(l) addVehicle('Балки', parseFloat(l), parseFloat(w), 'multi', parseFloat(l), 'mod', 0, true) }">🏗 БАЛКИ</button>
    <div class="section-label">МОДУЛИ THP</div>
    <button class="btn-red" onclick="addVehicle('THP 2', 3.0, 3.0, '#A2231D', 3.0, 'mod', 0)">THP 2</button>
    <button class="btn-red" onclick="addVehicle('THP 3', 4.5, 3.0, '#A2231D', 4.5, 'mod', 0)">THP 3</button>
    <button class="btn-red" onclick="addVehicle('THP 4', 6.0, 3.0, '#A2231D', 6.0, 'mod', 0)">THP 4</button>
    <button class="btn-red" onclick="addVehicle('THP 5', 7.5, 3.0, '#A2231D', 7.5, 'mod', 0)">THP 5</button>
    <button class="btn-red" onclick="addVehicle('THP 6', 9.0, 3.0, '#A2231D', 9.0, 'mod', 0)">THP 6</button>
    <div style="flex-grow: 1;"></div>
    <div class="undo-row"><button class="btn-undo" onclick="undo()">⬅️</button><button class="btn-undo" onclick="redo()">➡️</button></div>
    <button class="btn-danger" onclick="deleteSelected()">🗑 УДАЛИТЬ</button>
    <button class="btn-danger" style="background:#000; border:1px solid var(--border)" onclick="clearAll()">❌ СБРОС</button>
</div>

<input type="file" id="file-input" style="display:none" accept="image/*" onchange="loadMap(event)">

<div id="canvas-wrap">
    <div id="touch-indicator"></div>
    <div id="cal-msg" class="overlay-msg">УДЕРЖИВАЙТЕ 2 СЕК</div>
    <div id="magnifier"><canvas id="mag-canvas" width="180" height="180"></canvas><div id="mag-crosshair"></div></div>
    <canvas id="c"></canvas>
</div>

<script>
    const tg = window.Telegram.WebApp; tg.expand();
    function checkAuth() { if(document.getElementById('pass-input').value === "TRANSPORT2024") { localStorage.setItem('hta_auth_v3', 'true'); document.getElementById('auth-screen').style.display = 'none'; } }
    if(localStorage.getItem('hta_auth_v3') === 'true') document.getElementById('auth-screen').style.display = 'none';
    window.oncontextmenu = function(e) { e.preventDefault(); return false; };

    const wrap = document.getElementById('canvas-wrap');
    const indicator = document.getElementById('touch-indicator');
    const canvas = new fabric.Canvas('c', { width: wrap.clientWidth, height: wrap.clientHeight, backgroundColor: '#333', selection: false, allowTouchScrolling: false });
    const magEl = document.getElementById('magnifier'), magCtx = document.getElementById('mag-canvas').getContext('2d');
    
    let PX_METER = 40, rotationTarget = null, isDraggingCanvas = false, lastPosX, lastPosY, startPosX, startPosY, lastDistance = 0;
    let isCalibrating = false, calPoints = [], calTimer = null;
    let history = []; let historyStep = -1; let isHistoryAction = false;

    function saveHistory() {
        if (isHistoryAction) return;
        const state = JSON.stringify(canvas.toDatalessJSON(['vehicleType', 'b_val', 'f_val', 'scaleX', 'scaleY', 'selectable', 'evented']));
        if (historyStep < history.length - 1) history = history.slice(0, historyStep + 1);
        history.push(state); if (history.length > 20) history.shift(); else historyStep++;
    }
    function undo() { if (historyStep <= 0) return; isHistoryAction = true; historyStep--; canvas.loadFromJSON(history[historyStep], () => { canvas.renderAll(); syncAll(); isHistoryAction = false; }); }
    function redo() { if (historyStep >= history.length - 1) return; isHistoryAction = true; historyStep++; canvas.loadFromJSON(history[historyStep], () => { canvas.renderAll(); syncAll(); isHistoryAction = false; }); }
    
    function updateLastPos() {
        canvas.getObjects().forEach(o => { o._lastLeft = o.left; o._lastTop = o.top; });
    }

    function syncAll() {
        const parts = canvas.getObjects().filter(o => o.type === 'part');
        const map = canvas.getObjects().find(o => o.type === 'map');
        const truck = parts.find(p => p.vehicleType === 'truck'), modules = parts.filter(p => p.vehicleType === 'mod'), sc = PX_METER / 40;
        
        if(map) map.sendToBack();
        canvas.getObjects().filter(o => o.type === 'handle').forEach(h => canvas.remove(h));
        
        if (truck && modules.length > 0) {
            const mod0 = modules[0], radM = (mod0.angle * Math.PI) / 180, kpX = mod0.left + (mod0.f_val * sc) * Math.cos(radM), kpY = mod0.top + (mod0.f_val * sc) * Math.sin(radM), radT = (truck.angle * Math.PI) / 180;
            truck.set({ left: kpX - (truck.b_val * sc) * Math.cos(radT), top: kpY - (truck.b_val * sc) * Math.sin(radT), scaleX: sc, scaleY: sc });
            truck.moveTo(map ? 1 : 0);
            
            modules.forEach((mod, idx) => {
                mod.scaleX = mod.scaleY = sc;
                if (idx > 0) {
                    const prev = modules[idx-1], radP = (prev.angle * Math.PI) / 180;
                    mod.set({ left: prev.left + ((prev.b_val - mod.f_val) * sc) * Math.cos(radP), top: prev.top + ((prev.b_val - mod.f_val) * sc) * Math.sin(radP) });
                }
                mod.setCoords(); mod.bringToFront();
            });

            createHandle(truck.left + (1.2*40*sc) * Math.cos(radT), truck.top + (1.2*40*sc) * Math.sin(radT), 'truck'); 
            const lastMod = modules[modules.length-1], radL = (lastMod.angle * Math.PI) / 180;
            createHandle((lastMod.left + (lastMod.b_val * sc) * Math.cos(radL)) - (1.2*40*sc) * Math.cos(radL), (lastMod.top + (lastMod.b_val * sc) * Math.sin(radL)) - (1.2*40*sc) * Math.sin(radL), 'trailer');
        }
        canvas.renderAll();
    }

    function createHandle(x, y, t) { 
        const h = new fabric.Circle({ left: x, top: y, radius: 12, fill: '#2196F3', stroke: 'white', strokeWidth: 2, originX: 'center', originY: 'center', type: 'handle', handleType: t, hasControls: false, padding: 25 });
        canvas.add(h); h.bringToFront();
    }

    function updateMagnifier(ptr) {
        if (!isCalibrating) return;
        magEl.style.display = 'block';
        magCtx.clearRect(0, 0, 180, 180); magCtx.save();
        magCtx.translate(90, 90); magCtx.scale(2.5, 2.5); magCtx.translate(-ptr.x, -ptr.y);
        canvas.getObjects().forEach(obj => { if (obj.type === 'map' || obj.type === 'part') obj.render(magCtx); });
        magCtx.restore();
    }

    canvas.on('mouse:down', function(opt) {
        const evt = opt.e; 
        const cX = evt.touches ? evt.touches[0].clientX : evt.clientX, cY = evt.touches ? evt.touches[0].clientY : evt.clientY;
        if (evt.touches && evt.touches.length === 2) { lastDistance = Math.hypot(evt.touches[0].clientX - evt.touches[1].clientX, evt.touches[0].clientY - evt.touches[1].clientY); return; }
        
        const target = opt.target; const ptr = canvas.getPointer(evt);
        startPosX = lastPosX = cX; startPosY = lastPosY = cY;

        if (isCalibrating) {
            updateMagnifier(ptr);
            calTimer = setTimeout(() => {
                calPoints.push(ptr);
                indicator.style.display = 'block'; indicator.style.left = cX + 'px'; indicator.style.top = cY + 'px';
                if (calPoints.length === 2) {
                    const m = prompt("Метры:", "10");
                    if (m) PX_METER = Math.hypot(calPoints[0].x - calPoints[1].x, calPoints[0].y - calPoints[1].y) / parseFloat(m);
                    toggleCalibration(); syncAll();
                }
            }, 2000);
        }
        if (target && target.type === 'handle') { rotationTarget = target.handleType; return; }
        if (!target || target.type === 'map') isDraggingCanvas = true;
        updateLastPos();
    });

    canvas.on('mouse:move', function(opt) {
        const evt = opt.e; const cX = evt.touches ? evt.touches[0].clientX : evt.clientX, cY = evt.touches ? evt.touches[0].clientY : evt.clientY;
        if (evt.touches && evt.touches.length === 2) {
            const dist = Math.hypot(evt.touches[0].clientX - evt.touches[1].clientX, evt.touches[0].clientY - evt.touches[1].clientY);
            const pointer = canvas.getPointer(evt, true); 
            if (lastDistance > 0) canvas.zoomToPoint(new fabric.Point(pointer.x, pointer.y), canvas.getZoom() * (dist / lastDistance));
            lastDistance = dist; return;
        }
        const ptr = canvas.getPointer(evt);
        if (isCalibrating) { 
            updateMagnifier(ptr);
            if (Math.hypot(cX - startPosX, cY - startPosY) > 10) { clearTimeout(calTimer); calTimer = null; }
        }
        if (rotationTarget) {
            const parts = canvas.getObjects().filter(o => o.type === 'part');
            const truck = parts.find(p => p.vehicleType === 'truck'), mod0 = parts.find(p => p.vehicleType === 'mod'), sc = PX_METER / 40;
            if (truck && mod0) {
                const radM = (mod0.angle * Math.PI) / 180, kpX = mod0.left + (mod0.f_val * sc) * Math.cos(radM), kpY = mod0.top + (mod0.f_val * sc) * Math.sin(radM);
                if (rotationTarget === 'truck') truck.angle = Math.atan2(kpY - ptr.y, kpX - ptr.x) * 180 / Math.PI;
                else parts.forEach(p => { if (p.vehicleType === 'mod') p.angle = Math.atan2(ptr.y - kpY, ptr.x - kpX) * 180 / Math.PI; });
                syncAll();
            }
        } else if (isDraggingCanvas) {
            const vpt = canvas.viewportTransform; vpt[4] += cX - lastPosX; vpt[5] += cY - lastPosY; canvas.requestRenderAll();
        }
        lastPosX = cX; lastPosY = cY;
    });

    canvas.on('object:moving', (e) => {
        const moved = e.target; if (moved.type !== 'part') return;
        const dx = moved.left - moved._lastLeft, dy = moved.top - moved._lastTop;
        canvas.getObjects().filter(o => o.type === 'part' && o !== moved).forEach(p => { p.left += dx; p.top += dy; p.setCoords(); });
        updateLastPos(); syncAll();
    });

    canvas.on('mouse:up', () => { 
        if (calTimer) clearTimeout(calTimer); 
        magEl.style.display = 'none'; 
        indicator.style.display = 'none';
        isDraggingCanvas = false; rotationTarget = null; lastDistance = 0; syncAll(); saveHistory(); 
    });

    function addVehicle(n, l, w, c, b, t, f, isMulti = false) {
        const sc = PX_METER / 40, vpt = canvas.viewportTransform;
        let cX = (canvas.width/2 - vpt[4])/canvas.getZoom(), cY = (canvas.height/2 - vpt[5])/canvas.getZoom();
        const parts = canvas.getObjects().filter(o => o.type === 'part');
        if (parts.length > 0) {
            const last = parts[parts.length-1], rad = (last.angle * Math.PI) / 180;
            cX = last.left + (last.b_val * sc) * Math.cos(rad) - (f||0)*sc*Math.cos(rad);
            cY = last.top + (last.b_val * sc) * Math.sin(rad) - (f||0)*sc*Math.sin(rad);
        }
        let obj;
        if(isMulti) {
            const bl = l*40;
            obj = new fabric.Group([
                new fabric.Rect({left:24, top:-(w*40)/2, width:bl, height:18, fill:'', stroke:'red', strokeWidth:2}),
                new fabric.Rect({left:24, top:(w*40)/2-18, width:bl, height:18, fill:'', stroke:'red', strokeWidth:2}),
                new fabric.Rect({left:0, top:-60, width:24, height:120, fill:'#444'}),
                new fabric.Rect({left:bl+24, top:-60, width:24, height:120, fill:'#444'})
            ], { left: cX, top: cY, type: 'part', vehicleType: 'mod', b_val: (l+1.2)*40, f_val: 0, originX: 'left', originY: 'center', hasControls: false });
        } else {
            obj = new fabric.Group([
                new fabric.Rect({ width: l*40, height: w*40, fill: c, stroke: 'black', strokeWidth: 1, originY: 'center' }),
                new fabric.Text(n, { fontSize: 10, originX: 'center', left: (l*40)/2, fill: (c==='white'?'black':'white'), fontWeight:'bold' })
            ], { left: cX, top: cY, type: 'part', vehicleType: t, b_val: b * 40, f_val: (f||0) * 40, originX: 'left', originY: 'center', hasControls: false });
        }
        if (parts.length > 0) obj.angle = parts[parts.length - 1].angle;
        canvas.add(obj); syncAll();
    }

    function toggleCalibration() { isCalibrating = !isCalibrating; calPoints = []; document.getElementById('cal-msg').style.display = isCalibrating?'block':'none'; }
    function deleteSelected() { canvas.getActiveObjects().forEach(o => canvas.remove(o)); syncAll(); }
    function clearAll() { if(confirm("Сброс?")) { canvas.clear(); canvas.setViewportTransform([1,0,0,1,0,0]); PX_METER=40; syncAll(); } }
    function loadMap(event) {
        const reader = new FileReader(); reader.onload = f => fabric.Image.fromURL(f.target.result, img => {
            img.set({ selectable: false, evented: false, type: 'map' }); canvas.add(img).sendToBack(); 
            const scale = Math.min(canvas.width / img.width, canvas.height / img.height) * 0.9;
            canvas.setZoom(scale); canvas.requestRenderAll();
        }); reader.readAsDataURL(event.target.files[0]);
    }
    saveHistory();
</script>
</body>
</html>
