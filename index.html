<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HT Assembler">
    
    <title>HT Assembler v8.9.70 PWA</title>
    
    <link rel="manifest" id="pwa-manifest">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root { --red: #A2231D; --border: #444; --blue: #2196F3; }
        * { box-sizing: border-box; touch-action: none; -webkit-user-select: none; }
        body { margin: 0; font-family: sans-serif; background: #000; color: white; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        #sidebar { 
            width: 115px; min-width: 115px; background: #222; border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 10px 5px; gap: 8px; z-index: 50; overflow-y: auto;
            /* Учет вырезов экрана на новых телефонах */
            padding-top: env(safe-area-inset-top); 
            padding-bottom: env(safe-area-inset-bottom);
        }
        button { width: 100%; padding: 12px 2px; border: none; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; color: white; flex-shrink: 0; }
        .btn-tool { background: #444; } .btn-white { background: #fff; color: #000; } .btn-red { background: var(--red); } .btn-blue { background: var(--blue); } .btn-danger { background: #551111; }
        .section-label { font-size: 8px; color: #777; text-align: center; margin-top: 5px; text-transform: uppercase; flex-shrink: 0; }
        #canvas-wrap { flex-grow: 1; position: relative; background: #333; overflow: hidden; }
        .overlay-msg { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 10px 20px; border-radius: 25px; font-size: 11px; font-weight: bold; z-index: 100; display: none; pointer-events: none; border: 2px solid var(--blue); text-align: center; }
        #magnifier { position: absolute; top: 10px; left: 10px; width: 180px; height: 180px; border: 4px solid var(--blue); border-radius: 50%; overflow: hidden; background: #111; display: none; z-index: 200; pointer-events: none; box-shadow: 0 0 30px rgba(0,0,0,0.7); }
        #mag-canvas { position: absolute; top: 0; left: 0; }
        #mag-crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; pointer-events: none; }
        #mag-crosshair::before, #mag-crosshair::after { content: ''; position: absolute; background: var(--blue); box-shadow: 0 0 2px black; }
        #mag-crosshair::before { width: 100%; height: 2px; top: 14px; left: 0; }
        #mag-crosshair::after { height: 100%; width: 2px; left: 14px; top: 0; }
        .undo-row { display: flex; gap: 4px; margin-top: 5px; }
        .btn-undo { background: #333; border: 1px solid #555; padding: 10px 0; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="section-label">КАРТА</div>
    <button class="btn-tool" onclick="document.getElementById('file-input').click()">🗺 КАРТА</button>
    <button class="btn-blue" id="cal-btn" onclick="toggleCalibration()">📏 МАСШТАБ</button>
    
    <div class="section-label">ТЕХНИКА</div>
    <button class="btn-white" onclick="addVehicle('Тягач', 7.6, 2.5, 'white', 5.4, 'truck')">ТЯГАЧ</button>
    <button class="btn-red" onclick="addVehicle('Гуснек', 4.2, 2.5, '#A2231D', 4.2, 'mod', 0.5)">ГВИШ</button>
    <button class="btn-red" style="background:#555" onclick="let w = prompt('Ширина балок (3 - 5.5 м):', '3.0'); if(w) { let l = prompt('Длина самих балок (4 - 30 м):', '9.7'); if(l) addVehicle('Балки', parseFloat(l), parseFloat(w), 'multi', parseFloat(l), 'mod', 0, true) }">🏗 БАЛКИ</button>
    
    <div class="section-label">МОДУЛИ THP</div>
    <button class="btn-red" onclick="addVehicle('THP 2', 3.0, 3.0, '#A2231D', 3.0, 'mod', 0)">THP 2</button>
    <button class="btn-red" onclick="addVehicle('THP 3', 4.5, 3.0, '#A2231D', 4.5, 'mod', 0)">THP 3</button>
    <button class="btn-red" onclick="addVehicle('THP 4', 6.0, 3.0, '#A2231D', 6.0, 'mod', 0)">THP 4</button>
    <button class="btn-red" onclick="addVehicle('THP 5', 7.5, 3.0, '#A2231D', 7.5, 'mod', 0)">THP 5</button>
    <button class="btn-red" onclick="addVehicle('THP 6', 9.0, 3.0, '#A2231D', 9.0, 'mod', 0)">THP 6</button>
    
    <div style="flex-grow: 1;"></div>
    <div class="undo-row"><button class="btn-undo" onclick="undo()">⬅️</button><button class="btn-undo" onclick="redo()">➡️</button></div>
    <button class="btn-danger" onclick="deleteSelected()">🗑 УДАЛИТЬ</button>
    <button class="btn-danger" style="background:#000; border:1px solid var(--border)" onclick="clearAll()">❌ СБРОС</button>
</div>

<input type="file" id="file-input" style="display:none" accept="image/*" onchange="loadMap(event)">

<div id="canvas-wrap">
    <div id="cal-msg" class="overlay-msg">УДЕРЖИВАЙТЕ 2 СЕК</div>
    <div id="magnifier"><canvas id="mag-canvas" width="180" height="180"></canvas><div id="mag-crosshair"></div></div>
    <canvas id="c"></canvas>
</div>

<script>
    // Генерация манифеста
    const manifestJson = {
        "name": "HT Assembler",
        "short_name": "HTA",
        "start_url": ".",
        "display": "standalone",
        "background_color": "#000000",
        "theme_color": "#000000",
        "orientation": "landscape",
        "icons": [{
            "src": "https://cdn-icons-png.flaticon.com/512/2965/2965319.png",
            "sizes": "512x512",
            "type": "image/png"
        }]
    };
    const stringManifest = JSON.stringify(manifestJson);
    const blob = new Blob([stringManifest], {type: 'application/json'});
    const manifestURL = URL.createObjectURL(blob);
    document.querySelector('#pwa-manifest').setAttribute('href', manifestURL);

    // Логика приложения (без изменений из версии 8.9.70)
    const wrap = document.getElementById('canvas-wrap');
    const canvas = new fabric.Canvas('c', { width: wrap.clientWidth, height: wrap.clientHeight, backgroundColor: '#333', selection: false, allowTouchScrolling: false, imageSmoothingEnabled: false });
    const magEl = document.getElementById('magnifier'); const magCtx = document.getElementById('mag-canvas').getContext('2d');
    let PX_METER = 40; let rotationTarget = null; let isDraggingCanvas = false, lastPosX, lastPosY, startPosX, startPosY, lastDistance = 0, isZooming = false;
    let isCalibrating = false, calPoints = [], calTimer = null; 
    let history = []; let historyStep = -1; let isHistoryAction = false;

    function saveHistory() {
        if (isHistoryAction) return;
        const state = JSON.stringify(canvas.toDatalessJSON(['vehicleType', 'b_val', 'f_val', 'scaleX', 'scaleY', 'selectable', 'evented']));
        if (historyStep < history.length - 1) history = history.slice(0, historyStep + 1);
        history.push(state); if (history.length > 20) history.shift(); else historyStep++;
    }
    function undo() { if (historyStep <= 0) return; isHistoryAction = true; historyStep--; canvas.loadFromJSON(history[historyStep], () => { canvas.renderAll(); syncAll(); isHistoryAction = false; }); }
    function redo() { if (historyStep >= history.length - 1) return; isHistoryAction = true; historyStep++; canvas.loadFromJSON(history[historyStep], () => { canvas.renderAll(); syncAll(); isHistoryAction = false; }); }

    canvas.on('object:added', saveHistory); canvas.on('object:modified', saveHistory); canvas.on('object:removed', saveHistory);

    function syncAll() {
        const map = canvas.getObjects().find(o => o.type === 'map');
        const parts = canvas.getObjects().filter(o => o.type === 'part');
        const truck = parts.find(p => p.vehicleType === 'truck');
        const modules = parts.filter(p => p.vehicleType === 'mod');
        const sc = PX_METER / 40;
        canvas.getObjects().filter(o => o.type === 'handle').forEach(h => canvas.remove(h));

        if (truck && modules.length > 0) {
            const mod0 = modules[0];
            const radM = (mod0.angle * Math.PI) / 180;
            const kpX = mod0.left + (mod0.f_val * sc) * Math.cos(radM), kpY = mod0.top + (mod0.f_val * sc) * Math.sin(radM);
            const radT = (truck.angle * Math.PI) / 180;
            truck.set({ left: kpX - (truck.b_val * sc) * Math.cos(radT), top: kpY - (truck.b_val * sc) * Math.sin(radT), scaleX: sc, scaleY: sc });
            truck.setCoords();
            modules.forEach((mod, idx) => {
                mod.scaleX = mod.scaleY = sc;
                if (idx > 0) {
                    const prev = modules[idx-1]; const radP = (prev.angle * Math.PI) / 180;
                    mod.set({ left: prev.left + ((prev.b_val - mod.f_val) * sc) * Math.cos(radP), top: prev.top + ((prev.b_val - mod.f_val) * sc) * Math.sin(radP) });
                }
                mod.setCoords();
            });
            const hOff = 1.2 * 40 * sc; 
            createHandle(truck.left + hOff * Math.cos(radT), truck.top + hOff * Math.sin(radT), 'truck'); 
            const lastMod = modules[modules.length-1]; const radL = (lastMod.angle * Math.PI) / 180;
            createHandle((lastMod.left + (lastMod.b_val * sc) * Math.cos(radL)) - hOff * Math.cos(radL), (lastMod.top + (lastMod.b_val * sc) * Math.sin(radL)) - hOff * Math.sin(radL), 'trailer');
        } else { parts.forEach(p => { p.scaleX = p.scaleY = sc; }); }
        if (map) map.sendToBack();
        canvas.renderAll();
    }

    function createHandle(x, y, type) {
        const h = new fabric.Circle({ left: x, top: y, radius: 7, fill: '#2196F3', stroke: 'white', strokeWidth: 2, originX: 'center', originY: 'center', hasControls: false, hasBorders: false, type: 'handle', handleType: type, opacity: 0.8, evented: true, padding: 30 });
        canvas.add(h); h.bringToFront();
    }

    function updateMagnifier(ptr) {
        if (!isCalibrating) return;
        magEl.style.display = 'block';
        const size = 180, zoom = 2.5;
        magCtx.clearRect(0, 0, size, size);
        magCtx.save();
        magCtx.translate(size/2, size/2);
        magCtx.scale(zoom, zoom);
        magCtx.translate(-ptr.x, -ptr.y);
        canvas.getObjects().forEach(obj => {
            if (obj.type === 'map' || obj.type === 'part' || obj.type === 'cal_dot') obj.render(magCtx);
        });
        magCtx.restore();
    }

    canvas.on('mouse:down', function(opt) {
        const evt = opt.e; if (evt.touches && evt.touches.length === 2) { isZooming = true; isDraggingCanvas = false; lastDistance = Math.hypot(evt.touches[0].clientX - evt.touches[1].clientX, evt.touches[0].clientY - evt.touches[1].clientY); return; }
        const target = opt.target; 
        startPosX = lastPosX = evt.touches ? evt.touches[0].clientX : evt.clientX; 
        startPosY = lastPosY = evt.touches ? evt.touches[0].clientY : evt.clientY;
        if (target && target.type === 'handle') { rotationTarget = target.handleType; isDraggingCanvas = false; target.set({ fill: '#FFEB3B' }); return; }
        if (isCalibrating) {
            const ptr = canvas.getPointer(evt);
            updateMagnifier(ptr);
            calTimer = setTimeout(() => {
                const dot = new fabric.Circle({ left: ptr.x, top: ptr.y, radius: 5, fill: '#2196F3', stroke: 'white', strokeWidth: 2, originX: 'center', originY: 'center', selectable: false, type: 'cal_dot' });
                canvas.add(dot); calPoints.push(ptr);
                if (calPoints.length === 2) {
                    const m = prompt("Метры:", "10");
                    if (m) PX_METER = Math.hypot(calPoints[0].x - calPoints[1].x, calPoints[0].y - calPoints[1].y) / parseFloat(m);
                    toggleCalibration(); syncAll();
                }
            }, 2000);
        }
        if (!target || target.type === 'map') { isDraggingCanvas = true; canvas.discardActiveObject(); }
        else if (target.type === 'part') { isDraggingCanvas = false; updateLastPos(); }
    });

    canvas.on('mouse:move', function(opt) {
        const evt = opt.e; if (evt.touches && evt.touches.length === 2) {
            const dist = Math.hypot(evt.touches[0].clientX - evt.touches[1].clientX, evt.touches[0].clientY - evt.touches[1].clientY);
            const rect = wrap.getBoundingClientRect(); const midX = (evt.touches[0].clientX + evt.touches[1].clientX) / 2 - rect.left, midY = (evt.touches[0].clientY + evt.touches[1].clientY) / 2 - rect.top;
            if (lastDistance > 0) { let d = (dist - lastDistance) / 200; let nZ = canvas.getZoom() * (1 + d); if (nZ > 20) nZ = 20; if (nZ < 0.01) nZ = 0.01; canvas.zoomToPoint({ x: midX, y: midY }, nZ); }
            lastDistance = dist; return;
        }
        const cX = evt.touches ? evt.touches[0].clientX : evt.clientX, cY = evt.touches ? evt.touches[0].clientY : evt.clientY, ptr = canvas.getPointer(evt);
        if (isCalibrating) {
            updateMagnifier(ptr);
            if (Math.hypot(cX - startPosX, cY - startPosY) > 10) { clearTimeout(calTimer); calTimer = null; }
        }
        if (isDraggingCanvas) { const vpt = canvas.viewportTransform; vpt[4] += cX - lastPosX; vpt[5] += cY - lastPosY; canvas.requestRenderAll(); }
        else if (!isZooming && rotationTarget) {
            const parts = canvas.getObjects().filter(o => o.type === 'part');
            const truck = parts.find(p => p.vehicleType === 'truck'), mod0 = parts.find(p => p.vehicleType === 'mod'), sc = PX_METER / 40;
            if (truck && mod0) {
                const radM = (mod0.angle * Math.PI) / 180, kpX = mod0.left + (mod0.f_val * sc) * Math.cos(radM), kpY = mod0.top + (mod0.f_val * sc) * Math.sin(radM);
                if (rotationTarget === 'truck') {
                    const tA = Math.atan2(kpY - ptr.y, kpX - ptr.x) * 180 / Math.PI;
                    let diff = tA - truck.angle; while (diff < -180) diff += 360; while (diff > 180) diff -= 360;
                    truck.angle += diff * 0.35;
                } else if (rotationTarget === 'trailer') {
                    parts.forEach(p => { if (p.vehicleType === 'mod') p.angle = Math.atan2(ptr.y - kpY, ptr.x - kpX) * 180 / Math.PI; });
                }
            }
            syncAll();
        }
        lastPosX = cX; lastPosY = cY;
    });

    canvas.on('mouse:up', () => { if (calTimer) { clearTimeout(calTimer); calTimer = null; } magEl.style.display = 'none'; isDraggingCanvas = false; isZooming = false; rotationTarget = null; lastDistance = 0; syncAll(); });

    canvas.on('object:moving', (e) => {
        const moved = e.target; if (moved.type !== 'part') return;
        const parts = canvas.getObjects().filter(o => o.type === 'part');
        const dx = moved.left - moved._lastLeft, dy = moved.top - moved._lastTop;
        parts.forEach(p => { if (p !== moved) { p.left += dx; p.top += dy; p.setCoords(); } });
        updateLastPos(); syncAll();
    });

    function toggleCalibration() { isCalibrating = !isCalibrating; const btn = document.getElementById('cal-btn'), msg = document.getElementById('cal-msg'); if (isCalibrating) { btn.style.boxShadow = "0 0 15px #2196F3"; msg.style.display = 'block'; calPoints = []; } else { btn.style.boxShadow = "none"; msg.style.display = 'none'; cleanupCal(); } }
    function cleanupCal() { canvas.getObjects().filter(o => o.type.startsWith('cal_')).forEach(o => canvas.remove(o)); }
    function updateLastPos() { canvas.getObjects().forEach(o => { if(o.type==='part'){o._lastLeft = o.left; o._lastTop = o.top;} }); }
    
    function addVehicle(n, l, w, c, b, t, f, isMulti = false) {
        const vpt = canvas.viewportTransform; const sc = PX_METER / 40;
        const cX = (canvas.width / 2 - vpt[4]) / vpt[0], cY = (canvas.height / 2 - vpt[5]) / vpt[3];
        let obj;
        if (isMulti) {
            const beam_len = l * 40; const b_px = 0.6 * 40; const total_len = beam_len + (b_px * 2);
            const br_w = 3.0 * 40; const total_w = w * 40; const bh = 0.45 * 40;
            const l_br = new fabric.Polyline([{x:b_px,y:-br_w/2},{x:0,y:-br_w/2},{x:0,y:br_w/2},{x:b_px,y:br_w/2}], {stroke:'black',strokeWidth:3,fill:''});
            const r_br = new fabric.Polyline([{x:total_len-b_px,y:-br_w/2},{x:total_len,y:-br_w/2},{x:total_len,y:br_w/2},{x:total_len-b_px,y:br_w/2}], {stroke:'black',strokeWidth:3,fill:''});
            const t_bm = new fabric.Rect({left:b_px, top:-(total_w/2), width:beam_len, height:bh, fill:'', stroke:'red', strokeWidth:2});
            const b_bm = new fabric.Rect({left:b_px, top:(total_w/2)-bh, width:beam_len, height:bh, fill:'', stroke:'red', strokeWidth:2});
            const l_stripe = new fabric.Line([b_px/2, -br_w/2, b_px/2, br_w/2], {stroke:'black', strokeWidth:3});
            const r_stripe = new fabric.Line([total_len - b_px/2, -br_w/2, total_len - b_px/2, br_w/2], {stroke:'black', strokeWidth:3});
            obj = new fabric.Group([l_br, r_br, t_bm, b_bm, l_stripe, r_stripe], { left: cX, top: cY, type: 'part', vehicleType: 'mod', b_val: (l + 1.2) * 40, f_val: (f||0) * 40, originX: 'left', originY: 'center', hasControls: false });
        } else {
            obj = new fabric.Group([new fabric.Rect({ width: l*40, height: w*40, fill: c, stroke: 'black', strokeWidth: 1, originY: 'center' }), new fabric.Text(n, { fontSize: 10, originX: 'center', left: (l*40)/2, fill: (c==='white'?'black':'white'), fontWeight:'bold' })], { left: cX, top: cY, type: 'part', vehicleType: t, b_val: b * 40, f_val: (f||0) * 40, originX: 'left', originY: 'center', hasControls: false });
        }
        const parts = canvas.getObjects().filter(o => o.type === 'part'); if (parts.length > 0) obj.angle = parts[parts.length - 1].angle;
        canvas.add(obj); updateLastPos(); syncAll();
    }

    function deleteSelected() { canvas.getActiveObjects().forEach(o => canvas.remove(o)); syncAll(); }
    function clearAll() { if(confirm("Сброс?")) { canvas.clear(); canvas.setViewportTransform([1,0,0,1,0,0]); PX_METER=40; history=[]; historyStep=-1; saveHistory(); } }
    
    function loadMap(event) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader(); 
        reader.onload = function(f) { 
            fabric.Image.fromURL(f.target.result, function(img) { 
                img.set({ selectable: false, evented: false, type: 'map' }); 
                canvas.add(img).sendToBack(); 
                const scale = Math.min(canvas.width / img.width, canvas.height / img.height) * 0.9;
                canvas.setZoom(scale);
                const vpt = canvas.viewportTransform;
                vpt[4] = (canvas.width - img.width * scale) / 2;
                vpt[5] = (canvas.height - img.height * scale) / 2;
                canvas.requestRenderAll();
            }); 
        }; 
        reader.readAsDataURL(file);
    }
    saveHistory();
</script>
</body>
</html>
